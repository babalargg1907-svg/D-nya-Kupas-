<!DOCTYPE html>

  <style>
    :root{

    button.good{background:linear-gradient(135deg,#149c72,#21c397)}
    button.warn{background:linear-gradient(135deg,#a66a00,#d49415)}
    button.bad{background:linear-gradient(135deg,#b82a56,#e34170)}

    input,select,textarea{width:100%;background:#0d1528;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px 11px;outline:none}

    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
    .brand-logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,#82e2ff,#7b4dff 55%,#ffb057);display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow)}
    .brand h1{font-size:21px;margin:0;line-height:1}.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}
    nav{display:grid;gap:8px;margin:18px 0}.tab-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:1px solid transparent;box-shadow:none;padding:12px;border-radius:14px;color:#d9e3ff}.tab-btn.active{background:rgba(130,226,255,.1);border-color:rgba(130,226,255,.28);color:#fff}.tab-btn:hover{background:rgba(255,255,255,.06)}
    .side-card{border:1px solid var(--line);background:rgba(23,34,61,.65);border-radius:var(--radius);padding:14px;margin-top:18px}.side-card small{color:var(--muted);display:block;line-height:1.45}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}.title h2{font-size:30px;margin:0}.title p{color:var(--muted);margin:7px 0 0;line-height:1.4}.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
    .grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}
    .card{background:linear-gradient(180deg,rgba(23,34,61,.96),rgba(13,21,40,.96));border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;overflow:hidden}.card h3{margin:0 0 12px;font-size:18px}.card h4{margin:0 0 9px;font-size:15px;color:#e8eeff}.muted{color:var(--muted)}.mini{font-size:12px;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#1c2948;border:1px solid var(--line);font-size:12px;font-weight:800}.pill.good{color:var(--good);border-color:rgba(125,240,179,.35);background:rgba(125,240,179,.08)}.pill.warn{color:var(--warn);border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.08)}.pill.bad{color:var(--bad);border-color:rgba(255,123,156,.35);background:rgba(255,123,156,.08)}

    table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:middle}th{color:#bfd0ff;font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:rgba(255,255,255,.035)}td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}.table-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.08)}tr.qualify{background:rgba(125,240,179,.07)}tr.third-ok{background:rgba(255,209,102,.08)}tr.eliminated{opacity:.75}.team-line{display:flex;align-items:center;gap:7px;white-space:nowrap}.flag{font-size:20px}.team-name{font-weight:850}.group-chip{font-weight:950;color:var(--accent)}

    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.team-pick{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;display:grid;gap:10px}.team-pick-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.team-pick .group-chip{font-size:13px}
    .match-card{display:grid;grid-template-columns:1fr auto 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:16px}.match-team{display:flex;align-items:center;gap:8px;min-width:0}.match-team.away{justify-content:flex-end;text-align:right}.scorebox{display:flex;gap:6px;align-items:center}.scorebox input{width:62px;text-align:center;font-weight:900}.vs{color:var(--muted);font-weight:900}.match-meta{font-size:12px;color:var(--muted);margin-top:4px}.match-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}.stage-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.stage-filter button{padding:8px 11px}.stage-filter button.active{outline:2px solid var(--accent)}
    .bracket-scroll{overflow:auto;padding-bottom:10px}.bracket{display:flex;gap:18px;min-width:1250px}.round{width:230px;display:grid;gap:12px;align-content:start}.round h4{position:sticky;top:0;z-index:1;background:#121c32;border:1px solid var(--line);border-radius:12px;padding:10px;margin:0;text-align:center}.ko-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);border-radius:15px;padding:10px;display:grid;gap:8px}.ko-row{display:flex;justify-content:space-between;gap:8px;align-items:center;border-radius:10px;padding:8px;background:rgba(0,0,0,.14)}.ko-row.win{outline:1px solid rgba(125,240,179,.45);background:rgba(125,240,179,.08)}.ko-team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ko-score{font-weight:950;font-variant-numeric:tabular-nums}.champion{background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(130,226,255,.12));border-color:rgba(255,209,102,.45)}
    .leader-list{display:grid;gap:9px}.leader-item{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.045)}.rank{width:30px;height:30px;border-radius:10px;background:#26375e;display:grid;place-items:center;font-weight:950}.leader-value{font-weight:950;font-size:18px}
    .modal{position:fixed;inset:0;background:rgba(2,5,12,.74);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}.modal.show{display:flex}.modal-content{width:min(1050px,96vw);max-height:92vh;overflow:auto;background:#101a31;border:1px solid rgba(255,255,255,.12);border-radius:22px;box-shadow:var(--shadow);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.modal-head h3{margin:0}.form-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}.form-row.two{grid-template-columns:repeat(2,minmax(0,1fr))}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:800}.events{display:grid;gap:8px;margin-top:10px}.event-row{display:grid;grid-template-columns:70px 1fr 1fr 1fr 110px 36px;gap:8px;align-items:center;padding:8px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.035)}.small-btn{padding:8px 10px;border-radius:10px}.danger-text{color:var(--bad)}.success-text{color:var(--good)}

    .hidden{display:none!important}.sep{height:1px;background:rgba(255,255,255,.08);margin:14px 0}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#111b31;border:1px solid var(--line);border-radius:6px;padding:2px 6px}.searchbar{display:grid;grid-template-columns:1fr 200px 180px;gap:10px;margin-bottom:14px}.footer-note{color:var(--muted);font-size:12px;line-height:1.5;margin-top:18px}

    .star-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}.star-tabs button{padding:8px 11px}.star-tabs button.active{outline:2px solid var(--accent)}

    .rating-score{font-weight:950;color:var(--warn);font-size:18px;font-variant-numeric:tabular-nums}.position-pill{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:4px 8px;border-radius:999px;background:rgba(130,226,255,.1);border:1px solid rgba(130,226,255,.25);color:#c9f6ff;font-size:12px;font-weight:950}
    .xi-pitch{background:radial-gradient(circle at 50% 50%,rgba(125,240,179,.12),rgba(125,240,179,.045) 42%,rgba(255,255,255,.025));border:1px solid rgba(125,240,179,.2);border-radius:22px;padding:16px;display:grid;gap:12px;overflow:hidden}.xi-line{display:grid;gap:10px;justify-content:center}.xi-line.line-1{grid-template-columns:minmax(180px,260px)}.xi-line.line-3{grid-template-columns:repeat(3,minmax(150px,230px))}.xi-line.line-4{grid-template-columns:repeat(4,minmax(130px,210px))}.xi-card{background:rgba(8,13,26,.7);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px;text-align:center;min-height:94px;box-shadow:0 12px 30px rgba(0,0,0,.18)}.xi-card .player{font-weight:950;margin:5px 0 3px}.xi-card.empty{opacity:.45;border-style:dashed}.xi-rating{font-size:20px;font-weight:950;color:var(--warn)}

    /* Kupa48 v5 Medya Merkezi ve Rekabet paketi */
    .ticker{display:flex;gap:10px;overflow:auto;scrollbar-width:none;padding:8px 2px;margin:0 0 14px}.ticker::-webkit-scrollbar{display:none}.ticker-item{flex:0 0 auto;max-width:520px;padding:11px 14px;border-radius:999px;background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(130,226,255,.10));border:1px solid rgba(255,255,255,.12);font-weight:850;white-space:nowrap}

    .press-comment{display:grid;grid-template-columns:110px 1fr 36px;gap:9px;align-items:start;padding:10px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);border-radius:14px}.press-user{font-weight:950}.quote{font-style:italic;color:#eaf1ff;line-height:1.45}.var-note{border-left:4px solid var(--warn);padding:10px 12px;background:rgba(255,209,102,.08);border-radius:12px;color:#fff3ca}.live-panel{display:grid;gap:10px}.live-score{font-size:24px;font-weight:950;text-align:center;padding:12px;border-radius:16px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08)}.live-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.live-actions button{min-height:48px}.live-log{display:grid;gap:8px;max-height:220px;overflow:auto}.live-log-item{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);font-size:13px}
    .power-card{display:grid;grid-template-columns:42px 1fr 72px;gap:10px;align-items:center;padding:11px;border-radius:16px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045)}.power-score{font-size:20px;font-weight:950;color:var(--warn);text-align:right}.momentum-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;background:rgba(130,226,255,.09);border:1px solid rgba(130,226,255,.24);font-size:12px;font-weight:900}.star-select{min-width:96px}.story-block{line-height:1.6;color:#e7eeff}.story-block p{margin:0 0 10px}.fifa-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}.fifa-card{min-height:222px;border-radius:20px;padding:14px;background:linear-gradient(155deg,#d9b45a,#f7e399 46%,#9b6f22);color:#241600;border:1px solid rgba(255,255,255,.28);box-shadow:0 18px 42px rgba(0,0,0,.25);display:grid;align-content:space-between;position:relative;overflow:hidden}.fifa-card.silver{background:linear-gradient(155deg,#c9d2df,#f5f7fb 50%,#8d98a8)}.fifa-card.bronze{background:linear-gradient(155deg,#b87a45,#edbd87 50%,#704722)}.fifa-card.special{background:linear-gradient(155deg,#7b4dff,#82e2ff 48%,#ffd166);color:#07101e}.fifa-card:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 42%);transform:rotate(25deg)}.fifa-card>*{position:relative}.card-rating{font-size:30px;font-weight:950}.card-pos{font-weight:950}.card-player{font-size:18px;font-weight:950;text-transform:uppercase;letter-spacing:.02em}.card-team{font-weight:850}.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;font-weight:900}.album-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.album-item{padding:12px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.album-item.locked{opacity:.52;filter:grayscale(.4);border-style:dashed}.achievement-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.achievement-card{padding:13px;border-radius:17px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.achievement-card.unlocked{background:rgba(125,240,179,.075);border-color:rgba(125,240,179,.28)}.champ-path{display:grid;gap:9px}.path-step{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;padding:10px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.poster{padding:22px;border-radius:24px;background:radial-gradient(circle at 50% 0%,rgba(255,209,102,.22),rgba(130,226,255,.08) 42%,rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12);text-align:center}.poster-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin:18px 0}.poster-team{padding:16px;border-radius:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.1)}.poster-vs{font-size:22px;font-weight:950;color:var(--warn)}.grade{display:inline-grid;place-items:center;width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#ffd166,#82e2ff);color:#07101e;font-weight:950;font-size:20px}.hof-item{display:grid;grid-template-columns:86px 1fr auto;gap:10px;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.scenario-card{padding:11px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);line-height:1.45}.draft-meter{display:grid;grid-template-columns:90px 1fr 52px;gap:9px;align-items:center;margin:8px 0}.draft-track{height:11px;border-radius:99px;background:#0d1528;border:1px solid var(--line);overflow:hidden}.draft-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7df0b3,#ffd166)}

    /* Kupa48 v4 Mobil UI paketi */

<body>
<div class="app">
  <aside>
    <div class="brand"><div class="brand-logo">🏆</div><div><h1>Kupa48</h1><p>4 kullanıcı • 48 takım • Dünya Kupası formatı</p></div></div>
    <nav id="nav"></nav>
    <div class="side-card">
      <strong>Format</strong>
      <small>12 grup x 4 takım. İlk 2 takım + en iyi 8 üçüncü Son 32 turuna çıkar. Her takımın yanında sahibi görünür.</small>
    </div>
    <div class="side-card" id="ownerMini"></div>
  </aside>
  <main>
    <div class="topbar">
      <div class="title"><h2 id="pageTitle">Dashboard</h2><p id="pageDesc">Turnuva genel görünümü</p></div>
      <div class="actions">
        <button class="secondary" onclick="saveState(); toast('Kaydedildi')">Kaydet</button>
        <button class="ghost" onclick="exportJSON()">JSON Yedek Al</button>
        <button class="ghost" onclick="document.getElementById('importFile').click()">JSON Yükle</button>
        <input id="importFile" type="file" accept="application/json" class="hidden" onchange="importJSON(event)">
      </div>
    </div>
    <div id="appView"></div>
  </main>
</div>
<div id="mobileNav" class="mobile-bottom-nav"></div>

<div id="modal" class="modal" onclick="if(event.target.id==='modal') closeModal()">
  <div class="modal-content">
    <div class="modal-head">
      <div><h3 id="modalTitle">Maç Detayı</h3><p class="muted" id="modalSub"></p></div>
      <button class="secondary" onclick="closeModal()">Kapat</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const USERS = [
  {id:'ilker', name:'İlker', label:'İ', color:'ilker'},
  {id:'dogan', name:'Doğan', label:'D', color:'dogan'},
  {id:'giray', name:'Giray', label:'G', color:'giray'},
  {id:'eren', name:'Eren', label:'E', color:'eren'}
];
const GROUPS = {
  A:[['MEX','Meksika','🇲🇽'],['RSA','Güney Afrika','🇿🇦'],['KOR','Güney Kore','🇰🇷'],['CZE','Çekya','🇨🇿']],
  B:[['CAN','Kanada','🇨🇦'],['BIH','Bosna Hersek','🇧🇦'],['QAT','Katar','🇶🇦'],['SUI','İsviçre','🇨🇭']],
  C:[['BRA','Brezilya','🇧🇷'],['MAR','Fas','🇲🇦'],['HTI','Haiti','🇭🇹'],['SCO','İskoçya','🏴']],
  D:[['USA','ABD','🇺🇸'],['PAR','Paraguay','🇵🇾'],['AUS','Avustralya','🇦🇺'],['TUR','Türkiye','🇹🇷']],
  E:[['GER','Almanya','🇩🇪'],['CUW','Curaçao','🇨🇼'],['CIV','Fildişi Sahili','🇨🇮'],['ECU','Ekvador','🇪🇨']],
  F:[['NED','Hollanda','🇳🇱'],['JPN','Japonya','🇯🇵'],['SWE','İsveç','🇸🇪'],['TUN','Tunus','🇹🇳']],
  G:[['BEL','Belçika','🇧🇪'],['EGY','Mısır','🇪🇬'],['IRI','İran','🇮🇷'],['NZL','Yeni Zelanda','🇳🇿']],
  H:[['ESP','İspanya','🇪🇸'],['CPV','Yeşil Burun Adaları','🇨🇻'],['KSA','Suudi Arabistan','🇸🇦'],['URU','Uruguay','🇺🇾']],
  I:[['FRA','Fransa','🇫🇷'],['SEN','Senegal','🇸🇳'],['IRQ','Irak','🇮🇶'],['NOR','Norveç','🇳🇴']],
  J:[['ARG','Arjantin','🇦🇷'],['DZA','Cezayir','🇩🇿'],['AUT','Avusturya','🇦🇹'],['JOR','Ürdün','🇯🇴']],
  K:[['POR','Portekiz','🇵🇹'],['COD','DR Kongo','🇨🇩'],['UZB','Özbekistan','🇺🇿'],['COL','Kolombiya','🇨🇴']],
  L:[['ENG','İngiltere','🏴'],['CRO','Hırvatistan','🇭🇷'],['GHA','Gana','🇬🇭'],['PAN','Panama','🇵🇦']]
};
const TABS = [
  ['dashboard','📊','Dashboard','Genel istatistikler ve kullanıcı yarışı'],
  ['setup','🎲','Takım Sahipliği','48 takımı İlker, Doğan, Giray ve Eren’e dağıt'],
  ['groups','🏟️','Gruplar','12 gerçek Dünya Kupası grubu ve puan durumları'],
  ['fixtures','📝','Maç Girişi','Skor, golcü, asist ve maç istatistikleri'],
  ['knockout','🌳','Turnuva Ağacı','Son 32’den finale eleme ağacı'],
  ['stats','👑','Krallıklar','Gol krallığı, asist krallığı ve kullanıcı istatistikleri'],
  ['stars','⭐','Yıldızlar & Ödüller','Oyuncu puanları, haftanın 11’i, turnuvanın 11’i ve ödüller'],
  ['media','🗞️','Medya & Rekabet','Basın Odası, manşetler, power ranking, momentum ve turnuva hikayesi'],
  ['data','💾','Veri & Çıktı','Yedekleme, sıfırlama ve görsel indirme']
];
const pairTemplate = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
let state = loadState() || createInitialState();
migrateState();
let activeTab = 'dashboard';
let fixtureFilter = {stage:'all', status:'all', group:'all', q:''};
let activeGroupTab = 'A';
let currentModalMatchId = null;

function createInitialState(){
  const teams=[];
  Object.entries(GROUPS).forEach(([group,arr])=>arr.forEach(([id,name,flag],idx)=>teams.push({id,name,flag,group,slot:idx+1,owner:null})));
  const st={version:6, createdAt:new Date().toISOString(), teams, matches:[], koMatches:[], notes:'', settings:{win:3, draw:1}, media:{hallOfFame:[], rosters:{}}};
  st.matches = generateGroupMatches(st.teams);
  return st;
}
function generateGroupMatches(teams){
  const matches=[];
  Object.keys(GROUPS).forEach(g=>{
    const ids=teams.filter(t=>t.group===g).sort((a,b)=>a.slot-b.slot).map(t=>t.id);
    pairTemplate.forEach((p,idx)=>matches.push(newMatch(`G-${g}-${idx+1}`,'GROUP',`Grup ${g}`,g,ids[p[0]],ids[p[1]],idx+1)));
  });
  return matches;
}
function migrateState(){
  if(!state || !Array.isArray(state.matches)) state=createInitialState();
  if(!Array.isArray(state.koMatches)) state.koMatches=[];
  if(!state.settings) state.settings={win:3,draw:1};
  if(!state.notes) state.notes='';
  if(!state.media) state.media={hallOfFame:[], rosters:{}};
  if(!Array.isArray(state.media.hallOfFame)) state.media.hallOfFame=[];
  if(!state.media.rosters) state.media.rosters={};
  state.teams.forEach(t=>{ if(t.stars===undefined) t.stars=defaultTeamStars(t.id); });
  allMatches().forEach(m=>{
    if(!Array.isArray(m.events)) m.events=[];
    if(!Array.isArray(m.ratings)) m.ratings=[];
    if(!Array.isArray(m.press)) m.press=[];
    if(!Array.isArray(m.liveLog)) m.liveLog=[];
    if(m.varNote===undefined) m.varNote='';
    if(!m.stats) m.stats={};
    ['shotsHome','shotsAway','onHome','onAway','possHome','possAway','cornersHome','cornersAway','yellowHome','yellowAway','redHome','redAway','motm'].forEach(k=>{if(m.stats[k]===undefined)m.stats[k]=k==='motm'?'':null});
  });
  state.version=6;
}
function newMatch(id,stage,stageName,group,home,away,order){return {id,stage,stageName,group,home,away,order,homeScore:null,awayScore:null,penHome:null,penAway:null,completed:false,events:[],ratings:[],press:[],liveLog:[],varNote:'',stats:{shotsHome:null,shotsAway:null,onHome:null,onAway:null,possHome:null,possAway:null,cornersHome:null,cornersAway:null,yellowHome:0,yellowAway:0,redHome:0,redAway:0,motm:''}}}
function loadState(){try{return JSON.parse(localStorage.getItem('kupa48-state')||'')}catch(e){return null}}
function saveState(){localStorage.setItem('kupa48-state',JSON.stringify(state)); renderAll(false)}
function resetState(){if(confirm('Tüm turnuva verileri silinecek. Emin misiniz?')){state=createInitialState(); saveState(); renderAll(); toast('Turnuva sıfırlandı')}}
function toast(msg){const el=document.createElement('div'); el.textContent=msg; el.style.cssText='position:fixed;right:18px;bottom:18px;background:#17223d;border:1px solid #82e2ff;color:#fff;padding:12px 15px;border-radius:14px;z-index:50;box-shadow:0 14px 40px rgba(0,0,0,.35);font-weight:800'; document.body.appendChild(el); setTimeout(()=>el.remove(),2200)}

function team(id){return state.teams.find(t=>t.id===id) || {id,name:'TBD',flag:'▫️',owner:null,group:'-'}}
function user(id){return USERS.find(u=>u.id===id)}
function ownerBadge(owner){const u=user(owner); if(!u) return '<span class="owner-badge owner-none">?</span>'; return `<span title="${u.name}" class="owner-badge owner-${u.color}">${u.label}</span>`}
function ownerName(owner){return user(owner)?.name || 'Sahipsiz'}
function teamHTML(id, compact=false){const t=team(id); return `<span class="team-line"><span class="flag">${t.flag}</span><span class="team-name">${t.name}</span>${ownerBadge(t.owner)}${compact?'':`<span class="mini">${t.id}</span>`}</span>`}
function matchTitle(m){return `${team(m.home).name} - ${team(m.away).name}`}
function allMatches(){return [...state.matches, ...state.koMatches]}
function completedMatches(){return allMatches().filter(m=>m.completed && m.homeScore!==null && m.awayScore!==null)}
function scoreText(m){return m.homeScore===null||m.awayScore===null ? '-' : `${m.homeScore} - ${m.awayScore}${m.penHome!==null&&m.penAway!==null?` / Pen: ${m.penHome}-${m.penAway}`:''}`}
function getWinner(m){
  if(!m || !m.completed || m.homeScore===null || m.awayScore===null) return null;
  if(m.homeScore>m.awayScore) return m.home; if(m.awayScore>m.homeScore) return m.away;
  if(m.penHome!==null && m.penAway!==null){ if(m.penHome>m.penAway) return m.home; if(m.penAway>m.penHome) return m.away; }
  return null;
}
function getLoser(m){const w=getWinner(m); if(!w) return null; return w===m.home ? m.away : m.home}

function renderAll(keepTitle=true){renderNav(); renderMobileNav(); renderOwnerMini(); renderView(); if(keepTitle!==false) window.scrollTo({top:0,behavior:'smooth'})}
function renderNav(){document.getElementById('nav').innerHTML=TABS.map(t=>`<button class="tab-btn ${activeTab===t[0]?'active':''}" onclick="activeTab='${t[0]}'; renderAll()"><span>${t[1]}</span><span>${t[2]}</span></button>`).join('')}
function renderMobileNav(){const el=document.getElementById('mobileNav'); if(!el)return; const mobileTabs=[['dashboard','🏠','Ana'],['fixtures','📝','Maç'],['groups','🏟️','Grup'],['knockout','🌳','Ağaç'],['media','🗞️','Medya'],['data','💾','Veri']]; el.innerHTML=mobileTabs.map(t=>`<button class="${activeTab===t[0]?'active':''}" onclick="activeTab='${t[0]}'; renderAll()"><span>${t[1]}</span><span>${t[2]}</span></button>`).join('')}
function setHeader(){const tab=TABS.find(t=>t[0]===activeTab); document.getElementById('pageTitle').textContent=tab[2]; document.getElementById('pageDesc').textContent=tab[3]}
function renderOwnerMini(){
  const counts=ownerCounts();
  document.getElementById('ownerMini').innerHTML='<strong>Kullanıcı Takımları</strong>'+USERS.map(u=>`<small><span class="owner-dot dot-${u.color}"></span>${u.name}: <b>${counts[u.id]||0}/12</b> takım</small>`).join('')+`<div class="sep"></div><small>Eksik/fazla dağılım varsa takım sahipliği ekranından düzeltilebilir.</small>`;
}
function renderView(){setHeader(); const root=document.getElementById('appView'); if(activeTab==='dashboard') root.innerHTML=viewDashboard(); if(activeTab==='setup') root.innerHTML=viewSetup(); if(activeTab==='groups') root.innerHTML=viewGroups(); if(activeTab==='fixtures') root.innerHTML=viewFixtures(); if(activeTab==='knockout') root.innerHTML=viewKnockout(); if(activeTab==='stats') root.innerHTML=viewStats(); if(activeTab==='stars') root.innerHTML=viewStars(); if(activeTab==='media') root.innerHTML=viewMedia(); if(activeTab==='data') root.innerHTML=viewData(); bindDynamic();}
function bindDynamic(){document.querySelectorAll('[data-score]').forEach(inp=>inp.addEventListener('change',e=>quickScoreChange(e.target)));}

function ownerCounts(){const c={ilker:0,dogan:0,giray:0,eren:0}; state.teams.forEach(t=>{if(c[t.owner]!==undefined)c[t.owner]++}); return c;}
function ownershipOk(){return USERS.every(u=>ownerCounts()[u.id]===12)}
function autoDraft(){
  const shuffled=[...state.teams].sort(()=>Math.random()-0.5); const owners=USERS.flatMap(u=>Array(12).fill(u.id)).sort(()=>Math.random()-0.5);
  shuffled.forEach((t,i)=>t.owner=owners[i]); saveState(); toast('48 takım 4 kullanıcıya 12’şer dağıtıldı');
}
function clearOwners(){if(confirm('Tüm takım sahipleri temizlensin mi?')){state.teams.forEach(t=>t.owner=null); saveState();}}
function changeOwner(teamId, owner){const t=team(teamId); t.owner=owner||null; saveState();}

function standingsForGroup(g){
  const rows=state.teams.filter(t=>t.group===g).map(t=>({id:t.id,group:g,p:0,o:0,g:0,b:0,m:0,ag:0,yg:0,av:0,conduct:0}));
  const by=Object.fromEntries(rows.map(r=>[r.id,r]));
  state.matches.filter(m=>m.group===g && m.completed && m.homeScore!==null && m.awayScore!==null).forEach(m=>{
    const h=by[m.home], a=by[m.away]; if(!h||!a)return;
    h.o++; a.o++; h.ag+=Number(m.homeScore); h.yg+=Number(m.awayScore); a.ag+=Number(m.awayScore); a.yg+=Number(m.homeScore);
    h.conduct += Number(m.stats.yellowHome||0)+Number(m.stats.redHome||0)*3; a.conduct += Number(m.stats.yellowAway||0)+Number(m.stats.redAway||0)*3;
    if(m.homeScore>m.awayScore){h.g++; a.m++; h.p+=state.settings.win}
    else if(m.homeScore<m.awayScore){a.g++; h.m++; a.p+=state.settings.win}
    else {h.b++; a.b++; h.p+=state.settings.draw; a.p+=state.settings.draw}
  });
  rows.forEach(r=>r.av=r.ag-r.yg);
  return rows.sort(sortStanding);
}
function sortStanding(a,b){return b.p-a.p || b.av-a.av || b.ag-a.ag || a.conduct-b.conduct || team(a.id).name.localeCompare(team(b.id).name,'tr')}
function allStandings(){return Object.keys(GROUPS).flatMap(g=>standingsForGroup(g).map((r,i)=>({...r,rank:i+1})))}
function bestThirds(){return Object.keys(GROUPS).map(g=>({...standingsForGroup(g)[2], thirdRank:null})).sort(sortStanding).map((r,i)=>({...r,thirdRank:i+1,qualified:i<8}))}
function groupComplete(g){return state.matches.filter(m=>m.group===g).every(m=>m.completed)}
function groupsComplete(){return Object.keys(GROUPS).every(groupComplete)}
function qualifiers(){
  const q=[];
  Object.keys(GROUPS).forEach(g=>{const s=standingsForGroup(g); q.push({...s[0],qualType:'1.'}); q.push({...s[1],qualType:'2.'});});
  bestThirds().filter(x=>x.qualified).forEach(x=>q.push({...x,qualType:'3.'}));
  return q;
}

function leaderboards(){
  const goals={}, assists={}, ga={};
  allMatches().forEach(m=>m.events.forEach(ev=>{
    const tid=ev.teamId; const tm=team(tid); const owner=tm.owner;
    if(ev.scorer && ev.type!=='own_goal'){
      const key=(ev.scorer.trim().toLocaleLowerCase('tr')+'|'+tid); if(!goals[key]) goals[key]={name:ev.scorer.trim(),teamId:tid,owner,goals:0,assists:0}; goals[key].goals++;
    }
    if(ev.assist && ev.type!=='penalty' && ev.type!=='own_goal'){
      const key=(ev.assist.trim().toLocaleLowerCase('tr')+'|'+tid); if(!assists[key]) assists[key]={name:ev.assist.trim(),teamId:tid,owner,assists:0}; assists[key].assists++;
    }
  }));
  Object.values(goals).forEach(g=>{const a=Object.values(assists).find(x=>x.name.toLocaleLowerCase('tr')===g.name.toLocaleLowerCase('tr')&&x.teamId===g.teamId); if(a)g.assists=a.assists});
  return {goals:Object.values(goals).sort((a,b)=>b.goals-a.goals||b.assists-a.assists), assists:Object.values(assists).sort((a,b)=>b.assists-a.assists)};
}
function teamDeepestStages(){
  const stageVal={R32:5,R16:8,QF:12,SF:18,THIRD:18,FINAL:25,CHAMPION:40}; const d={};
  qualifiers().forEach(q=>d[q.id]=Math.max(d[q.id]||0,stageVal.R32));
  state.koMatches.forEach(m=>{[m.home,m.away].forEach(id=>{if(id)d[id]=Math.max(d[id]||0,stageVal[m.stage]||0)}); if(m.stage==='FINAL'){const w=getWinner(m); if(w)d[w]=Math.max(d[w]||0,stageVal.CHAMPION)}});
  return d;
}
function userScores(){
  const rows=USERS.map(u=>({id:u.id,name:u.name,label:u.label,color:u.color,teams:0,played:0,w:0,d:0,l:0,gf:0,ga:0,av:0,groupPoints:0,bonus:0,playerBonus:0,total:0,advanced:0,champions:0,motm:0,xi:0})); const by=Object.fromEntries(rows.map(r=>[r.id,r]));
  state.teams.forEach(t=>{if(by[t.owner])by[t.owner].teams++});
  completedMatches().forEach(m=>{
    [[m.home,m.homeScore,m.awayScore],[m.away,m.awayScore,m.homeScore]].forEach(([tid,gf,ga])=>{const o=team(tid).owner; if(!by[o])return; const r=by[o]; r.played++; r.gf+=Number(gf); r.ga+=Number(ga); if(gf>ga){r.w++; if(m.stage==='GROUP')r.groupPoints+=state.settings.win}else if(gf<ga)r.l++; else {r.d++; if(m.stage==='GROUP')r.groupPoints+=state.settings.draw}})
  });
  const deep=teamDeepestStages(); Object.entries(deep).forEach(([tid,val])=>{const o=team(tid).owner; if(by[o]){by[o].bonus+=val; if(val>=5)by[o].advanced++; if(val===40)by[o].champions++;}});
  const lbs=leaderboards(); lbs.goals.forEach(x=>{if(by[x.owner])by[x.owner].playerBonus+=x.goals}); lbs.assists.forEach(x=>{if(by[x.owner])by[x.owner].playerBonus+=x.assists});
  completedMatches().forEach(m=>{const motm=matchMOTM(m); if(motm && by[motm.owner]){by[motm.owner].playerBonus+=3; by[motm.owner].motm++;}});
  ['md1','md2','md3','group','R32','R16','QF','SF','FINAL','all'].forEach(period=>teamOfPeriod(period).forEach(p=>{if(by[p.owner]){by[p.owner].playerBonus+=period==='all'?5:2; by[p.owner].xi++;}}));
  rows.forEach(r=>{r.av=r.gf-r.ga; r.total=r.groupPoints+r.bonus+r.playerBonus}); return rows.sort((a,b)=>b.total-a.total||b.av-a.av||b.gf-a.gf);
}

e)"><button class="secondary" onclick="activeTab='knockout'; renderAll()">Turnuva Ağacı</button><button onclick="saveState()">Kaydet</button></div><div class="grid">${matches.map(matchEntryCard).join('')||'<div class="notice">Filtreye uygun maç yok.</div>'}</div>`}
function filteredMatches(){let arr=allMatches(); if(fixtureFilter.stage==='GROUP')arr=arr.filter(m=>m.stage==='GROUP'); if(fixtureFilter.stage==='KO')arr=arr.filter(m=>m.stage!=='GROUP'); if(fixtureFilter.status==='open')arr=arr.filter(m=>!m.completed); if(fixtureFilter.status==='done')arr=arr.filter(m=>m.completed); if(fixtureFilter.group!=='all')arr=arr.filter(m=>m.group===fixtureFilter.group); const q=fixtureFilter.q.trim().toLocaleLowerCase('tr'); if(q) arr=arr.filter(m=>[team(m.home).name,team(m.away).name,ownerName(team(m.home).owner),ownerName(team(m.away).owner),m.stageName].join(' ').toLocaleLowerCase('tr').includes(q)); return arr;}
function matchEntryCard(m){return `<div class="match-card"><div class="match-team">${teamHTML(m.home)}</div><div class="scorebox"><input data-score="${m.id}|home" type="number" min="0" value="${m.homeScore??''}" placeholder="0"><span class="vs">-</span><input data-score="${m.id}|away" type="number" min="0" value="${m.awayScore??''}" placeholder="0"></div><div class="match-team away">${teamHTML(m.away)}</div><div><div class="match-actions"><button class="small-btn secondary" onclick="openMatchModal('${m.id}')">Detay</button><button class="small-btn good" onclick="completeMatch('${m.id}')">Tamamla</button></div><div class="match-meta">${m.stageName} ${m.group?`• ${m.group} Grubu`:''} ${m.completed?'• Tamamlandı':'• Oynanmadı'}</div></div></div>`}
function quickScoreChange(input){const [id,side]=input.dataset.score.split('|'); const m=allMatches().find(x=>x.id===id); if(!m)return; const val=input.value===''?null:Math.max(0,Number(input.value)); if(side==='home')m.homeScore=val; else m.awayScore=val; if(m.homeScore!==null && m.awayScore!==null)m.completed=true; if(m.stage!=='GROUP') updateKnockoutProgress(); saveState();}
function completeMatch(id){const m=allMatches().find(x=>x.id===id); if(!m)return; if(m.homeScore===null||m.awayScore===null){toast('Önce skor gir'); return} m.completed=true; if(m.stage!=='GROUP' && m.homeScore===m.awayScore && (m.penHome===null || m.penAway===null)) toast('Eleme maçında beraberlik var: penaltı skorunu detaydan girebilirsin.'); if(m.stage!=='GROUP') updateKnockoutProgress(); saveState(); toast('Maç tamamlandı')}

function createKnockout(){
  const q=qualifiers(); if(q.length<32){toast('Son 32 için 32 takım oluşmadı'); return}
  const seed = q.sort((a,b)=> (a.qualType.localeCompare(b.qualType,'tr') || b.p-a.p || b.av-a.av || b.ag-a.ag || a.group.localeCompare(b.group))).map(x=>x.id);
  const ko=[]; for(let i=0;i<16;i++){ko.push(newMatch(`KO-R32-${i+1}`,'R32','Son 32',null,seed[i],seed[31-i],i+1));}
  for(let i=0;i<8;i++)ko.push(newMatch(`KO-R16-${i+1}`,'R16','Son 16',null,null,null,i+1));
  for(let i=0;i<4;i++)ko.push(newMatch(`KO-QF-${i+1}`,'QF','Çeyrek Final',null,null,null,i+1));
  for(let i=0;i<2;i++)ko.push(newMatch(`KO-SF-${i+1}`,'SF','Yarı Final',null,null,null,i+1));
  ko.push(newMatch('KO-THIRD-1','THIRD','Üçüncülük',null,null,null,1));
  ko.push(newMatch('KO-FINAL-1','FINAL','Final',null,null,null,1));
  state.koMatches=ko; updateKnockoutProgress(false); saveState(); activeTab='knockout'; renderAll(); toast('Son 32 ağacı oluşturuldu');
}
function resetKnockout(){if(confirm('Eleme ağacı ve eleme maçları silinsin mi?')){state.koMatches=[]; saveState();}}
function updateKnockoutProgress(shouldSave=true){
  const byStage=s=>state.koMatches.filter(m=>m.stage===s).sort((a,b)=>a.order-b.order);
  const fill=(from,to)=>{const f=byStage(from), t=byStage(to); t.forEach((m,i)=>{m.home=getWinner(f[i*2]) || m.home; m.away=getWinner(f[i*2+1]) || m.away;});};
  fill('R32','R16'); fill('R16','QF'); fill('QF','SF');
  const sf=byStage('SF'), final=byStage('FINAL')[0], third=byStage('THIRD')[0]; if(final){final.home=getWinner(sf[0])||final.home; final.away=getWinner(sf[1])||final.away;} if(third){third.home=getLoser(sf[0])||third.home; third.away=getLoser(sf[1])||third.away;}
  if(shouldSave) saveState();
}

const POSITIONS=['GK','RB','CB','LB','CDM','CM','CAM','RW','LW','ST'];
const STAR_PERIODS=[['md1','1. Hafta 11’i'],['md2','2. Hafta 11’i'],['md3','3. Hafta 11’i'],['group','Grup Aşaması 11’i'],['R32','Son 32 11’i'],['R16','Son 16 11’i'],['QF','Çeyrek Final 11’i'],['SF','Yarı Final 11’i'],['FINAL','Final 11’i'],['all','Turnuvanın 11’i']];

function safe(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function ratingMatches(period='all'){
  return allMatches().filter(m=>{
    if(period==='all') return true;
    if(period==='group') return m.stage==='GROUP';
    if(period==='md1') return m.stage==='GROUP' && [1,2].includes(m.order);
    if(period==='md2') return m.stage==='GROUP' && [3,4].includes(m.order);
    if(period==='md3') return m.stage==='GROUP' && [5,6].includes(m.order);
    return m.stage===period;
  });
}
function matchMOTM(m){const list=[...(m.ratings||[])].filter(r=>r.player&&r.rating!==undefined); if(list.length)return list.sort((a,b)=>Number(b.rating||0)-Number(a.rating||0))[0]; if(m.stats?.motm)return {player:m.stats.motm,teamId:m.home,position:'-',rating:0,owner:team(m.home).owner}; return null}
function allRatings(period='all'){
  return ratingMatches(period).flatMap(m=>(m.ratings||[]).map(r=>({...r,matchId:m.id,stage:m.stage,stageName:m.stageName,matchOrder:m.order,owner:team(r.teamId).owner,home:m.home,away:m.away,completed:m.completed})));
}
function positionBucket(pos){if(pos==='GK')return 'GK'; if(['RB','CB','LB'].includes(pos))return 'DEF'; if(['CDM','CM','CAM'].includes(pos))return 'MID'; return 'FWD'}
function playerStats(period='all'){
  const map={}; const ratings=allRatings(period);
  ratings.forEach(r=>{const key=r.player.trim().toLocaleLowerCase('tr')+'|'+r.teamId; if(!map[key])map[key]={key,name:r.player.trim(),teamId:r.teamId,owner:r.owner,position:r.position||'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].ratings.push(Number(r.rating||0)); map[key].matches.add(r.matchId); if(r.position)map[key].position=r.position;});
  ratingMatches(period).forEach(m=>{
    (m.events||[]).forEach(ev=>{if(ev.scorer&&ev.type!=='own_goal'){const key=ev.scorer.trim().toLocaleLowerCase('tr')+'|'+ev.teamId; if(!map[key])map[key]={key,name:ev.scorer.trim(),teamId:ev.teamId,owner:team(ev.teamId).owner,position:'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].goals++; map[key].matches.add(m.id)} if(ev.assist&&ev.type!=='own_goal'&&ev.type!=='penalty'){const key=ev.assist.trim().toLocaleLowerCase('tr')+'|'+ev.teamId; if(!map[key])map[key]={key,name:ev.assist.trim(),teamId:ev.teamId,owner:team(ev.teamId).owner,position:'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].assists++; map[key].matches.add(m.id)}});
    const motm=matchMOTM(m); if(motm&&motm.player){const key=motm.player.trim().toLocaleLowerCase('tr')+'|'+motm.teamId; if(!map[key])map[key]={key,name:motm.player.trim(),teamId:motm.teamId,owner:team(motm.teamId).owner,position:motm.position||'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].motm++;}
  });
  return Object.values(map).map(p=>{const avg=p.ratings.length?p.ratings.reduce((a,b)=>a+b,0)/p.ratings.length:0; return {...p,apps:p.matches.size,avg,totalRating:p.ratings.reduce((a,b)=>a+b,0),ga:p.goals+p.assists}}).sort((a,b)=>b.avg-a.avg||b.ga-a.ga||b.goals-a.goals);
}
function pickBest(list,filter,count,used){const picked=[]; list.filter(filter).forEach(p=>{if(picked.length<count && !used.has(p.key)){picked.push(p); used.add(p.key)}}); while(picked.length<count)picked.push(null); return picked}
function teamOfPeriod(period='all'){
  const list=playerStats(period).filter(p=>p.avg>0).sort((a,b)=>b.avg-a.avg||b.ga-a.ga||b.goals-a.goals); const used=new Set();
  return [...pickBest(list,p=>p.position==='GK'||positionBucket(p.position)==='GK',1,used),...pickBest(list,p=>['RB','CB','LB'].includes(p.position)||positionBucket(p.position)==='DEF',4,used),...pickBest(list,p=>['CDM','CM','CAM'].includes(p.position)||positionBucket(p.position)==='MID',3,used),...pickBest(list,p=>['RW','LW','ST'].includes(p.position)||positionBucket(p.position)==='FWD',3,used)].filter(Boolean);
}
function xiCard(p){return p?`<div class="xi-card"><span class="position-pill">${p.position}</span><div class="player">${safe(p.name)}</div><div class="mini">${teamHTML(p.teamId,true)}</div><div class="xi-rating">${p.avg.toFixed(1)}</div><div class="mini">${p.goals}G · ${p.assists}A · ${p.apps}M</div></div>`:`<div class="xi-card empty"><span class="position-pill">-</span><div class="player">Boş</div><div class="mini">Puan girildikçe dolar</div></div>`}
function xiPitch(period='all'){

  return `<div class="xi-pitch"><div class="xi-line line-3">${[0,1,2].map(i=>xiCard(by.FWD[i])).join('')}</div><div class="xi-line line-3">${[0,1,2].map(i=>xiCard(by.MID[i])).join('')}</div><div class="xi-line line-4">${[0,1,2,3].map(i=>xiCard(by.DEF[i])).join('')}</div><div class="xi-line line-1">${xiCard(by.GK)}</div></div>`
}

function awards(){const ps=playerStats('all'); const lbs=leaderboards(); const topUser=userScores()[0]; const bestGK=ps.filter(p=>p.position==='GK').sort((a,b)=>b.avg-a.avg)[0]; const final=state.koMatches.find(m=>m.stage==='FINAL'); const champion=final?getWinner(final):null; return {goldenBall:ps.filter(p=>p.apps>=Math.min(2,completedMatches().length||1)).sort((a,b)=>(b.avg*2+b.ga*.4+b.motm*.8)-(a.avg*2+a.ga*.4+a.motm*.8))[0],goldenBoot:lbs.goals[0],assistKing:lbs.assists[0],goldenGlove:bestGK,bestUser:topUser,champion:champion?team(champion):null,dramatic:dramaticMatch(),bestXI:teamOfPeriod('all')};}

function viewRecords(){const ps=playerStats('all'); const ms=completedMatches(); const mostGoalsTeam=allStandings().sort((a,b)=>b.ag-a.ag)[0]; const leastConcede=allStandings().filter(r=>r.o>0).sort((a,b)=>a.yg-b.yg||b.p-a.p)[0]; const earliest=allMatches().flatMap(m=>(m.events||[]).map(ev=>({...ev,match:m}))).filter(e=>e.minute).sort((a,b)=>Number(a.minute)-Number(b.minute))[0]; const latest=allMatches().flatMap(m=>(m.events||[]).map(ev=>({...ev,match:m}))).filter(e=>e.minute).sort((a,b)=>Number(b.minute)-Number(a.minute))[0]; const highRating=allRatings('all').sort((a,b)=>Number(b.rating)-Number(a.rating))[0]; const bigWin=ms.slice().sort((a,b)=>Math.abs((b.homeScore||0)-(b.awayScore||0))-Math.abs((a.homeScore||0)-(a.awayScore||0)))[0]; return `<div class="record-grid">${recordCard('En gollü maç',ms.sort((a,b)=>totalGoalsInMatch(b)-totalGoalsInMatch(a))[0])}${recordCard('En farklı galibiyet',bigWin)}${simpleRecord('En erken gol',earliest?`${earliest.minute}' ${safe(earliest.scorer)} - ${team(earliest.teamId).name}`:'-')}${simpleRecord('En geç gol',latest?`${latest.minute}' ${safe(latest.scorer)} - ${team(latest.teamId).name}`:'-')}${simpleRecord('En yüksek oyuncu puanı',highRating?`${safe(highRating.player)} • ${team(highRating.teamId).name} • ${Number(highRating.rating).toFixed(1)}`:'-')}${simpleRecord('En çok gol atan takım',mostGoalsTeam?`${team(mostGoalsTeam.id).name} • ${mostGoalsTeam.ag} gol`:'-')}${simpleRecord('En az gol yiyen takım',leastConcede?`${team(leastConcede.id).name} • ${leastConcede.yg} gol`:'-')}${simpleRecord('En çok MOTM',ps[0]?`${ps.sort((a,b)=>b.motm-a.motm)[0].name} • ${ps.sort((a,b)=>b.motm-a.motm)[0].motm}`:'-')}</div>`}

function matchReport(m){if(!m.completed)return '<p class="muted">Maç tamamlanınca otomatik rapor oluşur.</p>'; const w=getWinner(m), l=getLoser(m); const motm=matchMOTM(m); const goals=[...(m.events||[])].filter(e=>e.type!=='own_goal'); const topScorer=goals.reduce((acc,e)=>{acc[e.scorer]=(acc[e.scorer]||0)+1;return acc},{}) ; const topName=Object.entries(topScorer).sort((a,b)=>b[1]-a[1])[0]; const winnerText=w?`${team(w).name} ${ownerBadge(team(w).owner)}, ${team(l).name} karşısında ${scoreText(m)} kazanarak önemli bir sonuç aldı.`:`${team(m.home).name} ile ${team(m.away).name} ${scoreText(m)} berabere kaldı.`; return `<div class="report-card"><b>${team(m.home).flag} ${team(m.home).name} ${scoreText(m)} ${team(m.away).flag} ${team(m.away).name}</b><p>${winnerText} ${topName?`${safe(topName[0])} ${topName[1]} golle öne çıktı.`:''} ${motm?`Maçın adamı ${safe(motm.player)} oldu; puanı ${Number(motm.rating||0).toFixed(1)}.`:''}</p><div class="mini">${m.stageName} ${m.group?`• ${m.group} Grubu`:''}</div></div>`}
