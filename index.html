  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
    :root{

    button.good{background:linear-gradient(135deg,#149c72,#21c397)}
    button.warn{background:linear-gradient(135deg,#a66a00,#d49415)}

    nav{display:grid;gap:8px;margin:18px 0}.tab-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:1px solid transparent;box-shadow:none;padding:12px;border-radius:14px;color:#d9e3ff}.tab-btn.active{background:rgba(130,226,255,.1);border-color:rgba(130,226,255,.28);color:#fff}.tab-btn:hover{background:rgba(255,255,255,.06)}
    .side-card{border:1px solid var(--line);background:rgba(23,34,61,.65);border-radius:var(--radius);padding:14px;margin-top:18px}.side-card small{color:var(--muted);display:block;line-height:1.45}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}.title h2{font-size:30px;margin:0}.title p{color:var(--muted);margin:7px 0 0;line-height:1.4}.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
    .grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}

    table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:middle}th{color:#bfd0ff;font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:rgba(255,255,255,.035)}td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}.table-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.08)}tr.qualify{background:rgba(125,240,179,.07)}tr.third-ok{background:rgba(255,209,102,.08)}tr.eliminated{opacity:.75}.team-line{display:flex;align-items:center;gap:7px;white-space:nowrap}.flag{font-size:20px}.team-name{font-weight:850}.group-chip{font-weight:950;color:var(--accent)}

    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.team-pick{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;display:grid;gap:10px}.team-pick-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.team-pick .group-chip{font-size:13px}

    .bracket-scroll{overflow:auto;padding-bottom:10px}.bracket{display:flex;gap:18px;min-width:1250px}.round{width:230px;display:grid;gap:12px;align-content:start}.round h4{position:sticky;top:0;z-index:1;background:#121c32;border:1px solid var(--line);border-radius:12px;padding:10px;margin:0;text-align:center}.ko-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);border-radius:15px;padding:10px;display:grid;gap:8px}.ko-row{display:flex;justify-content:space-between;gap:8px;align-items:center;border-radius:10px;padding:8px;background:rgba(0,0,0,.14)}.ko-row.win{outline:1px solid rgba(125,240,179,.45);background:rgba(125,240,179,.08)}.ko-team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ko-score{font-weight:950;font-variant-numeric:tabular-nums}.champion{background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(130,226,255,.12));border-color:rgba(255,209,102,.45)}
    .leader-list{display:grid;gap:9px}.leader-item{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.045)}.rank{width:30px;height:30px;border-radius:10px;background:#26375e;display:grid;place-items:center;font-weight:950}.leader-value{font-weight:950;font-size:18px}
    .modal{position:fixed;inset:0;background:rgba(2,5,12,.74);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}.modal.show{display:flex}.modal-content{width:min(1050px,96vw);max-height:92vh;overflow:auto;background:#101a31;border:1px solid rgba(255,255,255,.12);border-radius:22px;box-shadow:var(--shadow);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.modal-head h3{margin:0}.form-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}.form-row.two{grid-template-columns:repeat(2,minmax(0,1fr))}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:800}.events{display:grid;gap:8px;margin-top:10px}.event-row{display:grid;grid-template-columns:70px 1fr 1fr 1fr 110px 36px;gap:8px;align-items:center;padding:8px;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.035)}.small-btn{padding:8px 10px;border-radius:10px}.danger-text{color:var(--bad)}.success-text{color:var(--good)}

    .rating-score{font-weight:950;color:var(--warn);font-size:18px;font-variant-numeric:tabular-nums}.position-pill{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:4px 8px;border-radius:999px;background:rgba(130,226,255,.1);border:1px solid rgba(130,226,255,.25);color:#c9f6ff;font-size:12px;font-weight:950}
    .xi-pitch{background:radial-gradient(circle at 50% 50%,rgba(125,240,179,.12),rgba(125,240,179,.045) 42%,rgba(255,255,255,.025));border:1px solid rgba(125,240,179,.2);border-radius:22px;padding:16px;display:grid;gap:12px;overflow:hidden}.xi-line{display:grid;gap:10px;justify-content:center}.xi-line.line-1{grid-template-columns:minmax(180px,260px)}.xi-line.line-3{grid-template-columns:repeat(3,minmax(150px,230px))}.xi-line.line-4{grid-template-columns:repeat(4,minmax(130px,210px))}.xi-card{background:rgba(8,13,26,.7);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px;text-align:center;min-height:94px;box-shadow:0 12px 30px rgba(0,0,0,.18)}.xi-card .player{font-weight:950;margin:5px 0 3px}.xi-card.empty{opacity:.45;border-style:dashed}.xi-rating{font-size:20px;font-weight:950;color:var(--warn)}

    .ticker{display:flex;gap:10px;overflow:auto;scrollbar-width:none;padding:8px 2px;margin:0 0 14px}.ticker::-webkit-scrollbar{display:none}.ticker-item{flex:0 0 auto;max-width:520px;padding:11px 14px;border-radius:999px;background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(130,226,255,.10));border:1px solid rgba(255,255,255,.12);font-weight:850;white-space:nowrap}

id;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.achievement-card{padding:13px;border-radius:17px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.achievement-card.unlocked{background:rgba(125,240,179,.075);border-color:rgba(125,240,179,.28)}.champ-path{display:grid;gap:9px}.path-step{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;padding:10px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.poster{padding:22px;border-radius:24px;background:radial-gradient(circle at 50% 0%,rgba(255,209,102,.22),rgba(130,226,255,.08) 42%,rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12);text-align:center}.poster-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin:18px 0}.poster-team{padding:16px;border-radius:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.1)}.poster-vs{font-size:22px;font-weight:950;color:var(--warn)}.grade{display:inline-grid;place-items:center;width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#ffd166,#82e2ff);color:#07101e;font-weight:950;font-size:20px}.hof-item{display:grid;grid-template-columns:86px 1fr auto;gap:10px;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.scenario-card{padding:11px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);line-height:1.45}.draft-meter{display:grid;grid-template-columns:90px 1fr 52px;gap:9px;align-items:center;margin:8px 0}.draft-track{height:11px;border-radius:99px;background:#0d1528;border:1px solid var(--line);overflow:hidden}.draft-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7df0b3,#ffd166)}

    .bar-list{display:grid;gap:11px}.bar-row{display:grid;grid-template-columns:78px 1fr 48px;gap:8px;align-items:center}.bar-label{font-weight:850;white-space:nowrap}.bar-track{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#82e2ff,#f5c542);min-width:3px}.bar-value{text-align:right;font-weight:950;font-variant-numeric:tabular-nums}

    .mobile-standing-list{display:grid;gap:9px}.mobile-standing-row{display:grid;grid-template-columns:30px 1fr auto;gap:9px;align-items:center;padding:11px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.mobile-standing-row.qualify{border-color:rgba(125,240,179,.28);background:rgba(125,240,179,.07)}.mobile-standing-row.third-ok{border-color:rgba(255,209,102,.28);background:rgba(255,209,102,.07)}.mobile-standing-main{min-width:0}.mobile-standing-points{text-align:right;font-weight:950}.mobile-standing-details{grid-column:2 / 4;color:var(--muted);font-size:12px;line-height:1.45}

    /* === Kupa48 Premium Pitch Theme Overrides: START === */
:root{
      --night:#050f0b;--pitch:#0d2318;--pitch2:#123321;--pitch3:#173d28;
      --panel:#0f2a1c;--panel2:#143726;--panel3:#1a4530;
      --text:#f5f1e6;--muted:#9fb6a8;
      --line:#20492f;--line-bright:#2c5c3c;
      --gold:#e7b64c;--gold-bright:#ffd873;--floodlight:#fff3cf;
      --good:#5fe3a0;--warn:#ffcf4d;--bad:#ff5d72;
      --ilker:#3fa9ff;--dogan:#3ee08c;--giray:#b083ff;--eren:#ff9d4d;
      --shadow:0 20px 55px rgba(0,0,0,.5);--radius:18px;
      --font-display:'Bebas Neue',Impact,sans-serif;
      --font-body:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      --font-mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    }
    *{box-sizing:border-box}
    ::selection{background:rgba(231,182,76,.35);color:#1a1206}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:var(--night)}
    ::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),#8a5f16);border-radius:99px;border:2px solid var(--night)}
    body{
      margin:0;color:var(--text);font-family:var(--font-body);min-height:100vh;
      background:
        radial-gradient(ellipse 900px 460px at 10% -8%,rgba(255,216,115,.13),transparent 60%),
        radial-gradient(ellipse 800px 500px at 105% 0%,rgba(63,169,255,.09),transparent 58%),
        radial-gradient(ellipse 700px 420px at 50% 110%,rgba(94,227,160,.06),transparent 60%),
        repeating-linear-gradient(180deg,rgba(255,255,255,.014) 0 46px,transparent 46px 92px),
        linear-gradient(180deg,var(--night) 0%,#030906 100%);
      background-attachment:fixed;
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer;color:#1a1206;font-family:var(--font-body);background:linear-gradient(135deg,var(--gold-bright),var(--gold) 70%);border-radius:12px;padding:10px 15px;font-weight:800;letter-spacing:.01em;box-shadow:0 10px 24px rgba(231,182,76,.25),inset 0 1px 0 rgba(255,255,255,.35);transition:transform .16s ease,box-shadow .16s ease,filter .16s ease}
    button:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(231,182,76,.38),inset 0 1px 0 rgba(255,255,255,.4)}
    button:active{transform:translateY(0) scale(.97)}
    button.secondary{background:rgba(255,255,255,.06);color:var(--text);box-shadow:none;border:1px solid var(--line-bright)}
    button.secondary:hover{background:rgba(255,255,255,.1);box-shadow:0 8px 18px rgba(0,0,0,.25)}
    button.ghost{background:transparent;border:1px solid var(--line);box-shadow:none;color:var(--muted)}
    button.ghost:hover{color:var(--text);border-color:var(--gold)}
    button.good{background:linear-gradient(135deg,#3ee08c,#1f9d6c);color:#04150c;box-shadow:0 10px 24px rgba(62,224,140,.25)}
    button.warn{background:linear-gradient(135deg,#ffcf4d,#b9821f);color:#241800;box-shadow:0 10px 24px rgba(255,207,77,.22)}
    button.bad{background:linear-gradient(135deg,#ff5d72,#a52f43);color:#2a0810;box-shadow:0 10px 24px rgba(255,93,114,.22)}
    button:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none;filter:grayscale(.4)}
    button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,.tab-btn:focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px}
    input,select,textarea{width:100%;background:#081a11;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px 12px;outline:none;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(231,182,76,.14)}
    textarea{min-height:80px;resize:vertical}
    .app{display:grid;grid-template-columns:276px 1fr;min-height:100vh}
    aside{position:sticky;top:0;height:100vh;padding:22px;background:rgba(5,15,11,.86);backdrop-filter:blur(20px);border-right:1px solid rgba(231,182,76,.1);overflow:auto}
    main{padding:24px;max-width:1720px;width:100%;margin:0 auto}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
    .brand-logo{width:48px;height:48px;border-radius:16px;background:radial-gradient(circle at 32% 28%,var(--gold-bright),var(--gold) 62%,#8a5f16 100%);display:grid;place-items:center;font-size:24px;box-shadow:0 0 0 3px rgba(231,182,76,.14),0 12px 30px rgba(231,182,76,.32);animation:trophyGlow 3.2s ease-in-out infinite}
    @keyframes trophyGlow{0%,100%{box-shadow:0 0 0 3px rgba(231,182,76,.14),0 12px 30px rgba(231,182,76,.32)}50%{box-shadow:0 0 0 6px rgba(231,182,76,.05),0 18px 42px rgba(231,182,76,.55)}}
    .brand h1{font-family:var(--font-display);font-size:26px;letter-spacing:.05em;margin:0;line-height:1;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
    .brand p{margin:5px 0 0;color:var(--muted);font-size:12px}
    nav{display:grid;gap:7px;margin:18px 0}
    .tab-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:1px solid transparent;border-left:3px solid transparent;box-shadow:none;padding:11px 12px;border-radius:12px;color:#cfe0d4;font-weight:600;transition:.18s ease}
    .tab-btn.active{background:linear-gradient(90deg,rgba(231,182,76,.16),rgba(231,182,76,.02));border-left:3px solid var(--gold);color:var(--floodlight)}
    .tab-btn:hover{background:rgba(255,255,255,.05);transform:translateX(2px)}
    .side-card{border:1px solid var(--line);border-top:2px solid rgba(231,182,76,.35);background:rgba(20,55,38,.55);border-radius:var(--radius);padding:14px;margin-top:18px}
    .side-card small{color:var(--muted);display:block;line-height:1.5}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}
    .title h2{font-family:var(--font-display);font-size:36px;letter-spacing:.02em;margin:0;color:var(--floodlight)}
    .title p{color:var(--muted);margin:6px 0 0;line-height:1.4}
    .actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
    .grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.cols-6{grid-template-columns:repeat(6,minmax(0,1fr))}
    .card{background:linear-gradient(180deg,rgba(20,55,38,.92),rgba(9,22,15,.95));border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);box-shadow:var(--shadow);padding:17px;overflow:hidden;position:relative;animation:cardIn .42s cubic-bezier(.2,.9,.3,1) both}
    .card::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55}
    @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .card h3{font-family:var(--font-display);letter-spacing:.03em;margin:0 0 12px;font-size:21px;color:var(--gold-bright);display:flex;align-items:center;gap:8px}
    .card h4{margin:0 0 9px;font-size:15px;color:#e8f2ea;font-weight:800}
    .muted{color:var(--muted)}.mini{font-size:12px;color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#132c1d;border:1px solid var(--line-bright);font-size:12px;font-weight:800}
    .pill.good{color:var(--good);border-color:rgba(95,227,160,.4);background:rgba(95,227,160,.09)}
    .pill.warn{color:var(--warn);border-color:rgba(255,207,77,.4);background:rgba(255,207,77,.09)}
    .pill.bad{color:var(--bad);border-color:rgba(255,93,114,.4);background:rgba(255,93,114,.09)}
    .owner-badge{display:inline-grid;place-items:center;min-width:24px;height:24px;border-radius:8px;color:#07101e;font-weight:950;font-size:12px;margin-left:7px;vertical-align:middle;box-shadow:0 3px 8px rgba(0,0,0,.35)}
    .owner-ilker{background:var(--ilker)}.owner-dogan{background:var(--dogan)}.owner-giray{background:var(--giray)}.owner-eren{background:var(--eren)}.owner-none{background:#5b6f61;color:#fff}
    .owner-dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:7px;box-shadow:0 0 0 2px rgba(255,255,255,.06)}
    .dot-ilker{background:var(--ilker)}.dot-dogan{background:var(--dogan)}.dot-giray{background:var(--giray)}.dot-eren{background:var(--eren)}
    table{width:100%;border-collapse:collapse;min-width:720px}
    th,td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;vertical-align:middle}
    th{color:var(--gold-bright);font-family:var(--font-display);font-size:13px;letter-spacing:.06em;text-transform:uppercase;background:rgba(0,0,0,.18)}
    td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
    .table-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.07)}
    tr{transition:background .15s}
    tr:hover td{background:rgba(255,255,255,.025)}
    tr.qualify{background:linear-gradient(90deg,rgba(95,227,160,.1),transparent);box-shadow:inset 3px 0 0 var(--good)}
    tr.third-ok{background:linear-gradient(90deg,rgba(255,207,77,.09),transparent);box-shadow:inset 3px 0 0 var(--warn)}
    tr.eliminated{opacity:.5;filter:grayscale(.35)}
    .team-line{display:flex;align-items:center;gap:7px;white-space:nowrap}
    .flag{font-size:20px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))}
    .team-name{font-weight:800}
    .group-chip{font-family:var(--font-display);font-weight:700;letter-spacing:.04em;color:var(--gold-bright)}
    .stat-card{display:flex;flex-direction:column;gap:4px;padding:15px;border-radius:16px;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);transition:transform .2s}
    .stat-card:hover{transform:translateY(-2px)}
    .stat-card strong{font-family:var(--font-mono);font-size:27px;font-weight:700;text-shadow:0 0 18px rgba(231,182,76,.28)}
    .stat-card span{font-size:12px;color:var(--muted)}
    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .team-pick{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;display:grid;gap:10px;transition:border-color .2s}
    .team-pick:hover{border-color:rgba(231,182,76,.3)}
    .team-pick-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .team-pick .group-chip{font-size:14px}
    .match-card{display:grid;grid-template-columns:1fr auto 1fr auto;gap:12px;align-items:center;padding:13px 15px;border-top:2px dashed rgba(231,182,76,.28);border-right:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);border-left:1px solid rgba(255,255,255,.07);background:linear-gradient(135deg,rgba(20,55,38,.85),rgba(9,22,15,.9));border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,.3);transition:transform .18s,box-shadow .18s}
    .match-card:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(0,0,0,.4)}
    .match-team{display:flex;align-items:center;gap:8px;min-width:0}
    .match-team.away{justify-content:flex-end;text-align:right}
    .scorebox{display:flex;gap:6px;align-items:center}
    .scorebox input{width:60px;text-align:center;font-weight:800;font-family:var(--font-mono)}
    .vs{color:var(--gold);font-weight:900;font-family:var(--font-display)}
    .match-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .match-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
    .stage-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .stage-filter button{padding:8px 12px}
    .stage-filter button.active{background:linear-gradient(135deg,var(--gold-bright),var(--gold));box-shadow:0 0 0 2px rgba(231,182,76,.3),0 10px 22px rgba(231,182,76,.3)}
    .bracket-scroll{overflow:auto;padding-bottom:10px}
    .bracket{display:flex;gap:18px;min-width:1250px}
    .round{width:230px;display:grid;gap:12px;align-content:start}
    .round h4{position:sticky;top:0;z-index:1;background:#0c2417;border:1px solid var(--line-bright);border-radius:12px;padding:10px;margin:0;text-align:center;font-family:var(--font-display);letter-spacing:.05em;color:var(--gold-bright)}
    .ko-card{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.035);border-radius:15px;padding:10px;display:grid;gap:8px;transition:.2s}
    .ko-card:hover{border-color:rgba(231,182,76,.3)}
    .ko-row{display:flex;justify-content:space-between;gap:8px;align-items:center;border-radius:10px;padding:8px;background:rgba(0,0,0,.16)}
    .ko-row.win{outline:1px solid rgba(95,227,160,.5);background:rgba(95,227,160,.09)}
    .ko-team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ko-score{font-weight:800;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
    .champion{background:linear-gradient(135deg,rgba(255,207,77,.16),rgba(255,243,207,.08));border-color:rgba(255,207,77,.5);animation:champGlow 2.6s ease-in-out infinite}
    @keyframes champGlow{0%,100%{box-shadow:0 0 0 rgba(231,182,76,0)}50%{box-shadow:0 0 34px rgba(231,182,76,.45)}}
    .leader-list{display:grid;gap:9px}
    .leader-item{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;padding:11px;border:1px solid rgba(255,255,255,.07);border-radius:14px;background:rgba(255,255,255,.035);transition:transform .15s}
    .leader-item:hover{transform:translateX(2px);border-color:rgba(231,182,76,.25)}
    .rank{width:30px;height:30px;border-radius:10px;background:#173d28;border:1px solid var(--line-bright);display:grid;place-items:center;font-weight:800;font-family:var(--font-mono);color:var(--gold-bright)}
    .leader-value{font-weight:800;font-size:18px;font-family:var(--font-mono);color:var(--floodlight)}
    .modal{position:fixed;inset:0;background:rgba(2,7,5,.78);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
    .modal.show{display:flex}
    .modal-content{width:min(1050px,96vw);max-height:92vh;overflow:auto;background:#0a1a12;border:1px solid rgba(231,182,76,.18);border-top:3px solid var(--gold);border-radius:22px;box-shadow:var(--shadow);padding:18px;animation:modalIn .32s cubic-bezier(.16,1,.3,1)}
    @keyframes modalIn{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}

<body>
<div class="app">
  <aside>
    <div class="brand"><div class="brand-logo">🏆</div><div><h1>Kupa48</h1><p>4 kullanıcı • 48 takım • Dünya Kupası formatı</p></div></div>
    <nav id="nav"></nav>
    <div class="side-card">
      <strong>Format</strong>
      <small>12 grup x 4 takım. İlk 2 takım + en iyi 8 üçüncü Son 32 turuna çıkar. Her takımın yanında sahibi görünür.</small>
    </div>
    <div class="side-card" id="ownerMini"></div>
  </aside>
  <main>
    <div class="topbar">
      <div class="title"><h2 id="pageTitle">Dashboard</h2><p id="pageDesc">Turnuva genel görünümü</p></div>
      <div class="actions">
        <button class="secondary" onclick="saveState(); toast('Kaydedildi')">Kaydet</button>
        <button class="ghost" onclick="exportJSON()">JSON Yedek Al</button>
        <button class="ghost" onclick="document.getElementById('importFile').click()">JSON Yükle</button>
        <input id="importFile" type="file" accept="application/json" class="hidden" onchange="importJSON(event)">
      </div>
    </div>
    <div id="appView"></div>
  </main>
</div>
<div id="mobileNav" class="mobile-bottom-nav"></div>

<div id="modal" class="modal" onclick="if(event.target.id==='modal') closeModal()">
  <div class="modal-content">
    <div class="modal-head">
      <div><h3 id="modalTitle">Maç Detayı</h3><p class="muted" id="modalSub"></p></div>
      <button class="secondary" onclick="closeModal()">Kapat</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const USERS = [
  {id:'ilker', name:'İlker', label:'İ', color:'ilker'},
  {id:'dogan', name:'Doğan', label:'D', color:'dogan'},
  {id:'giray', name:'Giray', label:'G', color:'giray'},
  {id:'eren', name:'Eren', label:'E', color:'eren'}
];
const GROUPS = {
  A:[['MEX','Meksika','🇲🇽'],['RSA','Güney Afrika','🇿🇦'],['KOR','Güney Kore','🇰🇷'],['CZE','Çekya','🇨🇿']],
  B:[['CAN','Kanada','🇨🇦'],['BIH','Bosna Hersek','🇧🇦'],['QAT','Katar','🇶🇦'],['SUI','İsviçre','🇨🇭']],
  C:[['BRA','Brezilya','🇧🇷'],['MAR','Fas','🇲🇦'],['HTI','Haiti','🇭🇹'],['SCO','İskoçya','🏴']],
  D:[['USA','ABD','🇺🇸'],['PAR','Paraguay','🇵🇾'],['AUS','Avustralya','🇦🇺'],['TUR','Türkiye','🇹🇷']],
  E:[['GER','Almanya','🇩🇪'],['CUW','Curaçao','🇨🇼'],['CIV','Fildişi Sahili','🇨🇮'],['ECU','Ekvador','🇪🇨']],
  F:[['NED','Hollanda','🇳🇱'],['JPN','Japonya','🇯🇵'],['SWE','İsveç','🇸🇪'],['TUN','Tunus','🇹🇳']],
  G:[['BEL','Belçika','🇧🇪'],['EGY','Mısır','🇪🇬'],['IRI','İran','🇮🇷'],['NZL','Yeni Zelanda','🇳🇿']],
  H:[['ESP','İspanya','🇪🇸'],['CPV','Yeşil Burun Adaları','🇨🇻'],['KSA','Suudi Arabistan','🇸🇦'],['URU','Uruguay','🇺🇾']],
  I:[['FRA','Fransa','🇫🇷'],['SEN','Senegal','🇸🇳'],['IRQ','Irak','🇮🇶'],['NOR','Norveç','🇳🇴']],
  J:[['ARG','Arjantin','🇦🇷'],['DZA','Cezayir','🇩🇿'],['AUT','Avusturya','🇦🇹'],['JOR','Ürdün','🇯🇴']],
  K:[['POR','Portekiz','🇵🇹'],['COD','DR Kongo','🇨🇩'],['UZB','Özbekistan','🇺🇿'],['COL','Kolombiya','🇨🇴']],
  L:[['ENG','İngiltere','🏴'],['CRO','Hırvatistan','🇭🇷'],['GHA','Gana','🇬🇭'],['PAN','Panama','🇵🇦']]
};
const TABS = [
  ['dashboard','📊','Dashboard','Genel istatistikler ve kullanıcı yarışı'],
  ['setup','🎲','Takım Sahipliği','48 takımı İlker, Doğan, Giray ve Eren’e dağıt'],
  ['groups','🏟️','Gruplar','12 gerçek Dünya Kupası grubu ve puan durumları'],
  ['fixtures','📝','Maç Girişi','Skor, golcü, asist ve maç istatistikleri'],
  ['knockout','🌳','Turnuva Ağacı','Son 32’den finale eleme ağacı'],
  ['stats','👑','Krallıklar','Gol krallığı, asist krallığı ve kullanıcı istatistikleri'],
  ['stars','⭐','Yıldızlar & Ödüller','Oyuncu puanları, haftanın 11’i, turnuvanın 11’i ve ödüller'],
  ['media','🗞️','Medya & Rekabet','Basın Odası, manşetler, power ranking, momentum ve turnuva hikayesi'],
  ['data','💾','Veri & Çıktı','Yedekleme, sıfırlama ve görsel indirme']
];
const pairTemplate = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
const LOCAL_STATE_KEY = 'kupa48-state';
const DIRTY_KEY = 'kupa48-local-dirty';
const DATA_URL = 'data/tournament.json';
const ASSET_PATHS = {
  hero: 'assets/img/stadium-hero.jpg',
  trophy: 'assets/img/trophy.png',
  final: 'assets/img/final-night.jpg',
  groups: 'assets/img/group-stage.jpg',
  fans: 'assets/img/fans.jpg',
  pattern: 'assets/img/pattern-gold.png',
  teamLogo: id => `assets/teams/${id}.svg`,
  userAvatar: id => `assets/users/${id}.jpg`
};
const initialLocalStateExists = !!localStorage.getItem(LOCAL_STATE_KEY);
let dataStatus = {
  source: initialLocalStateExists ? 'Tarayıcı kaydı' : 'Varsayılan dosya',
  loadedAt: null,
  remoteAvailable: false,
  dirty: localStorage.getItem(DIRTY_KEY)==='1',
  error: ''
};
let state = loadState() || createInitialState();
migrateState();
let activeTab = 'dashboard';
let fixtureFilter = {stage:'all', status:'all', group:'all', q:''};
let activeGroupTab = 'A';
let currentModalMatchId = null;

function createInitialState(){
  const teams=[];
  Object.entries(GROUPS).forEach(([group,arr])=>arr.forEach(([id,name,flag],idx)=>teams.push({id,name,flag,group,slot:idx+1,owner:null})));
  const st={version:6, createdAt:new Date().toISOString(), teams, matches:[], koMatches:[], notes:'', settings:{win:3, draw:1}, media:{hallOfFame:[], rosters:{}}};
  st.matches = generateGroupMatches(st.teams);
  return st;
}
function generateGroupMatches(teams){
  const matches=[];
  Object.keys(GROUPS).forEach(g=>{
    const ids=teams.filter(t=>t.group===g).sort((a,b)=>a.slot-b.slot).map(t=>t.id);
    pairTemplate.forEach((p,idx)=>matches.push(newMatch(`G-${g}-${idx+1}`,'GROUP',`Grup ${g}`,g,ids[p[0]],ids[p[1]],idx+1)));
  });
  return matches;
}
function migrateState(){
  if(!state || !Array.isArray(state.matches)) state=createInitialState();
  if(!Array.isArray(state.koMatches)) state.koMatches=[];
  if(!state.settings) state.settings={win:3,draw:1};
  if(!state.notes) state.notes='';
  if(!state.media) state.media={hallOfFame:[], rosters:{}};
  if(!Array.isArray(state.media.hallOfFame)) state.media.hallOfFame=[];
  if(!state.media.rosters) state.media.rosters={};
  state.teams.forEach(t=>{ if(t.stars===undefined) t.stars=defaultTeamStars(t.id); });
  allMatches().forEach(m=>{
    if(!Array.isArray(m.events)) m.events=[];
    if(!Array.isArray(m.ratings)) m.ratings=[];
    if(!Array.isArray(m.press)) m.press=[];
    if(!Array.isArray(m.liveLog)) m.liveLog=[];
    if(m.varNote===undefined) m.varNote='';
    if(!m.stats) m.stats={};
    ['shotsHome','shotsAway','onHome','onAway','possHome','possAway','cornersHome','cornersAway','yellowHome','yellowAway','redHome','redAway','motm'].forEach(k=>{if(m.stats[k]===undefined)m.stats[k]=k==='motm'?'':null});
  });
  state.version=6;
}
function newMatch(id,stage,stageName,group,home,away,order){return {id,stage,stageName,group,home,away,order,homeScore:null,awayScore:null,penHome:null,penAway:null,completed:false,events:[],ratings:[],press:[],liveLog:[],varNote:'',stats:{shotsHome:null,shotsAway:null,onHome:null,onAway:null,possHome:null,possAway:null,cornersHome:null,cornersAway:null,yellowHome:0,yellowAway:0,redHome:0,redAway:0,motm:''}}}
function loadState(){try{return JSON.parse(localStorage.getItem(LOCAL_STATE_KEY)||'')}catch(e){return null}}
function persistState(markDirty=true){
  localStorage.setItem(LOCAL_STATE_KEY,JSON.stringify(state));
  if(markDirty){
    localStorage.setItem(DIRTY_KEY,'1');
    dataStatus.dirty=true;
    dataStatus.source='Yerel değişiklik';
    dataStatus.loadedAt=new Date().toISOString();
  }
}
function saveState(){persistState(true); renderAll(false)}
function resetState(){if(confirm('Tüm turnuva verileri silinecek. Emin misiniz?')){state=createInitialState(); saveState(); renderAll(); toast('Turnuva sıfırlandı')}}
function toast(msg){const el=document.createElement('div'); el.textContent=msg; el.style.cssText='position:fixed;right:18px;bottom:18px;background:#17223d;border:1px solid #82e2ff;color:#fff;padding:12px 15px;border-radius:14px;z-index:50;box-shadow:0 14px 40px rgba(0,0,0,.35);font-weight:800'; document.body.appendChild(el); setTimeout(()=>el.remove(),2200)}

async function loadRemoteTournamentData(force=false, silent=false){
  try{
    dataStatus.error='';
    const res=await fetch(`${DATA_URL}?v=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const remote=await res.json();
    dataStatus.remoteAvailable=true;
    dataStatus.loadedAt=new Date().toISOString();
    const localDirty=localStorage.getItem(DIRTY_KEY)==='1';
    if(localDirty && !force){
      dataStatus.source='Yerel değişiklik korunuyor';
      dataStatus.dirty=true;
      renderAll(false);
      if(!silent) toast('Yerel değişiklik korunuyor. GitHub verisine dönmek için zorla yükle.');
      return;
    }
    state=remote;
    migrateState();
    localStorage.setItem(LOCAL_STATE_KEY,JSON.stringify(state));
    localStorage.removeItem(DIRTY_KEY);
    dataStatus.source='GitHub JSON';
    dataStatus.dirty=false;
    renderAll(false);
    if(!silent) toast('GitHub JSON verisi yüklendi');
  }catch(err){
    dataStatus.remoteAvailable=false;
    dataStatus.error='data/tournament.json okunamadı';
    renderAll(false);
    if(!silent) toast('GitHub JSON okunamadı');
  }
}
function markJsonPublished(){
  localStorage.removeItem(DIRTY_KEY);
  dataStatus.dirty=false;
  dataStatus.source='GitHub’a yüklenmiş kabul edildi';
  dataStatus.loadedAt=new Date().toISOString();
  renderAll(false);
  toast('Yerel değişiklik yayınlandı olarak işaretlendi');
}
function dataStatusLabel(){return dataStatus.dirty?'Yerel değişiklik var':(dataStatus.remoteAvailable?'GitHub JSON aktif':'Yerel / varsayılan')}
function formatDateTime(value){try{return value?new Date(value).toLocaleString('tr-TR'):'-'}catch(e){return '-'}}

function team(id){return state.teams.find(t=>t.id===id) || {id,name:'TBD',flag:'▫️',owner:null,group:'-'}}
function user(id){return USERS.find(u=>u.id===id)}
function ownerBadge(owner){const u=user(owner); if(!u) return '<span class="owner-badge owner-none">?</span>'; return `<span title="${u.name}" class="owner-badge owner-${u.color}">${u.label}</span>`}
function ownerName(owner){return user(owner)?.name || 'Sahipsiz'}
function teamLogo(id){return ASSET_PATHS.teamLogo(id)}
function teamLogoBadge(id, cls=''){
  const t=team(id)||{flag:'🏳️',name:id};
  return `<span class="team-logo-badge ${cls}" title="${safe(t.name)}"><img src="${teamLogo(id)}" alt="${safe(t.name)} logosu" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-grid'"><span class="logo-fallback">${t.flag||'🏳️'}</span></span>`;
}
function teamHTML(id, compact=false){
  const t=team(id);
  return `<span class="team-line team-line-logo">${teamLogoBadge(id)}<span class="team-name-block"><span class="team-name"><span class="flag mini-flag">${t.flag}</span>${t.name}</span>${compact?'':`<span class="mini">${t.id}</span>`}</span>${ownerBadge(t.owner)}</span>`;
}
function matchTitle(m){return `${team(m.home).name} - ${team(m.away).name}`}
function allMatches(){return [...state.matches, ...state.koMatches]}
function completedMatches(){return allMatches().filter(m=>m.completed && m.homeScore!==null && m.awayScore!==null)}
function scoreText(m){return m.homeScore===null||m.awayScore===null ? '-' : `${m.homeScore} - ${m.awayScore}${m.penHome!==null&&m.penAway!==null?` / Pen: ${m.penHome}-${m.penAway}`:''}`}
function getWinner(m){
  if(!m || !m.completed || m.homeScore===null || m.awayScore===null) return null;
  if(m.homeScore>m.awayScore) return m.home; if(m.awayScore>m.homeScore) return m.away;
  if(m.penHome!==null && m.penAway!==null){ if(m.penHome>m.penAway) return m.home; if(m.penAway>m.penHome) return m.away; }
  return null;
}
function getLoser(m){const w=getWinner(m); if(!w) return null; return w===m.home ? m.away : m.home}

function renderAll(keepTitle=true){renderNav(); renderMobileNav(); renderOwnerMini(); renderView(); if(keepTitle!==false) window.scrollTo({top:0,behavior:'smooth'})}
function renderNav(){document.getElementById('nav').innerHTML=TABS.map(t=>`<button class="tab-btn ${activeTab===t[0]?'active':''}" onclick="activeTab='${t[0]}'; renderAll()"><span>${t[1]}</span><span>${t[2]}</span></button>`).join('')}
function renderMobileNav(){const el=document.getElementById('mobileNav'); if(!el)return; const mobileTabs=[['dashboard','🏠','Ana'],['setup','🎲','Takım'],['fixtures','📝','Maç'],['groups','🏟️','Grup'],['knockout','🌳','Ağaç'],['media','🗞️','Medya'],['data','💾','Veri']]; el.innerHTML=mobileTabs.map(t=>`<button class="${activeTab===t[0]?'active':''}" onclick="activeTab='${t[0]}'; renderAll()"><span>${t[1]}</span><span>${t[2]}</span></button>`).join('')}
function setHeader(){const tab=TABS.find(t=>t[0]===activeTab); document.getElementById('pageTitle').textContent=tab[2]; document.getElementById('pageDesc').textContent=tab[3]}
function renderOwnerMini(){
  const counts=ownerCounts();
  document.getElementById('ownerMini').innerHTML='<strong>Kullanıcı Takımları</strong>'+USERS.map(u=>`<small><span class="owner-dot dot-${u.color}"></span>${u.name}: <b>${counts[u.id]||0}/12</b> takım</small>`).join('')+`<div class="sep"></div><small>Eksik/fazla dağılım varsa takım sahipliği ekranından düzeltilebilir.</small>`;
}
function renderView(){setHeader(); const root=document.getElementById('appView'); if(activeTab==='dashboard') root.innerHTML=viewDashboard(); if(activeTab==='setup') root.innerHTML=viewSetup(); if(activeTab==='groups') root.innerHTML=viewGroups(); if(activeTab==='fixtures') root.innerHTML=viewFixtures(); if(activeTab==='knockout') root.innerHTML=viewKnockout(); if(activeTab==='stats') root.innerHTML=viewStats(); if(activeTab==='stars') root.innerHTML=viewStars(); if(activeTab==='media') root.innerHTML=viewMedia(); if(activeTab==='data') root.innerHTML=viewData(); bindDynamic();}

function ownerCounts(){const c={ilker:0,dogan:0,giray:0,eren:0}; state.teams.forEach(t=>{if(c[t.owner]!==undefined)c[t.owner]++}); return c;}
function ownershipOk(){return USERS.every(u=>ownerCounts()[u.id]===12)}
function autoDraft(){
  const shuffled=[...state.teams].sort(()=>Math.random()-0.5); const owners=USERS.flatMap(u=>Array(12).fill(u.id)).sort(()=>Math.random()-0.5);
  shuffled.forEach((t,i)=>t.owner=owners[i]); saveState(); toast('48 takım 4 kullanıcıya 12’şer dağıtıldı');
}
function clearOwners(){if(confirm('Tüm takım sahipleri temizlensin mi?')){state.teams.forEach(t=>t.owner=null); saveState();}}
function changeOwner(teamId, owner){const t=team(teamId); t.owner=owner||null; saveState();}

function standingsForGroup(g){
  const rows=state.teams.filter(t=>t.group===g).map(t=>({id:t.id,group:g,p:0,o:0,g:0,b:0,m:0,ag:0,yg:0,av:0,conduct:0}));
  const by=Object.fromEntries(rows.map(r=>[r.id,r]));
  state.matches.filter(m=>m.group===g && m.completed && m.homeScore!==null && m.awayScore!==null).forEach(m=>{
    const h=by[m.home], a=by[m.away]; if(!h||!a)return;
    h.o++; a.o++; h.ag+=Number(m.homeScore); h.yg+=Number(m.awayScore); a.ag+=Number(m.awayScore); a.yg+=Number(m.homeScore);
    h.conduct += Number(m.stats.yellowHome||0)+Number(m.stats.redHome||0)*3; a.conduct += Number(m.stats.yellowAway||0)+Number(m.stats.redAway||0)*3;
    if(m.homeScore>m.awayScore){h.g++; a.m++; h.p+=state.settings.win}
    else if(m.homeScore<m.awayScore){a.g++; h.m++; a.p+=state.settings.win}
    else {h.b++; a.b++; h.p+=state.settings.draw; a.p+=state.settings.draw}
  });
  rows.forEach(r=>r.av=r.ag-r.yg);
  return rows.sort(sortStanding);
}
function sortStanding(a,b){return b.p-a.p || b.av-a.av || b.ag-a.ag || a.conduct-b.conduct || team(a.id).name.localeCompare(team(b.id).name,'tr')}
function allStandings(){return Object.keys(GROUPS).flatMap(g=>standingsForGroup(g).map((r,i)=>({...r,rank:i+1})))}
function bestThirds(){return Object.keys(GROUPS).map(g=>({...standingsForGroup(g)[2], thirdRank:null})).sort(sortStanding).map((r,i)=>({...r,thirdRank:i+1,qualified:i<8}))}
function groupComplete(g){return state.matches.filter(m=>m.group===g).every(m=>m.completed)}
function groupsComplete(){return Object.keys(GROUPS).every(groupComplete)}
function qualifiers(){
  const q=[];
  Object.keys(GROUPS).forEach(g=>{const s=standingsForGroup(g); q.push({...s[0],qualType:'1.'}); q.push({...s[1],qualType:'2.'});});
  bestThirds().filter(x=>x.qualified).forEach(x=>q.push({...x,qualType:'3.'}));
  return q;
}

function leaderboards(){
  const goals={}, assists={}, ga={};
  allMatches().forEach(m=>m.events.forEach(ev=>{
    const tid=ev.teamId; const tm=team(tid); const owner=tm.owner;
    if(ev.scorer && ev.type!=='own_goal'){
      const key=(ev.scorer.trim().toLocaleLowerCase('tr')+'|'+tid); if(!goals[key]) goals[key]={name:ev.scorer.trim(),teamId:tid,owner,goals:0,assists:0}; goals[key].goals++;
    }
    if(ev.assist && ev.type!=='penalty' && ev.type!=='own_goal'){
      const key=(ev.assist.trim().toLocaleLowerCase('tr')+'|'+tid); if(!assists[key]) assists[key]={name:ev.assist.trim(),teamId:tid,owner,assists:0}; assists[key].assists++;
    }
  }));
  Object.values(goals).forEach(g=>{const a=Object.values(assists).find(x=>x.name.toLocaleLowerCase('tr')===g.name.toLocaleLowerCase('tr')&&x.teamId===g.teamId); if(a)g.assists=a.assists});
  return {goals:Object.values(goals).sort((a,b)=>b.goals-a.goals||b.assists-a.assists), assists:Object.values(assists).sort((a,b)=>b.assists-a.assists)};
}
function teamDeepestStages(){
  const stageVal={R32:5,R16:8,QF:12,SF:18,THIRD:18,FINAL:25,CHAMPION:40}; const d={};
  qualifiers().forEach(q=>d[q.id]=Math.max(d[q.id]||0,stageVal.R32));
  state.koMatches.forEach(m=>{[m.home,m.away].forEach(id=>{if(id)d[id]=Math.max(d[id]||0,stageVal[m.stage]||0)}); if(m.stage==='FINAL'){const w=getWinner(m); if(w)d[w]=Math.max(d[w]||0,stageVal.CHAMPION)}});
  return d;
}
function userScores(){
  const rows=USERS.map(u=>({id:u.id,name:u.name,label:u.label,color:u.color,teams:0,played:0,w:0,d:0,l:0,gf:0,ga:0,av:0,groupPoints:0,bonus:0,playerBonus:0,total:0,advanced:0,champions:0,motm:0,xi:0})); const by=Object.fromEntries(rows.map(r=>[r.id,r]));
  state.teams.forEach(t=>{if(by[t.owner])by[t.owner].teams++});
  completedMatches().forEach(m=>{
    [[m.home,m.homeScore,m.awayScore],[m.away,m.awayScore,m.homeScore]].forEach(([tid,gf,ga])=>{const o=team(tid).owner; if(!by[o])return; const r=by[o]; r.played++; r.gf+=Number(gf); r.ga+=Number(ga); if(gf>ga){r.w++; if(m.stage==='GROUP')r.groupPoints+=state.settings.win}else if(gf<ga)r.l++; else {r.d++; if(m.stage==='GROUP')r.groupPoints+=state.settings.draw}})
  });
  const deep=teamDeepestStages(); Object.entries(deep).forEach(([tid,val])=>{const o=team(tid).owner; if(by[o]){by[o].bonus+=val; if(val>=5)by[o].advanced++; if(val===40)by[o].champions++;}});
  const lbs=leaderboards(); lbs.goals.forEach(x=>{if(by[x.owner])by[x.owner].playerBonus+=x.goals}); lbs.assists.forEach(x=>{if(by[x.owner])by[x.owner].playerBonus+=x.assists});
  completedMatches().forEach(m=>{const motm=matchMOTM(m); if(motm && by[motm.owner]){by[motm.owner].playerBonus+=3; by[motm.owner].motm++;}});
  ['md1','md2','md3','group','R32','R16','QF','SF','FINAL','all'].forEach(period=>teamOfPeriod(period).forEach(p=>{if(by[p.owner]){by[p.owner].playerBonus+=period==='all'?5:2; by[p.owner].xi++;}}));
  rows.forEach(r=>{r.av=r.gf-r.ga; r.total=r.groupPoints+r.bonus+r.playerBonus}); return rows.sort((a,b)=>b.total-a.total||b.av-a.av||b.gf-a.gf);
}

e)"><button class="secondary" onclick="activeTab='knockout'; renderAll()">Turnuva Ağacı</button><button onclick="saveState()">Kaydet</button></div><div class="grid">${matches.map(matchEntryCard).join('')||'<div class="notice">Filtreye uygun maç yok.</div>'}</div>`}

function createKnockout(){
  const q=qualifiers(); if(q.length<32){toast('Son 32 için 32 takım oluşmadı'); return}
  const seed = q.sort((a,b)=> (a.qualType.localeCompare(b.qualType,'tr') || b.p-a.p || b.av-a.av || b.ag-a.ag || a.group.localeCompare(b.group))).map(x=>x.id);
  const ko=[]; for(let i=0;i<16;i++){ko.push(newMatch(`KO-R32-${i+1}`,'R32','Son 32',null,seed[i],seed[31-i],i+1));}
  for(let i=0;i<8;i++)ko.push(newMatch(`KO-R16-${i+1}`,'R16','Son 16',null,null,null,i+1));
  for(let i=0;i<4;i++)ko.push(newMatch(`KO-QF-${i+1}`,'QF','Çeyrek Final',null,null,null,i+1));
  for(let i=0;i<2;i++)ko.push(newMatch(`KO-SF-${i+1}`,'SF','Yarı Final',null,null,null,i+1));
  ko.push(newMatch('KO-THIRD-1','THIRD','Üçüncülük',null,null,null,1));
  ko.push(newMatch('KO-FINAL-1','FINAL','Final',null,null,null,1));
  state.koMatches=ko; updateKnockoutProgress(false); saveState(); activeTab='knockout'; renderAll(); toast('Son 32 ağacı oluşturuldu');
}
function resetKnockout(){if(confirm('Eleme ağacı ve eleme maçları silinsin mi?')){state.koMatches=[]; saveState();}}
function updateKnockoutProgress(shouldSave=true){
  const byStage=s=>state.koMatches.filter(m=>m.stage===s).sort((a,b)=>a.order-b.order);
  const fill=(from,to)=>{const f=byStage(from), t=byStage(to); t.forEach((m,i)=>{m.home=getWinner(f[i*2]) || m.home; m.away=getWinner(f[i*2+1]) || m.away;});};
  fill('R32','R16'); fill('R16','QF'); fill('QF','SF');
  const sf=byStage('SF'), final=byStage('FINAL')[0], third=byStage('THIRD')[0]; if(final){final.home=getWinner(sf[0])||final.home; final.away=getWinner(sf[1])||final.away;} if(third){third.home=getLoser(sf[0])||third.home; third.away=getLoser(sf[1])||third.away;}
  if(shouldSave) saveState();
}
function viewKnockout(){const can=qualifiers().length===32; return `<div class="actions" style="justify-content:flex-start;margin-bottom:14px"><button onclick="createKnockout()" ${!can?'disabled':''}>Son 32 Ağacını Oluştur / Yenile</button><button class="secondary" onclick="exportBracketPNG()">Turnuva Ağacını PNG İndir</button><button class="ghost" onclick="resetKnockout()">Eleme Ağacını Sıfırla</button></div>${!can?'<div class="notice warn">Son 32 için grup tablolarından 32 takım belirlenmeli. Şu an otomatik önizleme yapılır; eksik grup maçları varsa sıralama geçici olabilir.</div>':''}${state.koMatches.length?bracketHTML():'<div class="notice">Henüz eleme ağacı oluşturulmadı. Grup maçlarını girip “Son 32 Ağacını Oluştur” butonuna bas.</div>'}<div class="footer-note">Not: Bu dosya, 48 takımlı formatın çıkış mantığını kullanır. FIFA’nın üçüncü takım kombinasyonları turnuva akışına göre değişebildiği için Son 32 eşleşmeleri uygulama içinde dengeli seedleme ile oluşturulur; istenirse maç detayından manuel düzenlenebilir.</div>`}
function bracketHTML(){const stages=[['R32','Son 32'],['R16','Son 16'],['QF','Çeyrek'],['SF','Yarı Final'],['THIRD','3.lük'],['FINAL','Final']]; return `<div class="round-tabs mobile-only">${stages.map(([s,name],i)=>`<button onclick="document.querySelectorAll('.round')[${i}]?.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'})">${name}</button>`).join('')}</div><div class="bracket-scroll"><div class="bracket" id="bracketView">${stages.map(([s,name])=>`<div class="round"><h4>${name}</h4>${state.koMatches.filter(m=>m.stage===s).sort((a,b)=>a.order-b.order).map(koCard).join('')}</div>`).join('')}</div></div>`}
