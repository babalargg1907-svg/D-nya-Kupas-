const POSITIONS=['GK','RB','CB','LB','CDM','CM','CAM','RW','LW','ST'];
const STAR_PERIODS=[['md1','1. Hafta 11’i'],['md2','2. Hafta 11’i'],['md3','3. Hafta 11’i'],['group','Grup Aşaması 11’i'],['R32','Son 32 11’i'],['R16','Son 16 11’i'],['QF','Çeyrek Final 11’i'],['SF','Yarı Final 11’i'],['FINAL','Final 11’i'],['all','Turnuvanın 11’i']];
let starSubTab='xi'; let xiPeriod='all';
function safe(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function ratingMatches(period='all'){
  return allMatches().filter(m=>{
    if(period==='all') return true;
    if(period==='group') return m.stage==='GROUP';
    if(period==='md1') return m.stage==='GROUP' && [1,2].includes(m.order);
    if(period==='md2') return m.stage==='GROUP' && [3,4].includes(m.order);
    if(period==='md3') return m.stage==='GROUP' && [5,6].includes(m.order);
    return m.stage===period;
  });
}
function matchMOTM(m){const list=[...(m.ratings||[])].filter(r=>r.player&&r.rating!==undefined); if(list.length)return list.sort((a,b)=>Number(b.rating||0)-Number(a.rating||0))[0]; if(m.stats?.motm)return {player:m.stats.motm,teamId:m.home,position:'-',rating:0,owner:team(m.home).owner}; return null}
function allRatings(period='all'){
  return ratingMatches(period).flatMap(m=>(m.ratings||[]).map(r=>({...r,matchId:m.id,stage:m.stage,stageName:m.stageName,matchOrder:m.order,owner:team(r.teamId).owner,home:m.home,away:m.away,completed:m.completed})));
}
function positionBucket(pos){if(pos==='GK')return 'GK'; if(['RB','CB','LB'].includes(pos))return 'DEF'; if(['CDM','CM','CAM'].includes(pos))return 'MID'; return 'FWD'}
function playerStats(period='all'){
  const map={}; const ratings=allRatings(period);
  ratings.forEach(r=>{const key=r.player.trim().toLocaleLowerCase('tr')+'|'+r.teamId; if(!map[key])map[key]={key,name:r.player.trim(),teamId:r.teamId,owner:r.owner,position:r.position||'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].ratings.push(Number(r.rating||0)); map[key].matches.add(r.matchId); if(r.position)map[key].position=r.position;});
  ratingMatches(period).forEach(m=>{
    (m.events||[]).forEach(ev=>{if(ev.scorer&&ev.type!=='own_goal'){const key=ev.scorer.trim().toLocaleLowerCase('tr')+'|'+ev.teamId; if(!map[key])map[key]={key,name:ev.scorer.trim(),teamId:ev.teamId,owner:team(ev.teamId).owner,position:'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].goals++; map[key].matches.add(m.id)} if(ev.assist&&ev.type!=='own_goal'&&ev.type!=='penalty'){const key=ev.assist.trim().toLocaleLowerCase('tr')+'|'+ev.teamId; if(!map[key])map[key]={key,name:ev.assist.trim(),teamId:ev.teamId,owner:team(ev.teamId).owner,position:'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].assists++; map[key].matches.add(m.id)}});
    const motm=matchMOTM(m); if(motm&&motm.player){const key=motm.player.trim().toLocaleLowerCase('tr')+'|'+motm.teamId; if(!map[key])map[key]={key,name:motm.player.trim(),teamId:motm.teamId,owner:team(motm.teamId).owner,position:motm.position||'-',ratings:[],matches:new Set(),goals:0,assists:0,motm:0}; map[key].motm++;}
  });
  return Object.values(map).map(p=>{const avg=p.ratings.length?p.ratings.reduce((a,b)=>a+b,0)/p.ratings.length:0; return {...p,apps:p.matches.size,avg,totalRating:p.ratings.reduce((a,b)=>a+b,0),ga:p.goals+p.assists}}).sort((a,b)=>b.avg-a.avg||b.ga-a.ga||b.goals-a.goals);
}
function pickBest(list,filter,count,used){const picked=[]; list.filter(filter).forEach(p=>{if(picked.length<count && !used.has(p.key)){picked.push(p); used.add(p.key)}}); while(picked.length<count)picked.push(null); return picked}
function teamOfPeriod(period='all'){
  const list=playerStats(period).filter(p=>p.avg>0).sort((a,b)=>b.avg-a.avg||b.ga-a.ga||b.goals-a.goals); const used=new Set();
  return [...pickBest(list,p=>p.position==='GK'||positionBucket(p.position)==='GK',1,used),...pickBest(list,p=>['RB','CB','LB'].includes(p.position)||positionBucket(p.position)==='DEF',4,used),...pickBest(list,p=>['CDM','CM','CAM'].includes(p.position)||positionBucket(p.position)==='MID',3,used),...pickBest(list,p=>['RW','LW','ST'].includes(p.position)||positionBucket(p.position)==='FWD',3,used)].filter(Boolean);
}
function xiCard(p){return p?`<div class="xi-card"><span class="position-pill">${p.position}</span><div class="player">${safe(p.name)}</div><div class="mini">${teamHTML(p.teamId,true)}</div><div class="xi-rating">${p.avg.toFixed(1)}</div><div class="mini">${p.goals}G · ${p.assists}A · ${p.apps}M</div></div>`:`<div class="xi-card empty"><span class="position-pill">-</span><div class="player">Boş</div><div class="mini">Puan girildikçe dolar</div></div>`}
function xiPitch(period='all'){
  const xi=teamOfPeriod(period); const by={GK:null,DEF:[],MID:[],FWD:[]}; xi.forEach(p=>{if(positionBucket(p.position)==='GK')by.GK=p; else by[positionBucket(p.position)].push(p)});
  return `<div class="xi-pitch"><div class="xi-line line-3">${[0,1,2].map(i=>xiCard(by.FWD[i])).join('')}</div><div class="xi-line line-3">${[0,1,2].map(i=>xiCard(by.MID[i])).join('')}</div><div class="xi-line line-4">${[0,1,2,3].map(i=>xiCard(by.DEF[i])).join('')}</div><div class="xi-line line-1">${xiCard(by.GK)}</div></div>`
}
function viewStars(){return `<div class="star-tabs">${[['xi','Haftanın 11’i'],['players','Oyuncu Profilleri'],['awards','Ödüller'],['records','Rekorlar'],['reports','Maç Raporları']].map(([id,name])=>`<button class="${starSubTab===id?'active':''}" onclick="starSubTab='${id}'; renderAll(false)">${name}</button>`).join('')}</div>${starSubTab==='xi'?viewXI():starSubTab==='players'?viewPlayers():starSubTab==='awards'?viewAwards():starSubTab==='records'?viewRecords():viewReports()}`}
function viewXI(){return `<div class="card"><h3>⭐ 4-3-3 En İyi 11</h3><p class="muted">Oyuncu puanlarını maç detayından gir. Sistem pozisyona göre 1 kaleci, 4 defans, 3 orta saha ve 3 forvet seçer.</p><div class="stage-filter">${STAR_PERIODS.map(([id,name])=>`<button class="${xiPeriod===id?'active':''}" onclick="xiPeriod='${id}'; renderAll(false)">${name}</button>`).join('')}</div>${xiPitch(xiPeriod)}</div><div class="card" style="margin-top:16px"><h3>📋 ${STAR_PERIODS.find(x=>x[0]===xiPeriod)?.[1]||'Turnuvanın 11’i'} Detay Tablosu</h3>${playerRatingTable(teamOfPeriod(xiPeriod))}</div>`}
function playerRatingTable(rows){return `<div class="table-wrap"><table><thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Poz.</th><th class="num">Ort.</th><th class="num">Maç</th><th class="num">Gol</th><th class="num">Asist</th><th class="num">MOTM</th></tr></thead><tbody>${rows.map((p,i)=>`<tr><td>${i+1}</td><td><b>${safe(p.name)}</b></td><td>${teamHTML(p.teamId)}</td><td>${p.position}</td><td class="num"><b>${p.avg.toFixed(2)}</b></td><td class="num">${p.apps}</td><td class="num">${p.goals}</td><td class="num">${p.assists}</td><td class="num">${p.motm}</td></tr>`).join('')||'<tr><td colspan="9">Henüz oyuncu puanı yok.</td></tr>'}</tbody></table></div>`}
function viewPlayers(){const rows=playerStats('all'); return `<div class="grid cols-2"><div class="card"><h3>🏅 Oyuncu Puan Liderliği</h3>${playerRatingTable(rows.slice(0,50))}</div><div class="card"><h3>🔎 Oyuncu Kartları</h3><div class="grid">${rows.slice(0,20).map(p=>`<div class="player-profile-card"><h4>${safe(p.name)} <span class="position-pill">${p.position}</span></h4><div class="mini">${teamHTML(p.teamId,true)}</div><div class="sep"></div><div class="grid cols-4"><div><b>${p.avg.toFixed(1)}</b><div class="mini">Ort.</div></div><div><b>${p.goals}</b><div class="mini">Gol</div></div><div><b>${p.assists}</b><div class="mini">Asist</div></div><div><b>${p.motm}</b><div class="mini">MOTM</div></div></div></div>`).join('')||'<p class="muted">Oyuncu puanı girildiğinde profiller oluşacak.</p>'}</div></div></div>`}
function awards(){const ps=playerStats('all'); const lbs=leaderboards(); const topUser=userScores()[0]; const bestGK=ps.filter(p=>p.position==='GK').sort((a,b)=>b.avg-a.avg)[0]; const final=state.koMatches.find(m=>m.stage==='FINAL'); const champion=final?getWinner(final):null; return {goldenBall:ps.filter(p=>p.apps>=Math.min(2,completedMatches().length||1)).sort((a,b)=>(b.avg*2+b.ga*.4+b.motm*.8)-(a.avg*2+a.ga*.4+a.motm*.8))[0],goldenBoot:lbs.goals[0],assistKing:lbs.assists[0],goldenGlove:bestGK,bestUser:topUser,champion:champion?team(champion):null,dramatic:dramaticMatch(),bestXI:teamOfPeriod('all')};}
function awardCard(icon,title,main,sub){return `<div class="award-card"><div class="award-icon">${icon}</div><strong>${main||'-'}</strong><div class="mini">${title}</div>${sub?`<div class="sep"></div><div class="muted">${sub}</div>`:''}</div>`}
function viewAwards(){const a=awards(); return `<div class="card"><h3>🏆 Kupa48 Ödül Töreni</h3><div class="award-grid">${awardCard('🏆','Şampiyon',a.champion?a.champion.name:'Henüz belli değil',a.champion?`${a.champion.flag} ${ownerName(a.champion.owner)} ${ownerBadge(a.champion.owner)}`:'Final oynanınca dolar')}${awardCard('🥇','Altın Top',a.goldenBall?.name,a.goldenBall?`${team(a.goldenBall.teamId).name} • Ort. ${a.goldenBall.avg.toFixed(2)} • ${a.goldenBall.goals}G ${a.goldenBall.assists}A`:'Oyuncu puanı gir')}${awardCard('⚽','Altın Ayakkabı',a.goldenBoot?.name,a.goldenBoot?`${team(a.goldenBoot.teamId).name} • ${a.goldenBoot.goals} gol`:'Gol detayı gir')}${awardCard('🎯','Asist Kralı',a.assistKing?.name,a.assistKing?`${team(a.assistKing.teamId).name} • ${a.assistKing.assists} asist`:'Asist detayı gir')}${awardCard('🧤','Altın Eldiven',a.goldenGlove?.name,a.goldenGlove?`${team(a.goldenGlove.teamId).name} • Ort. ${a.goldenGlove.avg.toFixed(2)}`:'GK puanı gir')}${awardCard('👑','En İyi Kullanıcı',a.bestUser?.name,a.bestUser?`${a.bestUser.total} puan • ${a.bestUser.advanced} takım üst tur`:'Veri yok')}${awardCard('🎭','En Dramatik Maç',a.dramatic?`${team(a.dramatic.home).name} ${scoreText(a.dramatic)} ${team(a.dramatic.away).name}`:'-',a.dramatic?`${a.dramatic.stageName} • ${totalGoalsInMatch(a.dramatic)} gol`:'Maçlar oynandıkça dolar')}</div></div><div class="card" style="margin-top:16px"><h3>🌟 Turnuvanın 11’i</h3>${xiPitch('all')}</div><div class="card" style="margin-top:16px"><h3>📊 Kullanıcı Güç Sıralaması</h3>${powerRanking()}</div>`}
function totalGoalsInMatch(m){return Number(m.homeScore||0)+Number(m.awayScore||0)}
function dramaticMatch(){return completedMatches().sort((a,b)=>(totalGoalsInMatch(b)+(b.penHome!==null?2:0))-(totalGoalsInMatch(a)+(a.penHome!==null?2:0)))[0]}
function powerRanking(){const rows=userScores(); const max=Math.max(...rows.map(r=>r.total),1); return rows.map(r=>`<div class="power-row"><div><span class="owner-dot dot-${r.color}"></span>${r.name}</div><div class="power-track"><div class="power-fill" style="width:${Math.max(5,(r.total/max)*100)}%"></div></div><b>${r.total}</b></div>`).join('')}
function viewRecords(){const ps=playerStats('all'); const ms=completedMatches(); const mostGoalsTeam=allStandings().sort((a,b)=>b.ag-a.ag)[0]; const leastConcede=allStandings().filter(r=>r.o>0).sort((a,b)=>a.yg-b.yg||b.p-a.p)[0]; const earliest=allMatches().flatMap(m=>(m.events||[]).map(ev=>({...ev,match:m}))).filter(e=>e.minute).sort((a,b)=>Number(a.minute)-Number(b.minute))[0]; const latest=allMatches().flatMap(m=>(m.events||[]).map(ev=>({...ev,match:m}))).filter(e=>e.minute).sort((a,b)=>Number(b.minute)-Number(a.minute))[0]; const highRating=allRatings('all').sort((a,b)=>Number(b.rating)-Number(a.rating))[0]; const bigWin=ms.slice().sort((a,b)=>Math.abs((b.homeScore||0)-(b.awayScore||0))-Math.abs((a.homeScore||0)-(a.awayScore||0)))[0]; return `<div class="record-grid">${recordCard('En gollü maç',ms.sort((a,b)=>totalGoalsInMatch(b)-totalGoalsInMatch(a))[0])}${recordCard('En farklı galibiyet',bigWin)}${simpleRecord('En erken gol',earliest?`${earliest.minute}' ${safe(earliest.scorer)} - ${team(earliest.teamId).name}`:'-')}${simpleRecord('En geç gol',latest?`${latest.minute}' ${safe(latest.scorer)} - ${team(latest.teamId).name}`:'-')}${simpleRecord('En yüksek oyuncu puanı',highRating?`${safe(highRating.player)} • ${team(highRating.teamId).name} • ${Number(highRating.rating).toFixed(1)}`:'-')}${simpleRecord('En çok gol atan takım',mostGoalsTeam?`${team(mostGoalsTeam.id).name} • ${mostGoalsTeam.ag} gol`:'-')}${simpleRecord('En az gol yiyen takım',leastConcede?`${team(leastConcede.id).name} • ${leastConcede.yg} gol`:'-')}${simpleRecord('En çok MOTM',ps[0]?`${ps.sort((a,b)=>b.motm-a.motm)[0].name} • ${ps.sort((a,b)=>b.motm-a.motm)[0].motm}`:'-')}</div>`}
function recordCard(title,m){return `<div class="record-card"><h4>${title}</h4><div>${m?`${teamHTML(m.home,true)} <b>${scoreText(m)}</b> ${teamHTML(m.away,true)}`:'-'}</div><div class="mini">${m?m.stageName:''}</div></div>`}
function simpleRecord(title,val){return `<div class="record-card"><h4>${title}</h4><div>${val}</div></div>`}
function matchReport(m){if(!m.completed)return '<p class="muted">Maç tamamlanınca otomatik rapor oluşur.</p>'; const w=getWinner(m), l=getLoser(m); const motm=matchMOTM(m); const goals=[...(m.events||[])].filter(e=>e.type!=='own_goal'); const topScorer=goals.reduce((acc,e)=>{acc[e.scorer]=(acc[e.scorer]||0)+1;return acc},{}) ; const topName=Object.entries(topScorer).sort((a,b)=>b[1]-a[1])[0]; const winnerText=w?`${team(w).name} ${ownerBadge(team(w).owner)}, ${team(l).name} karşısında ${scoreText(m)} kazanarak önemli bir sonuç aldı.`:`${team(m.home).name} ile ${team(m.away).name} ${scoreText(m)} berabere kaldı.`; return `<div class="report-card"><b>${team(m.home).flag} ${team(m.home).name} ${scoreText(m)} ${team(m.away).flag} ${team(m.away).name}</b><p>${winnerText} ${topName?`${safe(topName[0])} ${topName[1]} golle öne çıktı.`:''} ${motm?`Maçın adamı ${safe(motm.player)} oldu; puanı ${Number(motm.rating||0).toFixed(1)}.`:''}</p><div class="mini">${m.stageName} ${m.group?`• ${m.group} Grubu`:''}</div></div>`}
function viewReports(){const ms=completedMatches().slice().reverse(); return `<div class="grid">${ms.map(m=>matchReport(m)).join('')||'<div class="notice">Maç tamamlandıkça otomatik maç raporları burada görünecek.</div>'}</div>`}


let mediaSubTab='home';
function defaultTeamStars(id){const five=['ARG','BRA','FRA','ENG','ESP','GER','POR']; const four=['NED','BEL','URU','CRO','COL','USA','MEX']; const three=['SUI','MAR','SEN','JPN','SWE','AUS','TUR','KOR','AUT','NOR','DEN','ECU','GHA','PAR']; const two=['CAN','EGY','IRI','SCO','CIV','KSA','UZB','DZA','QAT','BIH','CZE','TUN','PAN']; if(five.includes(id))return 5; if(four.includes(id))return 4; if(three.includes(id))return 3; if(two.includes(id))return 2; return 1;}
function changeTeamStars(teamId,val){const t=team(teamId); t.stars=Number(val)||defaultTeamStars(teamId); saveState(); toast(`${t.name} beklenti seviyesi güncellendi`)}
function stageWeight(stage){return {GROUP:1,R32:2,R16:3,QF:4,SF:5,THIRD:5,FINAL:6}[stage]||1}
function achievedStageName(id){let best='Grup'; let val=0; const q=qualifiers().find(x=>x.id===id); if(q){best='Son 32'; val=2} state.koMatches.forEach(m=>{if(m.home===id||m.away===id){const map={R32:['Son 32',2],R16:['Son 16',3],QF:['Çeyrek Final',4],SF:['Yarı Final',5],THIRD:['Üçüncülük',5],FINAL:['Final',6]}; if(map[m.stage]&&map[m.stage][1]>=val){best=map[m.stage][0]; val=map[m.stage][1];}}}); const final=state.koMatches.find(m=>m.stage==='FINAL'); if(final&&getWinner(final)===id){best='Şampiyon'; val=7} return {name:best,value:val};}
function expectedStageValue(stars){return {1:1,2:1.5,3:2.2,4:3.2,5:4.2}[Number(stars)||1]||1}
function teamForm(teamId){return completedMatches().filter(m=>m.home===teamId||m.away===teamId).map(m=>{const gf=m.home===teamId?m.homeScore:m.awayScore; const ga=m.home===teamId?m.awayScore:m.homeScore; if(gf>ga)return 'G'; if(gf<ga)return 'M'; return 'B';});}
function momentumForTeam(teamId){const f=teamForm(teamId).slice(-4); const pts=f.reduce((s,x)=>s+(x==='G'?3:x==='B'?1:0),0); if(f.length>=3 && pts>=9)return {label:'Alev Aldı',icon:'🔥',score:95}; if(pts>=6)return {label:'Yükseliyor',icon:'📈',score:78}; if(pts>=3)return {label:'Dengeli',icon:'⚖️',score:55}; if(f.length>=2 && pts<=1)return {label:'Krizde',icon:'🚨',score:25}; return {label:'Düşüşte',icon:'📉',score:38};}
function teamRatingAverage(teamId){const list=allRatings('all').filter(r=>r.teamId===teamId); return list.length?list.reduce((s,r)=>s+Number(r.rating||0),0)/list.length:0;}
function motmCountForTeam(teamId){return completedMatches().filter(m=>{const x=matchMOTM(m); return x&&x.teamId===teamId}).length;}
function teamPowerRows(){return state.teams.map(t=>{const s=allStandings().find(r=>r.id===t.id)||{p:0,av:0,ag:0,yg:0,o:0}; const avg=teamRatingAverage(t.id); const deep=achievedStageName(t.id); const mom=momentumForTeam(t.id); const score=Math.max(1,Math.min(99,Math.round((Number(t.stars||1)*9)+(s.p*4)+(s.av*2)+(s.ag*1.2)-(s.yg*.8)+(avg*5)+(motmCountForTeam(t.id)*3)+(deep.value*4)+(mom.score/10)))); return {...t,points:s.p,av:s.av,gf:s.ag,ga:s.yg,played:s.o,avg,deep,momentum:mom,power:score};}).sort((a,b)=>b.power-a.power||b.points-a.points||b.av-a.av)}
function userPowerRows(){const base=userScores(); return base.map(u=>{const owned=state.teams.filter(t=>t.owner===u.id); const avgStars=owned.length?owned.reduce((s,t)=>s+Number(t.stars||1),0)/owned.length:0; const active=owned.filter(t=>achievedStageName(t.id).value>=2).length; const power=Math.round(u.total + avgStars*8 + active*4 + (u.motm||0)*2); return {...u,avgStars,active,power};}).sort((a,b)=>b.power-a.power)}
function newsTicker(){const items=headlines().slice(0,8); return `<div class="ticker">${items.map(x=>`<div class="ticker-item">${x}</div>`).join('')}</div>`}
function headlines(){const arr=[]; const lbs=leaderboards(); const topUser=userScores()[0]; const topTeam=teamPowerRows()[0]; const latest=completedMatches().slice(-1)[0]; if(latest){const w=getWinner(latest); const l=getLoser(latest); const motm=matchMOTM(latest); arr.push(`🔥 ${w?team(w).name:'Beraberlik'} maçtan manşetle çıktı: ${scoreText(latest)}`); if(motm)arr.push(`⭐ ${motm.player} ${Number(motm.rating||0).toFixed(1)} puanla sahne aldı!`); if(l)arr.push(`🥶 ${ownerName(team(l).owner)} cephesinde soğuk duş: ${team(l).name} kaybetti.`);} if(lbs.goals[0])arr.push(`👑 ${lbs.goals[0].name} gol krallığında ${lbs.goals[0].goals} golle önde.`); if(topUser)arr.push(`⚡ Genel liderlikte ${topUser.name} ${topUser.total} puana ulaştı.`); if(topTeam)arr.push(`📈 Power Ranking lideri: ${topTeam.flag} ${topTeam.name} [${topTeam.power}].`); const danger=allStandings().filter(r=>r.rank>=3 && r.o>0).sort((a,b)=>a.p-b.p)[0]; if(danger)arr.push(`🚨 ${team(danger.id).name} ${danger.group} grubunda alarm veriyor.`); return arr.length?arr:['🗞️ Kupa48 Haber Merkezi veri bekliyor: maç tamamlandıkça manşetler oluşacak.'];}
function radarItems(){const arr=[]; const third=bestThirds(); const cut=third[7], bubble=third[8]; const lbs=leaderboards(); const pows=teamPowerRows(); const users=userScores(); if(cut)arr.push({icon:'⭐',text:`En iyi üçüncüler barajı şu an ${team(cut.id).name} ${cut.p} puan / ${cut.av} averaj.`}); if(bubble)arr.push({icon:'⚠️',text:`Baraj dışında ilk takım: ${team(bubble.id).name} ${bubble.p} puan.`}); if(pows[0])arr.push({icon:'🔥',text:`${pows[0].name} ${pows[0].momentum.icon} ${pows[0].momentum.label} momentumunda.`}); if(lbs.goals[0])arr.push({icon:'👑',text:`${lbs.goals[0].name} ${lbs.goals[0].goals} golle krallık yarışında.`}); if(users[0])arr.push({icon:'👤',text:`${users[0].name} kullanıcı liderliğinde; ${users[0].advanced} takımı üst tur hattında.`}); const crisis=pows.filter(t=>t.played>0).sort((a,b)=>a.power-b.power)[0]; if(crisis)arr.push({icon:'🚨',text:`${crisis.name} için kriz sinyali: güç skoru ${crisis.power}.`}); return arr;}
function radarPanel(){return `<div class="radar-grid">${radarItems().slice(0,6).map(x=>`<div class="radar-item"><div class="radar-icon">${x.icon}</div><div>${x.text}</div></div>`).join('')}</div>`}
function momentumMini(){return `<div class="leader-list">${teamPowerRows().slice(0,5).map((t,i)=>`<div class="leader-item"><div class="rank">${i+1}</div><div>${teamHTML(t.id,true)}<div class="mini">Form: ${teamForm(t.id).slice(-5).join(' - ')||'-'} · ${t.momentum.icon} ${t.momentum.label}</div></div><div class="leader-value">${t.power}</div></div>`).join('')}</div>`}
function viewMedia(){const tabs=[['home','Haber Merkezi'],['power','Power Ranking'],['story','Turnuva Hikayesi'],['cards','Oyuncu Kartları'],['achievements','Başarımlar'],['analysis','Kura & Grup Analizi'],['squad','Kadro'],['final','Final & Şampiyonluk'],['hall','Hall of Fame']]; return `<div class="media-tabs">${tabs.map(([id,n])=>`<button class="${mediaSubTab===id?'active':''}" onclick="mediaSubTab='${id}'; renderAll(false)">${n}</button>`).join('')}</div>${mediaSubTab==='home'?viewMediaHome():mediaSubTab==='power'?viewPowerRanking():mediaSubTab==='story'?viewTournamentStory():mediaSubTab==='cards'?viewPlayerCards():mediaSubTab==='achievements'?viewAchievements():mediaSubTab==='analysis'?viewAnalysisHub():mediaSubTab==='squad'?viewSquadManager():mediaSubTab==='final'?viewFinalHub():viewHallOfFame()}`}
function viewMediaHome(){return `<div class="card"><h3>🗞️ Kupa48 Haber Merkezi</h3>${newsTicker()}<div class="grid cols-2 mobile-priority"><div><h4>🚨 Radar</h4>${radarPanel()}</div><div><h4>🎙️ Son Basın Açıklamaları</h4>${pressArchive()}</div></div></div><div class="grid cols-2 mobile-priority" style="margin-top:16px"><div class="card"><h3>📡 Son Maç Raporları</h3>${completedMatches().slice(-3).reverse().map(m=>matchReport(m)+pressArchiveForMatch(m)).join('')||'<p class="muted">Henüz tamamlanan maç yok.</p>'}</div><div class="card"><h3>🔥 Büyük Maç / Final Afişi</h3>${finalPoster()}</div></div>`}
function viewPowerRanking(){const teams=teamPowerRows(); const users=userPowerRows(); return `<div class="grid cols-2 mobile-priority"><div class="card"><h3>📈 Takım Power Ranking</h3><div class="leader-list">${teams.slice(0,20).map((t,i)=>`<div class="power-card"><div class="rank">${i+1}</div><div>${teamHTML(t.id,true)}<div class="mini">${'★'.repeat(Number(t.stars||1))} · ${t.deep.name} · ${t.momentum.icon} ${t.momentum.label} · Ort. ${t.avg?t.avg.toFixed(1):'-'}</div></div><div class="power-score">${t.power}</div></div>`).join('')}</div></div><div class="card"><h3>👤 Kullanıcı Power Ranking</h3><div class="leader-list">${users.map((u,i)=>`<div class="power-card"><div class="rank">${i+1}</div><div><span class="owner-dot dot-${u.color}"></span><b>${u.name}</b><div class="mini">Ortalama kura: ${u.avgStars.toFixed(1)}★ · Üst tur: ${u.active} · MOTM: ${u.motm}</div></div><div class="power-score">${u.power}</div></div>`).join('')}</div></div></div>`}
function viewTournamentStory(){const p=storyParagraphs(); return `<div class="grid cols-2 mobile-priority"><div class="card"><h3>📖 Turnuvanın Hikayesi</h3><div class="story-block">${p.map(x=>`<p>${x}</p>`).join('')}</div></div><div class="card"><h3>🌟 Sürpriz & Hayal Kırıklığı</h3>${surprisePanel()}</div></div><div class="card" style="margin-top:16px"><h3>🧭 Kupa48 Radarı</h3>${radarPanel()}</div>`}
function storyParagraphs(){const rows=userScores(); const power=teamPowerRows(); const lbs=leaderboards(); const completed=completedMatches().length; const best=rows[0]; const topTeam=power[0]; const surprise=surpriseTeams().surprise; const flop=surpriseTeams().flop; const arr=[]; arr.push(`Turnuvada şu ana kadar ${completed} maç oynandı. ${best?best.name:'Henüz kimse'} genel kullanıcı yarışında öne çıkan isim.`); if(topTeam)arr.push(`${topTeam.name} ${topTeam.power} güç skoru ve ${topTeam.momentum.icon} ${topTeam.momentum.label} formuyla turnuvanın en dikkat çeken takımı konumunda.`); if(lbs.goals[0])arr.push(`${lbs.goals[0].name}, ${team(lbs.goals[0].teamId).name} formasıyla ${lbs.goals[0].goals} gol atarak gol krallığı yarışına damga vuruyor.`); if(surprise)arr.push(`Turnuvanın sürprizi şimdilik ${surprise.name}: ${surprise.stars} yıldız beklentiden ${surprise.deep.name} seviyesine çıktı.`); if(flop)arr.push(`Hayal kırıklığı hanesinde ise ${flop.name} var; başlangıç beklentisine göre daha düşük bir performans çizdi.`); return arr;}
function surpriseTeams(){const rows=teamPowerRows().map(t=>({...t,delta:t.deep.value-expectedStageValue(t.stars)})); return {surprise:rows.filter(t=>t.played>0).sort((a,b)=>b.delta-a.delta||b.power-a.power)[0], flop:rows.filter(t=>t.played>0).sort((a,b)=>a.delta-b.delta||a.power-b.power)[0]};}
function surprisePanel(){const x=surpriseTeams(); return `${x.surprise?`<div class="award-card"><div class="award-icon">🌟</div><strong>Turnuvanın Sürprizi</strong><p>${teamHTML(x.surprise.id,true)}</p><p class="mini">Beklenti: ${x.surprise.stars}★ · Ulaştığı seviye: ${x.surprise.deep.name}</p></div>`:'<p class="muted">Sürpriz takım için maç verisi bekleniyor.</p>'}${x.flop?`<div class="award-card" style="margin-top:12px"><div class="award-icon">💀</div><strong>Hayal Kırıklığı</strong><p>${teamHTML(x.flop.id,true)}</p><p class="mini">Beklenti: ${x.flop.stars}★ · Ulaştığı seviye: ${x.flop.deep.name}</p></div>`:''}`}
function viewPlayerCards(){const ps=playerStats('all').slice(0,24); return `<div class="card"><h3>🃏 Oyuncu Kartları</h3><p class="muted">Oyuncu puanı, gol ve asist verilerine göre FIFA kartı gibi kartlar otomatik oluşur.</p><div class="fifa-card-grid">${ps.map(playerCard).join('')||'<p class="muted">Oyuncu kartı için maç puanı/gol/asist gir.</p>'}</div></div><div class="card" style="margin-top:16px"><h3>📒 Kart Koleksiyonu / Albüm</h3>${cardAlbum()}</div>`}
function playerCard(p){const rating=Math.min(99,Math.max(50,Math.round((p.avg||6)*10 + p.goals*1.5 + p.assists))); const cls=rating>=90?'special':rating>=80?'':'silver'; return `<div class="fifa-card ${cls}"><div><div class="card-rating">${rating}</div><div class="card-pos">${p.position||'-'}</div></div><div><div class="card-player">${safe(p.name)}</div><div class="card-team">${team(p.teamId).flag} ${team(p.teamId).name} ${ownerBadge(team(p.teamId).owner)}</div></div><div class="card-stats"><span>${p.goals} GOL</span><span>${p.assists} AST</span><span>${p.avg.toFixed(1)} ORT</span><span>${p.motm} MOTM</span></div></div>`}
function cardAlbum(){const a=awards(); const unlocks=[['✅','Maçın Adamı kartı',completedMatches().some(m=>matchMOTM(m))],['✅','Haftanın 11’i kartları',teamOfPeriod('md1').length>0],['✅','Altın Eldiven adayı',!!a.goldenGlove],['✅','Altın Top adayı',!!a.goldenBall],['🔒','Finalin Yıldızı',!!(state.koMatches.find(m=>m.stage==='FINAL')?.completed)],['🔒','Turnuvanın Oyuncusu',!!a.champion]]; return `<div class="album-grid">${unlocks.map(([icon,name,on])=>`<div class="album-item ${on?'':'locked'}"><b>${on?'✅':'🔒'} ${name}</b><div class="mini">${on?'Açıldı':'Turnuva ilerledikçe açılır'}</div></div>`).join('')}</div>`}
function viewAchievements(){const list=achievements(); return `<div class="card"><h3>🎮 Başarımlar</h3><div class="achievement-grid">${list.map(a=>`<div class="achievement-card ${a.unlocked?'unlocked':''}"><h4>${a.unlocked?'✅':'🔒'} ${a.name}</h4><p class="muted">${a.desc}</p><div>${a.value||''}</div></div>`).join('')}</div></div>`}
function achievements(){const ms=completedMatches(); const lbs=leaderboards(); const xiOwners={}; ['md1','md2','md3','group','all'].forEach(p=>teamOfPeriod(p).forEach(x=>{xiOwners[x.owner]=(xiOwners[x.owner]||0)+1})); const comeback=biggestComeback(); const penLoss=USERS.map(u=>({u,count:state.koMatches.filter(m=>m.completed&&m.penHome!==null&&getLoser(m)&&team(getLoser(m)).owner===u.id).length})).sort((a,b)=>b.count-a.count)[0]; const champ=state.koMatches.find(m=>m.stage==='FINAL'); const champOwner=champ&&getWinner(champ)?ownerName(team(getWinner(champ)).owner):''; return [
  {name:'Gol Makinesi',desc:'Bir maçta 5+ gol atan takım.',unlocked:ms.some(m=>Math.max(m.homeScore,m.awayScore)>=5),value:(ms.find(m=>Math.max(m.homeScore,m.awayScore)>=5)?scoreLine(ms.find(m=>Math.max(m.homeScore,m.awayScore)>=5)):'')},
  {name:'Savunma Duvarı',desc:'Bir takımın 3 maç üst üste gol yememesi.',unlocked:cleanSheetStreak().ok,value:cleanSheetStreak().text},
  {name:'Son Dakika Katili',desc:'85+ dakikada gol kaydı girilmesi.',unlocked:allMatches().some(m=>(m.events||[]).some(e=>Number(e.minute)>=85)),value:''},
  {name:'Comeback King',desc:'Geriye düşüp maç kazanma.',unlocked:!!comeback,value:comeback?scoreLine(comeback.match):''},
  {name:'Penaltı Kabusu',desc:'Penaltılarda 2 kez elenen kullanıcı.',unlocked:penLoss&&penLoss.count>=2,value:penLoss?`${penLoss.u.name}: ${penLoss.count}`:''},
  {name:'Favori Katili',desc:'5 yıldızlı takımı eleyen/kazanan takım.',unlocked:favoriteKiller().ok,value:favoriteKiller().text},
  {name:'Altın Nesil',desc:'Bir kullanıcının 3+ oyuncusu 11’lere girmesi.',unlocked:Object.values(xiOwners).some(x=>x>=3),value:Object.entries(xiOwners).sort((a,b)=>b[1]-a[1]).map(([u,c])=>`${ownerName(u)}: ${c}`).join(' · ')},
  {name:'Kupa Beyi',desc:'Şampiyon olan kullanıcının başarımı.',unlocked:!!champOwner,value:champOwner}
];}
function scoreLine(m){return `${team(m.home).name} ${scoreText(m)} ${team(m.away).name}`}
function cleanSheetStreak(){for(const t of state.teams){let max=0,cur=0; completedMatches().filter(m=>m.home===t.id||m.away===t.id).forEach(m=>{const ga=m.home===t.id?m.awayScore:m.homeScore; if(ga===0){cur++; max=Math.max(max,cur)} else cur=0}); if(max>=3)return {ok:true,text:`${t.name}: ${max} maç`};} return {ok:false,text:''};}
function favoriteKiller(){const m=completedMatches().find(m=>{const w=getWinner(m), l=getLoser(m); return w&&l&&Number(team(l).stars||1)>=5&&Number(team(w).stars||1)<=3}); return {ok:!!m,text:m?`${team(getWinner(m)).name}, ${team(getLoser(m)).name} takımını geçti`:''};}
function biggestComeback(){return completedMatches().map(m=>{let lead={}; (m.events||[]).slice().sort((a,b)=>Number(a.minute||0)-Number(b.minute||0)).forEach(e=>{lead[e.teamId]=(lead[e.teamId]||0)+1}); return {match:m,score:0};}).find(x=>false) || null;}
function viewAnalysisHub(){return `<div class="grid cols-2 mobile-priority"><div class="card"><h3>🎲 Kim Daha Şanslı? Kura Analizi</h3>${draftAnalysis()}</div><div class="card"><h3>☠️ Ölüm Grubu Analizi</h3>${deathGroupAnalysis()}</div></div><div class="card" style="margin-top:16px"><h3>🧮 Grup Son Maç Senaryoları</h3>${groupScenarioPanel()}</div>`}
function draftAnalysis(){const rows=USERS.map(u=>{const ts=state.teams.filter(t=>t.owner===u.id); const avg=ts.length?ts.reduce((s,t)=>s+Number(t.stars||1),0)/ts.length:0; return {u,avg,teams:ts.length};}).sort((a,b)=>b.avg-a.avg); const max=Math.max(1,...rows.map(r=>r.avg)); return `<div class="draft-meter"><b>Şanslı</b><div></div><b>${rows[0]?.u.name||'-'}</b></div>${rows.map(r=>`<div class="draft-meter"><div><span class="owner-dot dot-${r.u.color}"></span>${r.u.name}</div><div class="draft-track"><div class="draft-fill" style="width:${(r.avg/max)*100}%"></div></div><b>${r.avg.toFixed(1)}★</b></div>`).join('')}<p class="mini">Takım beklenti yıldızlarına göre hesaplanır. Setup ekranında yıldızlar değiştirilebilir.</p>`}
function deathGroupAnalysis(){const rows=Object.keys(GROUPS).map(g=>{const ts=state.teams.filter(t=>t.group===g); const sum=ts.reduce((s,t)=>s+Number(t.stars||1),0); const owners=new Set(ts.map(t=>t.owner).filter(Boolean)).size; return {g,sum,owners,teams:ts};}).sort((a,b)=>b.sum-a.sum||b.owners-a.owners); return `<div class="leader-list">${rows.slice(0,5).map((r,i)=>`<div class="leader-item"><div class="rank">${i+1}</div><div><b>${r.g} Grubu</b><div class="mini">${r.teams.map(t=>`${t.flag} ${t.name} ${ownerBadge(t.owner)}`).join(' · ')}</div></div><div class="leader-value">${r.sum}★</div></div>`).join('')}</div>`}
function groupScenarioPanel(){return `<div class="grid cols-3">${Object.keys(GROUPS).map(g=>{const s=standingsForGroup(g); const rem=state.matches.filter(m=>m.group===g&&!m.completed).length; const leader=s[0], danger=s[2]; return `<div class="scenario-card"><b>${g} Grubu</b><p class="mini">Kalan maç: ${rem}</p><p>Lider: ${teamHTML(leader.id,true)} · ${leader.p}p</p><p>Üçüncü: ${teamHTML(danger.id,true)} · ${danger.p}p</p><p class="muted">Kazanırsa üst sıra, beraberlikte averaj, kayıpta en iyi üçüncü riski hesaplanır.</p></div>`}).join('')}</div>`}
function viewSquadManager(){const selected=state.media.selectedRosterTeam||state.teams[0].id; const roster=(state.media.rosters[selected]||''); return `<div class="card"><h3>👥 Kadro Yönetimi</h3><p class="muted">İsteğe bağlıdır. Kadro girersen golcü/puan girerken isimleri standart tutman kolaylaşır.</p><div class="form-row two"><div class="field"><label>Takım</label>${teamSelect('rosterTeam',selected)}</div><div class="field"><label>Beklenti</label><select id="rosterStars">${[1,2,3,4,5].map(n=>`<option value="${n}" ${Number(team(selected).stars||1)===n?'selected':''}>${'★'.repeat(n)}${'☆'.repeat(5-n)}</option>`).join('')}</select></div></div><textarea id="rosterText" placeholder="GK Martinez\nCB Romero\nCM De Paul\nRW Messi\nST Alvarez">${safe(roster)}</textarea><div class="actions" style="justify-content:flex-start;margin-top:10px"><button onclick="saveRoster()">Kadroyu Kaydet</button><button class="secondary" onclick="state.media.selectedRosterTeam=document.getElementById('rosterTeam').value; renderAll(false)">Takımı Aç</button></div></div><div class="card" style="margin-top:16px"><h3>📋 Kayıtlı Kadrolar</h3><div class="team-grid">${state.teams.filter(t=>state.media.rosters[t.id]).map(t=>`<div class="team-pick"><b>${teamHTML(t.id,true)}</b><div class="mini">${state.media.rosters[t.id].split('\n').filter(Boolean).length} oyuncu kayıtlı</div></div>`).join('')||'<p class="muted">Henüz kadro girilmedi.</p>'}</div></div>`}
function saveRoster(){const id=document.getElementById('rosterTeam').value; state.media.selectedRosterTeam=id; state.media.rosters[id]=document.getElementById('rosterText').value; team(id).stars=Number(document.getElementById('rosterStars').value)||team(id).stars; saveState(); toast('Kadro kaydedildi')}
function viewFinalHub(){return `<div class="grid cols-2 mobile-priority"><div class="card"><h3>🎬 Final Afişi</h3>${finalPoster()}<div class="actions" style="justify-content:flex-start;margin-top:10px"><button onclick="exportFinalPosterPNG()">Final Afişi PNG</button></div></div><div class="card"><h3>🏆 Şampiyonluk Yolu</h3>${championPath()}</div></div><div class="card" style="margin-top:16px"><h3>📄 Kullanıcı Şampiyonluk Karnesi</h3>${userReportCards()}</div>`}
function finalPoster(){const final=state.koMatches.find(m=>m.stage==='FINAL'); if(!final)return '<p class="muted">Final eşleşmesi oluşunca otomatik afiş burada görünecek.</p>'; const w=getWinner(final); return `<div id="finalPosterCard" class="poster"><h2>${w?'🏆 ŞAMPİYON':'KUPA48 FİNALİ'}</h2><div class="poster-teams"><div class="poster-team">${teamHTML(final.home,true)}<h3>${final.homeScore??'-'}</h3></div><div class="poster-vs">${w?'KAZANAN':'VS'}</div><div class="poster-team">${teamHTML(final.away,true)}<h3>${final.awayScore??'-'}</h3></div></div>${w?`<h2>${team(w).flag} ${team(w).name}</h2><p>${ownerName(team(w).owner)} ${ownerBadge(team(w).owner)}</p>`:`<p>${ownerName(team(final.home).owner)} vs ${ownerName(team(final.away).owner)}</p>`}</div>`}
function championPath(){const final=state.koMatches.find(m=>m.stage==='FINAL'); const champ=final&&getWinner(final); if(!champ)return '<p class="muted">Şampiyon belli olunca yolu burada oluşacak.</p>'; const ms=completedMatches().filter(m=>m.home===champ||m.away===champ); return `<div class="champ-path">${ms.map(m=>`<div class="path-step"><b>${m.stageName}</b><div>${scoreLine(m)}</div></div>`).join('')}</div>`}
function userReportCards(){const rows=userScores(); return `<div class="grid cols-4">${rows.map(r=>{const grade=r.total>=150?'A+':r.total>=110?'A':r.total>=80?'B+':r.total>=50?'B':'C'; return `<div class="award-card"><div class="grade">${grade}</div><h4>${r.name} Karnesi</h4><p class="mini">Takım: ${r.teams} · Üst Tur: ${r.advanced} · Gol: ${r.gf} · Asist: ${leaderboards().assists.filter(a=>a.owner===r.id).reduce((s,a)=>s+a.assists,0)} · MOTM: ${r.motm}</p><b>${r.total} puan</b></div>`}).join('')}</div>`}
function viewHallOfFame(){return `<div class="card"><h3>🏛️ Kupa48 Hall of Fame</h3><p class="muted">Turnuva bittiğinde mevcut sonucu arşive kaydedebilirsin. Birden fazla turnuva oynadığınızda tarihçe oluşur.</p><button onclick="saveToHallOfFame()">Bu Turnuvayı Hall of Fame’e Kaydet</button><div class="sep"></div><div class="leader-list">${(state.media.hallOfFame||[]).map((h,i)=>`<div class="hof-item"><b>${h.year}</b><div><b>${h.championOwner||'-'}</b><div class="mini">Şampiyon Takım: ${h.championTeam||'-'} · Gol Kralı: ${h.goldenBoot||'-'} · Turnuva Oyuncusu: ${h.goldenBall||'-'}</div></div><button class="small-btn bad" onclick="removeHall(${i})">Sil</button></div>`).join('')||'<p class="muted">Henüz kayıt yok.</p>'}</div></div>`}
function saveToHallOfFame(){const a=awards(); const item={year:new Date().getFullYear(),date:new Date().toISOString().slice(0,10),championOwner:a.champion?ownerName(a.champion.owner):'',championTeam:a.champion?a.champion.name:'',goldenBoot:a.goldenBoot?.name||'',goldenBall:a.goldenBall?.name||''}; state.media.hallOfFame.unshift(item); saveState(); toast('Hall of Fame’e kaydedildi')}
function removeHall(i){state.media.hallOfFame.splice(i,1); saveState();}
function pressArchive(){const list=allMatches().flatMap(m=>(m.press||[]).map(p=>({...p,match:m}))).slice(-8).reverse(); return `<div class="leader-list">${list.map(p=>`<div class="press-comment"><div class="press-user">${ownerName(p.userId)}</div><div><div class="quote">“${safe(p.text)}”</div><div class="mini">${matchTitle(p.match)}</div></div><span></span></div>`).join('')||'<p class="muted">Henüz basın açıklaması girilmedi.</p>'}</div>`}
function pressArchiveForMatch(m){return (m.press&&m.press.length)?`<div class="sep"></div><h4>🎙️ Basın Odası</h4>${m.press.map(p=>`<div class="press-comment"><div class="press-user">${ownerName(p.userId)}</div><div class="quote">“${safe(p.text)}”</div><span></span></div>`).join('')}`:''}
function pressRoomPanel(m){return `<div class="form-row two"><div class="field"><label>Kullanıcı</label><select id="pressUser">${USERS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div><div class="field"><label>Tip</label><select id="pressMood"><option>Maç sonu</option><option>Hakem yorumu</option><option>Final mesajı</option><option>Meydan okuma</option></select></div></div><textarea id="pressText" placeholder="Örn: Messi bugün sahada konuştu. Final yolunda mesajı verdik."></textarea><button class="secondary" onclick="addPressComment()">Açıklama Ekle</button><div class="events" style="margin-top:10px">${(m.press||[]).map((p,i)=>`<div class="press-comment"><div class="press-user">${ownerName(p.userId)}</div><div><div class="quote">“${safe(p.text)}”</div><div class="mini">${safe(p.mood||'Maç sonu')}</div></div><button class="small-btn bad" onclick="removePressComment(${i})">×</button></div>`).join('')||'<p class="muted">Bu maç için açıklama yok.</p>'}</div>`}
function varNotePanel(m){return `<div class="sep"></div><label class="mini"><b>VAR / Tartışmalı Karar Notu</b></label><textarea id="varNoteText" placeholder="78. dakikada verilen penaltı tartışma yarattı.">${safe(m.varNote||'')}</textarea><button class="ghost" onclick="saveVarNote()">VAR Notunu Kaydet</button>${m.varNote?`<div class="var-note" style="margin-top:10px">${safe(m.varNote)}</div>`:''}`}
function liveModePanel(m){return `<div class="live-panel"><div class="live-score">${team(m.home).flag} ${m.homeScore??0} - ${m.awayScore??0} ${team(m.away).flag}</div><div class="live-actions"><button onclick="liveGoal('${m.home}')">+ ${team(m.home).name} Gol</button><button onclick="liveGoal('${m.away}')">+ ${team(m.away).name} Gol</button><button class="secondary" onclick="quickLiveNote('Sarı Kart')">+ Sarı Kart</button><button class="secondary" onclick="quickLiveNote('Kırmızı Kart')">+ Kırmızı Kart</button><button class="secondary" onclick="quickLiveNote('Oyuncu Puanı')">+ Oyuncu Puanı</button><button class="ghost" onclick="quickLiveNote('Not')">+ Not</button></div><div class="live-log">${(m.liveLog||[]).slice(-8).reverse().map(x=>`<div class="live-log-item">${safe(x)}</div>`).join('')||'<p class="muted">Canlı kayıt yok.</p>'}</div></div>`}
function addPressComment(){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; const text=document.getElementById('pressText').value.trim(); if(!text){toast('Açıklama metni gir'); return} m.press.push({userId:document.getElementById('pressUser').value,mood:document.getElementById('pressMood').value,text,date:new Date().toISOString()}); saveState(); openMatchModal(m.id);}
function removePressComment(i){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; m.press.splice(i,1); saveState(); openMatchModal(m.id)}

function saveModalScore(){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; const hv=document.getElementById('mHomeScore').value, av=document.getElementById('mAwayScore').value; m.homeScore=hv===''?null:Number(hv); m.awayScore=av===''?null:Number(av); if(m.stage!=='GROUP'){const ph=document.getElementById('mPenHome').value, pa=document.getElementById('mPenAway').value; m.penHome=ph===''?null:Number(ph); m.penAway=pa===''?null:Number(pa); m.home=document.getElementById('manualHome').value; m.away=document.getElementById('manualAway').value;} m.completed=m.homeScore!==null&&m.awayScore!==null; if(m.stage!=='GROUP') updateKnockoutProgress(false); saveState(); openMatchModal(m.id); toast('Skor kaydedildi')}
function saveModalStats(){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; ['shots','on','poss','corners','yellow','red'].forEach(k=>{['Home','Away'].forEach(suf=>{const v=document.getElementById(`st_${k}${suf}`).value; m.stats[k+suf]=v===''?null:Number(v);})}); m.stats.motm=document.getElementById('st_motm').value.trim(); saveState(); toast('İstatistikler kaydedildi')}
function addEventToMatch(){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; const ev={minute:document.getElementById('ev_min').value, teamId:document.getElementById('ev_team').value, scorer:document.getElementById('ev_scorer').value.trim(), assist:document.getElementById('ev_assist').value.trim(), type:document.getElementById('ev_type').value, note:document.getElementById('ev_note').value.trim()}; if(!ev.scorer){toast('Golcü adı gir'); return} m.events.push(ev); saveState(); openMatchModal(m.id)}

function addPlayerRatingToMatch(){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m)return; const rt={teamId:document.getElementById('rt_team').value,player:document.getElementById('rt_player').value.trim(),position:document.getElementById('rt_pos').value,rating:Number(document.getElementById('rt_rating').value),note:document.getElementById('rt_note').value.trim()}; if(!rt.player){toast('Oyuncu adı gir'); return} if(Number.isNaN(rt.rating)||rt.rating<0||rt.rating>10){toast('Puan 0-10 arasında olmalı'); return} if(!Array.isArray(m.ratings))m.ratings=[]; m.ratings.push(rt); saveState(); openMatchModal(m.id); toast('Oyuncu puanı eklendi')}
function removeRating(i){const m=allMatches().find(x=>x.id===currentModalMatchId); if(!m||!Array.isArray(m.ratings))return; m.ratings.splice(i,1); saveState(); openMatchModal(m.id)}

function exportBracketPNG(){
  if(!state.koMatches.length){toast('Önce eleme ağacını oluştur'); return}
  const stages=[['R32','Son 32'],['R16','Son 16'],['QF','Çeyrek'],['SF','Yarı Final'],['THIRD','3.lük'],['FINAL','Final']];
  const canvas=document.createElement('canvas'); canvas.width=1900; canvas.height=1250; const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a1020'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#f6f8ff'; ctx.font='bold 42px Arial'; ctx.fillText('Kupa48 Turnuva Ağacı',50,62); ctx.font='20px Arial'; ctx.fillStyle='#aab5d6'; ctx.fillText('48 takım • 4 kullanıcı • Son 32 eleme ağacı',50,96);
  const colW=300, startX=45, startY=140; stages.forEach(([stage,title],ci)=>{const x=startX+ci*colW; ctx.fillStyle='#82e2ff'; ctx.font='bold 24px Arial'; ctx.fillText(title,x,startY-22); const list=state.koMatches.filter(m=>m.stage===stage).sort((a,b)=>a.order-b.order); const boxH=stage==='R32'?55:stage==='R16'?70:stage==='QF'?95:stage==='SF'?130:stage==='THIRD'?130:160; list.forEach((m,i)=>{const y=startY+i*(boxH+12); drawCanvasMatch(ctx,m,x,y,260,boxH);});});
  canvas.toBlob(blob=>downloadBlob(blob,`kupa48-turnuva-agaci-${new Date().toISOString().slice(0,10)}.png`));
}
function drawCanvasMatch(ctx,m,x,y,w,h){ctx.fillStyle=m.stage==='FINAL'&&getWinner(m)?'#3b3014':'#111a2f'; roundRect(ctx,x,y,w,h,14,true,false); ctx.strokeStyle='#2d3d68'; ctx.stroke(); ctx.fillStyle='#aab5d6'; ctx.font='12px Arial'; ctx.fillText(`${m.stageName} ${m.order||''}`,x+10,y+17); const rows=[[m.home,m.homeScore],[m.away,m.awayScore]]; rows.forEach((r,idx)=>{const yy=y+35+idx*24; const t=team(r[0]); ctx.fillStyle=getWinner(m)===r[0]?'#7df0b3':'#f6f8ff'; ctx.font='bold 15px Arial'; ctx.fillText(`${t.flag} ${t.name} [${user(t.owner)?.label||'?'}]`,x+10,yy); ctx.fillStyle='#fff'; ctx.font='bold 16px Arial'; ctx.fillText(r[1]??'',x+w-28,yy);});}
function roundRect(ctx,x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}

function atlasSelected(current,value){return String(current)===String(value)?'selected':'';}
function atlasMatchLabel(m){return `${team(m.home).flag} ${team(m.home).name} - ${team(m.away).flag} ${team(m.away).name}`;}
function atlasMatchSub(m){return `${atlasStageLabel(m.stage)}${m.group?` · ${m.group} Grubu`:''} · ${ownerName(team(m.home).owner)} vs ${ownerName(team(m.away).owner)}`;}
function atlasTeamLabel(id){const t=team(id); return `<span class="atlas-team-label"><span class="flag">${t.flag}</span><span>${atlasEsc(t.name)}</span></span>`;}
function atlasOwnerChip(owner){const u=user(owner); if(!u) return `<span class="atlas-owner-chip owner-none"><span class="atlas-owner-avatar">?</span><span>Sahipsiz</span></span>`; return `<span class="atlas-owner-chip owner-${u.color}"><span class="atlas-owner-avatar">${u.label}</span><span>${u.name}</span></span>`;}
function atlasScoreParts(m){
  if(m.homeScore===null || m.awayScore===null) return {home:'-',away:'-',pen:''};
  return {home:String(m.homeScore), away:String(m.awayScore), pen:(m.penHome!==null&&m.penAway!==null)?`Pen: ${m.penHome}-${m.penAway}`:''};
}
function atlasFixtureNo(m,i){const all=allMatches(); const n=all.findIndex(x=>x.id===m.id); return (n>=0?n+1:i+1);}
function atlasFixtureScoreCard(m,i=0,compact=false){
  const h=team(m.home), a=team(m.away), sp=atlasScoreParts(m), winner=getWinner(m), no=atlasFixtureNo(m,i);
  const stateText=m.completed?'Oynandı':'Bekliyor';
  return `<article class="atlas-fixture-score-card ${m.completed?'is-complete':'is-pending'}" onclick="atlasOpen('match','${m.id}')">
    <div class="atlas-fixture-meta"><span>${no}. Maç</span><span>${atlasStageLabel(m.stage)}${m.group?` · ${m.group} Grubu`:''}</span><span>${stateText}</span></div>
    <div class="atlas-fixture-board">
      <div class="atlas-fixture-side home">
        <div class="atlas-team-main"><span class="atlas-flag-xl">${h.flag}</span><b>${atlasEsc(h.name)}</b></div>
        ${atlasOwnerChip(h.owner)}
      </div>
      <div class="atlas-fixture-center">
        <div class="atlas-score-big"><span>${sp.home}</span><em>-</em><span>${sp.away}</span></div>
        ${sp.pen?`<small>${sp.pen}</small>`:''}
        ${winner?`<small>Kazanan: ${team(winner).flag} ${atlasEsc(team(winner).name)}</small>`:`<small>Skor bekleniyor</small>`}
      </div>
      <div class="atlas-fixture-side away">
        <div class="atlas-team-main"><span class="atlas-flag-xl">${a.flag}</span><b>${atlasEsc(a.name)}</b></div>
        ${atlasOwnerChip(a.owner)}
      </div>
    </div>
    <div class="atlas-fixture-footer"><span>${atlasMatchSub(m)}</span>${atlasBadge(stateText)}</div>
  </article>`;
}
function atlasSetKing(kind){atlasFilter.king=kind; renderAll(false);}
function atlasFixtureRows(){let rows=allMatches(); const q=atlasNorm(atlasFilter.matchQ||''); if(q) rows=rows.filter(m=>atlasNorm(`${team(m.home).name} ${team(m.away).name} ${team(m.home).flag} ${team(m.away).flag} ${m.stageName} ${m.group||''} ${ownerName(team(m.home).owner)} ${ownerName(team(m.away).owner)} ${scoreText(m)}`).includes(q)); if(atlasFilter.matchStage!=='all') rows=rows.filter(m=>m.stage===atlasFilter.matchStage); if(atlasFilter.matchGroup!=='all') rows=rows.filter(m=>m.group===atlasFilter.matchGroup); if(atlasFilter.matchStatus==='done') rows=rows.filter(m=>m.completed); if(atlasFilter.matchStatus==='todo') rows=rows.filter(m=>!m.completed); if(atlasFilter.matchOwner!=='all') rows=rows.filter(m=>team(m.home).owner===atlasFilter.matchOwner||team(m.away).owner===atlasFilter.matchOwner); return rows;}
function atlasAdminEditMatch(id,tab='score'){atlasFilter.adminScoreMatch=id; atlasFilter.adminEventMatch=id; atlasSetModule('admin'); atlasSetAdmin(tab);}

function atlasRenderShell(){return `<div class="atlas-app">${atlasTop()}<div class="atlas-page">${atlasDetail?atlasRenderDetail():atlasRenderModule()}</div></div>`;}
function atlasTop(){const st=atlasStats(); const isDark=atlasTheme==='dark'; return `<header class="atlas-top"><div class="atlas-top-inner"><div class="atlas-head"><div class="atlas-brand"><div class="atlas-logo">🏆</div><div class="atlas-title"><h1>Kupa48 Atlas</h1><p>Turnuva veri portalı · arama, filtreleme ve detay sayfaları</p></div></div><div class="atlas-statusbar"><span class="atlas-chip ${dataStatus.dirty?'warn':'ok'}">${dataStatus.dirty?'● Yerel değişiklik':'● Yayında'} <b>${dataStatusLabel()}</b></span><span class="atlas-chip">Son: <b>${formatDateTime(dataStatus.loadedAt)}</b></span><button class="theme-toggle" onclick="atlasToggleTheme()" title="Tema değiştir"><span>${isDark?'☀️':'🌙'}</span><b>${isDark?'Aydınlık':'Karanlık'}</b></button><button class="secondary" onclick="atlasSetModule('admin')">Admin</button></div></div><div class="atlas-search-wrap"><div class="atlas-searchbox"><input id="atlasSearchInput" value="${atlasEsc(atlasSearch)}" placeholder="Takım, grup, kullanıcı, maç veya oyuncu ara..." oninput="atlasSearch=this.value" onkeydown="if(event.key==='Enter') atlasDoSearch()"></div><div class="atlas-search-actions"><button onclick="atlasDoSearch()">Ara</button><button class="ghost" onclick="atlasSearch=''; atlasModule='home'; atlasDetail=null; renderAll(false)">Temizle</button></div></div><nav class="atlas-modules">${ATLAS_MODULES.map(m=>`<button class="atlas-module ${atlasModule===m.id?'active':''}" onclick="atlasSetModule('${m.id}')"><span class="ico">${m.icon}</span><span><b>${m.title}</b><small>${m.small}</small></span></button>`).join('')}</nav></div></header>`;}
function atlasRenderModule(){if(atlasModule==='teams')return atlasTeamsPage(); if(atlasModule==='groups')return atlasGroupsPage(); if(atlasModule==='fixtures'||atlasModule==='matches')return atlasFixturesPage(); if(atlasModule==='users')return atlasUsersPage(); if(atlasModule==='players')return atlasPlayersPage(); if(atlasModule==='knockout')return atlasKnockoutPage(); if(atlasModule==='admin')return atlasAdminPage(); return atlasHomePage();}
function atlasRenderDetail(){if(atlasDetail.type==='team')return atlasTeamDetail(atlasDetail.id); if(atlasDetail.type==='group')return atlasGroupDetail(atlasDetail.id); if(atlasDetail.type==='match')return atlasMatchDetail(atlasDetail.id); if(atlasDetail.type==='user')return atlasUserDetail(atlasDetail.id); if(atlasDetail.type==='player')return atlasPlayerDetail(atlasDetail.id); return atlasHomePage();}

function atlasHomePage(){const st=atlasStats(); return `${atlasWelcome(st)}${atlasSearchResults()}<section class="atlas-summary-grid">${[['Takım',st.teams],['Grup',st.groups],['Grup maçı',`${st.groupPlayed}/${st.groupTotal}`],['Tamamlanan',st.completed],['Toplam gol',st.goals],['Kullanıcı',st.users]].map(x=>`<div class="atlas-summary"><strong>${x[1]}</strong><span>${x[0]}</span></div>`).join('')}</section><section class="atlas-grid"><div class="atlas-main"><div class="atlas-box"><div class="atlas-box-head"><div><h3>Hızlı Grup Erişimi</h3><p>A-L gruplarına tek tıkla gir.</p></div></div><div class="atlas-modules" style="padding-bottom:4px">${Object.keys(GROUPS).map(g=>`<button class="atlas-module" onclick="atlasOpen('group','${g}')"><span class="ico">${g}</span><span><b>${g} Grubu</b><small>${state.matches.filter(m=>m.group===g&&m.completed).length}/6 maç</small></span></button>`).join('')}</div></div><div class="atlas-box"><div class="atlas-box-head"><div><h3>Son Güncellenen / Sıradaki Maçlar</h3><p>Oynananlar ve bekleyenler birlikte listelenir.</p></div><button class="secondary" onclick="atlasSetModule('fixtures')">Genel Fikstür</button></div>${atlasMatchesTable(allMatches().filter(m=>m.completed).slice(-4).reverse().concat(allMatches().filter(m=>!m.completed).slice(0,4)),true)}</div></div><aside class="atlas-aside"><div class="atlas-box"><div class="atlas-box-head"><div><h3>Kullanıcı Özeti</h3><p>Toplam puana göre.</p></div><button class="secondary" onclick="atlasSetModule('users')">Aç</button></div>${atlasUserMiniList()}</div><div class="atlas-box"><div class="atlas-box-head"><div><h3>En İyi Üçüncüler</h3><p>İlk 8 üst tura çıkar.</p></div></div>${atlasThirdsMini()}</div></aside></section>`;}
function atlasWelcome(st){return `<section class="atlas-welcome"><div class="atlas-hero-card"><span class="atlas-kicker">AAA Atlas Portal</span><h2>Dashboard değil, aradığını bulduran turnuva veritabanı.</h2><p>Takım, grup, maç, kullanıcı ve oyuncu verileri tek merkezde. Üstteki modüllerden birini seçtiğinde bütün sayfa o modülün liste, filtre ve detay akışına dönüşür.</p><div class="atlas-data-actions" style="margin-top:14px"><button onclick="atlasSetModule('teams')">Güç Sıralaması</button><button class="secondary" onclick="atlasSetModule('groups')">Grup Atlası</button><button class="ghost" onclick="atlasSetModule('admin')">Admin Veri Girişi</button></div></div><div class="atlas-side-panel"><div class="atlas-live-box"><strong>${st.groupPlayed}/${st.groupTotal}</strong><span>Grup maçı tamamlandı</span><div class="atlas-progress"><i style="width:${atlasPct(st.groupPlayed,st.groupTotal)}%"></i></div></div><div class="atlas-live-box" style="background:#fff;color:var(--atlas-ink);border:1px solid var(--atlas-line);box-shadow:var(--atlas-shadow)"><strong style="color:var(--atlas-green)">${st.groupsDone}/12</strong><span style="color:var(--atlas-muted)">Grup tamamlandı</span><div class="atlas-progress" style="background:#edf2ee"><i style="width:${atlasPct(st.groupsDone,12)}%;background:linear-gradient(90deg,var(--atlas-green),#65b486)"></i></div></div></div></section>`;}
function atlasSearchResults(){const q=atlasSearch.trim(); if(!q) return ''; const res=atlasFind(q); return `<section class="atlas-box"><div class="atlas-box-head"><div><h3>Arama Sonuçları</h3><p>“${atlasEsc(q)}” için bulunan kayıtlar.</p></div><span class="atlas-chip"><b>${res.length}</b> sonuç</span></div>${res.length?`<div class="atlas-mini-list">${res.map(r=>`<div class="atlas-click" onclick="${r.action}"><div class="atlas-icon">${r.icon}</div><div><div class="atlas-click-title">${r.title}</div><div class="mini">${r.sub}</div></div>${r.badge||'<span class="atlas-badge neutral">Detay</span>'}</div>`).join('')}</div>`:'<div class="atlas-empty">Sonuç bulunamadı. Takım adı, grup harfi, kullanıcı veya oyuncu adı deneyebilirsin.</div>'}</section>`;}
function atlasFind(q){const n=atlasNorm(q); const out=[]; atlasTeamRows().forEach(t=>{if(atlasNorm(`${t.name} ${t.id} ${t.group} ${ownerName(t.owner)} ${t.status}`).includes(n)) out.push({icon:t.flag,title:t.name,sub:`${t.group} Grubu · ${ownerName(t.owner)} · ${t.p} puan`,action:`atlasOpen('team','${t.id}')`,badge:atlasBadge(t.status)});}); Object.keys(GROUPS).forEach(g=>{if(atlasNorm(`${g} grubu grup ${standingsForGroup(g).map(r=>team(r.id).name).join(' ')}`).includes(n)) out.push({icon:g,title:`${g} Grubu`,sub:`${state.matches.filter(m=>m.group===g&&m.completed).length}/6 maç tamamlandı`,action:`atlasOpen('group','${g}')`,badge:atlasBadge(groupComplete(g)?'Tamamlandı':'Devam ediyor')});}); allMatches().forEach(m=>{if(atlasNorm(`${matchTitle(m)} ${m.stageName} ${m.group||''} ${scoreText(m)}`).includes(n)) out.push({icon:'📝',title:matchTitle(m),sub:`${m.stageName} · ${scoreText(m)}`,action:`atlasOpen('match','${m.id}')`,badge:atlasBadge(m.completed?'Tamamlandı':'Bekliyor')});}); USERS.forEach(u=>{if(atlasNorm(`${u.name} ${u.id}`).includes(n)) out.push({icon:'👤',title:u.name,sub:`${state.teams.filter(t=>t.owner===u.id).length} takım · Kullanıcı profili`,action:`atlasOpen('user','${u.id}')`,badge:atlasBadge('Kullanıcı')});}); atlasPlayerRows().forEach(p=>{if(atlasNorm(`${p.name} ${team(p.teamId).name} ${ownerName(p.owner)}`).includes(n)) out.push({icon:'★',title:p.name,sub:`${team(p.teamId).name} · ${p.goals} gol · ${p.assists} asist`,action:`atlasOpenPlayer('${encodeURIComponent(p.key)}')`,badge:atlasBadge('Oyuncu')});}); return out.slice(0,16);}

function atlasTeamPowerRows(){
  const players=atlasPlayerRows('contribution');
  return atlasTeamRows().map(r=>{
    const t=team(r.id);
    const matches=allMatches().filter(m=>m.completed&&(m.home===r.id||m.away===r.id));
    const recent=matches.slice(-3);
    let recentPts=0, recentGf=0, recentGa=0;
    recent.forEach(m=>{const home=m.home===r.id; const gf=Number(home?m.homeScore:m.awayScore)||0; const ga=Number(home?m.awayScore:m.homeScore)||0; recentGf+=gf; recentGa+=ga; recentPts+=gf>ga?3:gf===ga?1:0;});
    const formBonus=recent.length?((recentPts/(recent.length*3))*10)+Math.max(-4,Math.min(6,(recentGf-recentGa)*1.4)):0;
    const leaderBonus=(r.rank===1?8:0)+(r.rank===2?4:0)+(r.rank===3?1.5:0);
    const statusBonus=r.status.includes('lider')?10:r.status.includes('Direkt')?7:r.status.includes('iyi')?5:r.status.includes('Devam')?2:0;
    const tp=players.filter(p=>p.teamId===r.id);
    const goalBonus=tp.reduce((s,p)=>s+(Number(p.goals)||0)*1.35+(Number(p.assists)||0)*.9+(Number(p.motm)||0)*2.2+(Number(p.avg)||0)*.25,0);
    const defenseBonus=Math.max(-8,10-Number(r.yg||0)*1.8);
    const raw=(Number(r.p)||0)*12+(Number(r.g)||0)*8+(Number(r.av)||0)*4+(Number(r.ag)||0)*2-(Number(r.yg)||0)*1.5+leaderBonus+statusBonus+formBonus+goalBonus+defenseBonus;
    const power=Math.max(0,Math.round(raw*10)/10);
    const form=recent.length?recent.map(m=>{const home=m.home===r.id; const gf=Number(home?m.homeScore:m.awayScore)||0; const ga=Number(home?m.awayScore:m.homeScore)||0; return gf>ga?'G':gf===ga?'B':'M';}).join(' '):'-';
    return {...r,power,powerBreakdown:{group:(Number(r.p)||0)*12,win:(Number(r.g)||0)*8,avg:(Number(r.av)||0)*4,attack:(Number(r.ag)||0)*2,defense:defenseBonus,status:leaderBonus+statusBonus,form:formBonus,stars:goalBonus},form};
  }).sort((a,b)=>b.power-a.power||b.p-a.p||b.av-a.av||b.ag-a.ag);
}
function atlasPowerBreakdown(r){const b=r.powerBreakdown||{}; const items=[['Grup puanı',b.group],['Galibiyet',b.win],['Averaj',b.avg],['Hücum',b.attack],['Savunma',b.defense],['Statü',b.status],['Form',b.form],['Oyuncu katkısı',b.stars]]; return `<div class="atlas-power-breakdown">${items.map(([k,v])=>`<span><em>${k}</em><b>${Number(v||0).toFixed(1)}</b></span>`).join('')}</div>`;}
function atlasPowerPage(){let rows=atlasTeamPowerRows(); if(atlasFilter.teamGroup!=='all') rows=rows.filter(r=>r.group===atlasFilter.teamGroup); if(atlasFilter.teamOwner!=='all') rows=rows.filter(r=>r.owner===atlasFilter.teamOwner); if(atlasFilter.teamStatus!=='all') rows=rows.filter(r=>atlasNorm(r.status).includes(atlasNorm(atlasFilter.teamStatus))); const max=Math.max(1,...rows.map(r=>r.power)); return `<section class="atlas-box"><div class="atlas-box-head"><div><h3>Güç Sıralaması</h3><p>Takımlar; puan, galibiyet, averaj, hücum, savunma, son form ve oyuncu katkısı ile karma hesaplanır.</p></div><span class="atlas-chip"><b>${rows.length}</b> takım</span></div><div class="atlas-filter"><select onchange="atlasSetFilter('teamGroup',this.value)"><option value="all">Tüm gruplar</option>${atlasGroupOptions()}</select><select onchange="atlasSetFilter('teamOwner',this.value)"><option value="all">Tüm kullanıcılar</option>${atlasOwnerOptions()}</select><select onchange="atlasSetFilter('teamStatus',this.value)"><option value="all">Tüm durumlar</option><option value="lider">Grup lideri</option><option value="üst">Üst tur</option><option value="üçüncü">Üçüncü</option><option value="devam">Devam ediyor</option><option value="elendi">Elendi</option></select></div>${atlasPowerTable(rows,max)}</section>`;}
function atlasPowerTable(rows,max=100){return `<div class="table-wrap atlas-table atlas-power-table"><table><thead><tr><th>#</th><th>Takım</th><th>Grup</th><th>Sahip</th><th class="num">P</th><th class="num">AV</th><th class="num">Gol</th><th class="num">Form</th><th>Güç</th><th>Durum</th></tr></thead><tbody>${rows.map((r,i)=>`<tr onclick="atlasOpen('team','${r.id}')"><td><span class="atlas-rank">${i+1}</span></td><td>${teamHTML(r.id)}</td><td><b>${r.group}</b></td><td>${ownerName(r.owner)}</td><td class="num"><b>${r.p}</b></td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num">${r.ag}</td><td class="num"><span class="atlas-form">${r.form}</span></td><td><div class="atlas-power-cell"><b>${r.power.toFixed(1)}</b><div class="atlas-power-track"><i style="width:${atlasPct(r.power,max)}%"></i></div></div></td><td>${atlasBadge(r.status)}</td></tr><tr class="atlas-power-detail"><td></td><td colspan="9">${atlasPowerBreakdown(r)}</td></tr>`).join('')}</tbody></table></div><div class="atlas-mobile-cards atlas-power-cards">${rows.map((r,i)=>`<article class="atlas-power-mobile-card" onclick="atlasOpen('team','${r.id}')"><div class="atlas-power-card-head"><span class="atlas-rank">${i+1}</span><div>${teamHTML(r.id,true)}<small>${r.group} Grubu · ${ownerName(r.owner)}</small></div><strong>${r.power.toFixed(1)}</strong></div><div class="atlas-power-track"><i style="width:${atlasPct(r.power,max)}%"></i></div><div class="mini">Puan ${r.p} · AV ${r.av>0?'+'+r.av:r.av} · Form ${r.form}</div></article>`).join('')}</div>`;}

function atlasTeamsPage(){return atlasPowerPage();}
function atlasTeamsTable(rows){return `<div class="table-wrap atlas-table"><table><thead><tr><th>Takım</th><th>Grup</th><th>Sahip</th><th class="num">Sıra</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AG</th><th class="num">YG</th><th class="num">AV</th><th class="num">P</th><th>Durum</th></tr></thead><tbody>${rows.map(r=>`<tr onclick="atlasOpen('team','${r.id}')"><td>${teamHTML(r.id)}</td><td><b>${r.group}</b></td><td>${ownerName(r.owner)}</td><td class="num"><span class="atlas-rank">${r.rank}</span></td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.ag}</td><td class="num">${r.yg}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td><td>${atlasBadge(r.status)}</td></tr>`).join('')}</tbody></table></div>`;}
function atlasGroupsPage(){const groups=Object.keys(GROUPS); return `<section class="atlas-box atlas-groups-page"><div class="atlas-box-head"><div><h3>Grup Atlası</h3><p>Tüm gruplar puan durumu şeklinde yan yana gösterilir. En altta sadece grup üçüncüleri listelenir.</p></div><span class="atlas-chip"><b>${groups.length}</b> grup</span></div><div class="atlas-group-jump">${groups.map(g=>`<button class="secondary" onclick="document.getElementById('atlas-group-${g}')?.scrollIntoView({behavior:'smooth',block:'start'})">${g}</button>`).join('')}</div><div class="atlas-groups-standings-grid">${groups.map(g=>atlasGroupCard(g)).join('')}</div><div class="atlas-box atlas-thirds-box"><div class="atlas-box-head"><div><h3>En İyi Üçüncüler</h3><p>Bu liste sadece gruplarını üçüncü bitiren takımları içerir.</p></div><span class="atlas-chip">İlk 8 üst tur</span></div>${atlasBestThirdsTable()}</div></section>`;}
function atlasGroupCard(g){const rows=standingsForGroup(g); const played=state.matches.filter(m=>m.group===g&&m.completed).length; return `<article class="atlas-group-standing-card" id="atlas-group-${g}"><div class="atlas-group-card-head" onclick="atlasOpen('group','${g}')"><div><h3>${g} Grubu Puan Durumu</h3><p>${played}/6 maç · Lider: ${team(rows[0].id).flag} ${team(rows[0].id).name}</p></div>${atlasBadge(groupComplete(g)?'Tamamlandı':'Devam ediyor')}</div>${atlasGroupStandingTable(g,true)}</article>`;}
function atlasGroupStandingTable(g,compact=false){const rows=standingsForGroup(g); return `<div class="table-wrap atlas-table atlas-group-table ${compact?'compact':''}"><table><thead><tr><th>#</th><th>Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AV</th><th class="num">P</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="group-rank-${i+1}" onclick="atlasOpen('team','${r.id}')"><td><span class="atlas-rank">${i+1}</span></td><td>${teamHTML(r.id,true)}</td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td></tr>`).join('')}</tbody></table></div>`;}
function atlasBestThirdsTable(){const rows=bestThirds(); return `<div class="table-wrap atlas-table atlas-thirds-table"><table><thead><tr><th>#</th><th>Grup</th><th>Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AV</th><th class="num">P</th><th>Durum</th></tr></thead><tbody>${rows.map((r,i)=>`<tr onclick="atlasOpen('team','${r.id}')" class="${r.qualified?'third-qualified':'third-wait'}"><td><span class="atlas-rank">${i+1}</span></td><td><b>${team(r.id).group}</b></td><td>${teamHTML(r.id,true)}</td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td><td>${atlasBadge(r.qualified?'Üst tur':'Beklemede')}</td></tr>`).join('')}</tbody></table></div>`;}

function atlasFixturesPage(){const rows=atlasFixtureRows(); const done=rows.filter(m=>m.completed).length; return `<section class="atlas-box"><div class="atlas-box-head"><div><h3>Genel Fikstür</h3><p>Turnuvadaki tüm maçları aşama, grup, kullanıcı, durum ve serbest arama ile filtrele. Satıra tıklayınca detaylı maç verisine girilir.</p></div><button onclick="atlasSetModule('admin'); atlasSetAdmin('score')">Skor Gir</button></div><div class="atlas-filter"><input class="wide" placeholder="Maç, takım, grup veya kullanıcı ara..." value="${atlasEsc(atlasFilter.matchQ||'')}" oninput="atlasFilter.matchQ=this.value; renderAll(false)"><select onchange="atlasSetFilter('matchStage',this.value)"><option value="all" ${atlasSelected(atlasFilter.matchStage,'all')}>Tüm aşamalar</option><option value="GROUP" ${atlasSelected(atlasFilter.matchStage,'GROUP')}>Grup</option><option value="R32" ${atlasSelected(atlasFilter.matchStage,'R32')}>Son 32</option><option value="R16" ${atlasSelected(atlasFilter.matchStage,'R16')}>Son 16</option><option value="QF" ${atlasSelected(atlasFilter.matchStage,'QF')}>Çeyrek</option><option value="SF" ${atlasSelected(atlasFilter.matchStage,'SF')}>Yarı Final</option><option value="FINAL" ${atlasSelected(atlasFilter.matchStage,'FINAL')}>Final</option></select><select onchange="atlasSetFilter('matchGroup',this.value)"><option value="all" ${atlasSelected(atlasFilter.matchGroup,'all')}>Tüm gruplar</option>${Object.keys(GROUPS).map(g=>`<option value="${g}" ${atlasSelected(atlasFilter.matchGroup,g)}>${g} Grubu</option>`).join('')}</select><select onchange="atlasSetFilter('matchStatus',this.value)"><option value="all" ${atlasSelected(atlasFilter.matchStatus,'all')}>Tüm durumlar</option><option value="done" ${atlasSelected(atlasFilter.matchStatus,'done')}>Oynandı</option><option value="todo" ${atlasSelected(atlasFilter.matchStatus,'todo')}>Bekliyor</option></select><select onchange="atlasSetFilter('matchOwner',this.value)"><option value="all" ${atlasSelected(atlasFilter.matchOwner,'all')}>Tüm kullanıcılar</option>${USERS.map(u=>`<option value="${u.id}" ${atlasSelected(atlasFilter.matchOwner,u.id)}>${u.name}</option>`).join('')}</select></div><div class="atlas-fixture-summary"><span>${rows.length} maç listeleniyor</span><span>${done} oynandı</span><span>${rows.length-done} bekliyor</span></div>${atlasMatchesTable(rows)}</section>`;}

function atlasUsersPage(){const rows=userScores(); return `<section class="atlas-box"><div class="atlas-box-head"><div><h3>Kullanıcı Atlası</h3><p>İlker, Doğan, Giray ve Eren performans karşılaştırması.</p></div></div><div class="table-wrap atlas-table"><table><thead><tr><th>Kullanıcı</th><th class="num">Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AG</th><th class="num">YG</th><th class="num">AV</th><th class="num">Üst tur</th><th class="num">Toplam</th></tr></thead><tbody>${rows.map(r=>`<tr onclick="atlasOpen('user','${r.id}')"><td><span class="owner-dot dot-${r.color}"></span><b>${r.name}</b></td><td class="num">${r.teams}</td><td class="num">${r.played}</td><td class="num">${r.w}</td><td class="num">${r.d}</td><td class="num">${r.l}</td><td class="num">${r.gf}</td><td class="num">${r.ga}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num">${r.advanced}</td><td class="num"><b>${r.total}</b></td></tr>`).join('')}</tbody></table></div></section>`;}
function atlasPlayerRows(metric=atlasFilter.king||'goals'){
  const rows=playerStats('all').map(p=>({...p,contribution:(p.goals||0)+(p.assists||0)}));
  const sorters={
    goals:(a,b)=>b.goals-a.goals||b.contribution-a.contribution||b.assists-a.assists||Number(b.avg||0)-Number(a.avg||0),
    assists:(a,b)=>b.assists-a.assists||b.contribution-a.contribution||b.goals-a.goals||Number(b.avg||0)-Number(a.avg||0),
    contribution:(a,b)=>b.contribution-a.contribution||b.goals-a.goals||b.assists-a.assists||Number(b.avg||0)-Number(a.avg||0)
  };
  return rows.sort(sorters[metric]||sorters.goals);
}
function atlasKingMeta(kind=atlasFilter.king||'goals'){
  return {
    goals:{title:'Gol Krallığı Atlası',desc:'Turnuvanın en çok gol atan oyuncularını listeler.',main:'Gol',icon:'⚽',field:'goals'},
    assists:{title:'Asist Krallığı Atlası',desc:'Gol pası üreten oyuncuları ayrı bir atlas olarak gösterir.',main:'Asist',icon:'🎯',field:'assists'},
    contribution:{title:'Gol Katkısı Atlası',desc:'Gol + asist toplamıyla turnuvanın en etkili oyuncularını sıralar.',main:'Katkı',icon:'✦',field:'contribution'}
  }[kind]||{title:'Gol Krallığı Atlası',desc:'Turnuvanın en çok gol atan oyuncularını listeler.',main:'Gol',icon:'⚽',field:'goals'};
}
function atlasPlayersPage(){
  const meta=atlasKingMeta();

  return `<section class="atlas-box atlas-king-page"><div class="atlas-box-head"><div><h3>Krallık Atlası</h3><p>Gol, asist ve toplam gol katkısı ayrı ayrı incelenir.</p></div></div>
    <div class="atlas-king-tabs">
      <button class="${atlasFilter.king==='goals'?'active':''}" onclick="atlasSetKing('goals')"><span>⚽</span><b>Gol Krallığı</b></button>
