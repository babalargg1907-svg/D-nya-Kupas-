      <button class="${atlasFilter.king==='contribution'?'active':''}" onclick="atlasSetKing('contribution')"><span>✦</span><b>Gol Katkısı</b></button>
    </div>
    <div class="atlas-king-hero"><div><span class="atlas-kicker">${meta.icon} ${meta.main}</span><h2>${meta.title}</h2><p>${meta.desc}</p></div>${top3.length?`<div class="atlas-king-podium">${top3.map((p,i)=>`<div class="atlas-podium-card rank-${i+1}" onclick="atlasOpenPlayer('${encodeURIComponent(p.key)}')"><span>#${i+1}</span><b>${atlasEsc(p.name)}</b><small>${team(p.teamId).flag} ${atlasEsc(team(p.teamId).name)} · ${ownerName(p.owner)}</small><strong>${p[meta.field]||0}</strong></div>`).join('')}</div>`:''}</div>
    <div class="atlas-filter"><select onchange="atlasSetFilter('playerOwner',this.value)"><option value="all" ${atlasSelected(atlasFilter.playerOwner,'all')}>Tüm kullanıcılar</option>${USERS.map(u=>`<option value="${u.id}" ${atlasSelected(atlasFilter.playerOwner,u.id)}>${u.name}</option>`).join('')}</select></div>
    ${rows.length?atlasPlayersTable(rows,atlasFilter.king||'goals'):'<div class="atlas-empty">Henüz oyuncu/gol/asist verisi girilmedi.</div>'}
  </section>`;
}
function atlasPlayersTable(rows,mode=atlasFilter.king||'goals'){
  const meta=atlasKingMeta(mode);
  return `<div class="table-wrap atlas-table atlas-king-table"><table><thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Sahip</th><th>Pozisyon</th><th class="num">Gol</th><th class="num">Asist</th><th class="num">Katkı</th><th class="num">MOTM</th><th class="num">Ort.</th></tr></thead><tbody>${rows.map((p,i)=>`<tr class="king-rank-${i+1}" onclick="atlasOpenPlayer('${encodeURIComponent(p.key)}')"><td><span class="atlas-rank">${i+1}</span></td><td><b>${atlasEsc(p.name)}</b><div class="mini">${meta.main}: <b>${p[meta.field]||0}</b></div></td><td>${teamHTML(p.teamId,true)}</td><td>${ownerName(p.owner)}</td><td>${p.position||'-'}</td><td class="num"><b>${p.goals}</b></td><td class="num"><b>${p.assists}</b></td><td class="num"><b>${p.contribution}</b></td><td class="num">${p.motm}</td><td class="num">${p.avg?Number(p.avg).toFixed(1):'-'}</td></tr>`).join('')}</tbody></table></div>
  <div class="atlas-mobile-cards atlas-king-cards">${rows.map((p,i)=>`<div class="atlas-king-mobile-card king-rank-${i+1}" onclick="atlasOpenPlayer('${encodeURIComponent(p.key)}')"><div><b>#${i+1} ${atlasEsc(p.name)}</b><small>${team(p.teamId).flag} ${atlasEsc(team(p.teamId).name)} · ${ownerName(p.owner)}</small></div><strong>${p[meta.field]||0}</strong><span>${meta.main}</span></div>`).join('')}</div>`;
}
function atlasKnockoutPage(){return `<section class="atlas-box atlas-knockout-page"><div class="atlas-box-head"><div><h3>Eleme Atlası</h3><p>Son 32’den finale gerçek turnuva ağacı görünümü. Kartlar arası bağlantılar ve yatay mobil kaydırma destekli.</p></div><button onclick="createKnockout()">Ağacı Oluştur/Güncelle</button></div>${state.koMatches.length?atlasTournamentBracket():`<div class="atlas-empty">Eleme ağacı henüz oluşturulmadı. Gruplar tamamlandığında veya manuel denemek için ağacı oluşturabilirsin.</div>`}</section>`;}
function atlasTournamentBracket(){const order=[['R32','Son 32'],['R16','Son 16'],['QF','Çeyrek Final'],['SF','Yarı Final'],['THIRD','3.lük'],['FINAL','Final']]; const groups=order.map(([stage,title])=>({stage,title,matches:state.koMatches.filter(m=>m.stage===stage)})).filter(x=>x.matches.length); return `<div class="atlas-bracket-real"><div class="atlas-bracket-scroll">${groups.map((col,ci)=>`<section class="atlas-bracket-column round-${ci+1}"><h4>${col.title}</h4><div class="atlas-bracket-stack">${col.matches.map((m,mi)=>atlasBracketMatchCard(m,mi)).join('')}</div></section>`).join('')}</div></div>`;}
function atlasBracketMatchCard(m,i){const winner=getWinner(m); const rows=[m.home,m.away].map(id=>{const t=team(id); const score=id===m.home?m.homeScore:m.awayScore; const isWin=winner===id; return `<div class="atlas-bracket-team ${isWin?'win':''}" onclick="event.stopPropagation(); atlasOpen('team','${id}')"><span>${teamLogoBadge(id,'mini')}</span><b>${t.flag} ${atlasEsc(t.name)}</b><em>${score??'-'}</em></div>`;}).join(''); return `<article class="atlas-bracket-match ${winner?'is-decided':''}" onclick="atlasOpen('match','${m.id}')" style="--d:${i*35}ms"><div class="atlas-bracket-meta">${atlasEsc(m.stageName||atlasStageLabel(m.stage))} ${m.order?`· ${m.order}`:''}</div>${rows}<div class="atlas-bracket-foot">${winner?`Kazanan: ${team(winner).flag} ${atlasEsc(team(winner).name)}`:'Skor bekleniyor'}</div></article>`;}

function atlasAdminPage(){const tabs=[['home','Kontrol Merkezi'],['score','Skor Gir'],['events','Maç Olayı Gir'],['setup','Takım Sahipliği'],['data','JSON / Veri'],['legacy','Eski Ekranlar']]; return `<section class="atlas-box"><div class="atlas-box-head"><div><h3>Admin Paneli</h3><p>Yorulmadan veri girişi için kısa görev akışları. Skor gir, olay ekle, takım sahipliğini düzenle ve JSON’u indir.</p></div><span class="atlas-chip ${dataStatus.dirty?'warn':'ok'}">${dataStatus.dirty?'Yerel değişiklik var':'Veri güncel'}</span></div><div class="atlas-admin-tabs">${tabs.map(t=>`<button class="${atlasFilter.admin===t[0]?'active':'secondary'}" onclick="atlasSetAdmin('${t[0]}')">${t[1]}</button>`).join('')}</div>${atlasFilter.admin==='score'?atlasAdminScorePage():atlasFilter.admin==='events'?atlasAdminEventsPage():atlasFilter.admin==='setup'?viewSetup():atlasFilter.admin==='data'?viewData():atlasFilter.admin==='legacy'?atlasAdminLegacyPage():atlasAdminHomePage()}</section>`;}
function atlasAdminHomePage(){const pending=allMatches().filter(m=>!m.completed).length; const dirty=dataStatus.dirty; return `<div class="atlas-admin-grid"><div class="atlas-admin-card" onclick="atlasSetAdmin('score')"><div class="atlas-icon">▤</div><h4>Skor Gir</h4><p>Bekleyen maçları üstte gör, skoru kaydet ve sonraki maça geç.</p><b>${pending} bekleyen maç</b></div><div class="atlas-admin-card" onclick="atlasSetAdmin('events')"><div class="atlas-icon">⚽</div><h4>Maç Olayı Gir</h4><p>Gol, asist ve dakika bilgilerini tek ekrandan ekle.</p><b>Gol/asist kayıtları</b></div><div class="atlas-admin-card" onclick="atlasSetAdmin('setup')"><div class="atlas-icon">👥</div><h4>Takım Sahipliği</h4><p>Takımları kullanıcıya ata, grup grup kontrol et.</p><b>${state.teams.filter(t=>t.owner).length}/${state.teams.length} atanmış</b></div><div class="atlas-admin-card" onclick="atlasSetAdmin('data')"><div class="atlas-icon">⬇</div><h4>JSON / Veri</h4><p>tournament.json indir, GitHub’daki data dosyasını güncelle.</p><b>${dirty?'İndirmen gerekebilir':'Hazır'}</b></div></div><div class="atlas-note" style="margin-top:14px"><b>GitHub Pages akışı:</b> Skorları girdikten sonra <b>JSON / Veri</b> bölümünden tournament.json indir; GitHub’da <b>data/tournament.json</b> dosyasını bununla değiştir.</div>`;}
function atlasAdminMatchOptions(selected,mode='score'){let rows=allMatches(); if(mode==='score') rows=rows.slice().sort((a,b)=>(a.completed===b.completed?0:a.completed?1:-1)); return rows.map(m=>`<option value="${m.id}" ${atlasSelected(selected,m.id)}>${m.completed?'✓':'○'} ${atlasMatchLabel(m)} · ${m.stageName}${m.group?` · ${m.group}`:''}</option>`).join('');}
function atlasAdminScoreMatch(){const rows=allMatches(); let m=rows.find(x=>x.id===atlasFilter.adminScoreMatch); if(!m){m=rows.find(x=>!x.completed)||rows[0]; atlasFilter.adminScoreMatch=m?.id||'';} return m;}
function atlasAdminEventsMatch(){const rows=allMatches(); let m=rows.find(x=>x.id===atlasFilter.adminEventMatch); if(!m){m=rows.find(x=>x.completed)||rows[0]; atlasFilter.adminEventMatch=m?.id||'';} return m;}
function atlasAdminScorePage(){const m=atlasAdminScoreMatch(); if(!m)return '<div class="atlas-empty">Maç bulunamadı.</div>'; const pending=allMatches().filter(x=>!x.completed).slice(0,8); return `<div class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><div><h3>Hızlı Skor Girişi</h3><p>Varsayılan olarak bekleyen maçlar öne alınır.</p></div><button class="secondary" onclick="openMatchModal('${m.id}')">Gelişmiş</button></div><div class="field"><label>Maç seç</label><select id="atlasScoreMatch" onchange="atlasFilter.adminScoreMatch=this.value; renderAll(false)">${atlasAdminMatchOptions(m.id,'score')}</select></div><div class="atlas-admin-score"><div><span>${team(m.home).flag}</span><b>${team(m.home).name}</b><small>${ownerName(team(m.home).owner)}</small><input id="atlasHomeScore" type="number" min="0" value="${m.homeScore??''}"></div><strong>-</strong><div><span>${team(m.away).flag}</span><b>${team(m.away).name}</b><small>${ownerName(team(m.away).owner)}</small><input id="atlasAwayScore" type="number" min="0" value="${m.awayScore??''}"></div></div><div class="atlas-data-actions"><button onclick="atlasAdminSaveScore(false)">Skoru Kaydet</button><button class="secondary" onclick="atlasAdminSaveScore(true)">Kaydet ve Sonraki Maça Geç</button><button class="ghost" onclick="atlasOpen('match','${m.id}')">Detayı Gör</button></div></div><div class="atlas-box"><div class="atlas-box-head"><div><h3>Sıradaki Bekleyen Maçlar</h3><p>Tek tıkla skor girişi ekranına al.</p></div></div><div class="atlas-mini-list">${pending.map(x=>`<div class="atlas-click" onclick="atlasFilter.adminScoreMatch='${x.id}'; renderAll(false)"><div class="atlas-icon">○</div><div><div class="atlas-click-title">${atlasMatchLabel(x)}</div><div class="mini">${atlasMatchSub(x)}</div></div>${atlasBadge('Bekliyor')}</div>`).join('')||'<div class="atlas-empty">Bekleyen maç yok.</div>'}</div></div></div>`;}
function atlasAdminSaveScore(next=false){const id=document.getElementById('atlasScoreMatch')?.value||atlasFilter.adminScoreMatch; const m=allMatches().find(x=>x.id===id); if(!m)return; const hv=document.getElementById('atlasHomeScore')?.value??''; const av=document.getElementById('atlasAwayScore')?.value??''; m.homeScore=hv===''?null:Number(hv); m.awayScore=av===''?null:Number(av); m.completed=m.homeScore!==null&&m.awayScore!==null; if(m.stage!=='GROUP') updateKnockoutProgress(false); if(next){const nextM=allMatches().find(x=>!x.completed&&x.id!==m.id); atlasFilter.adminScoreMatch=nextM?.id||m.id;} else atlasFilter.adminScoreMatch=m.id; saveState(); toast('Skor kaydedildi');}
function atlasAdminEventsPage(){const m=atlasAdminEventsMatch(); if(!m)return '<div class="atlas-empty">Maç bulunamadı.</div>'; return `<div class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><div><h3>Maç Olayı Girişi</h3><p>Gol, asist ve dakikayı hızlı ekle.</p></div><button class="secondary" onclick="openMatchModal('${m.id}')">Gelişmiş</button></div><div class="field"><label>Maç seç</label><select id="atlasEventMatch" onchange="atlasFilter.adminEventMatch=this.value; renderAll(false)">${atlasAdminMatchOptions(m.id,'events')}</select></div><div class="form-row"><div class="field"><label>Dakika</label><input id="atlasEvMin" type="number" min="1" max="130" placeholder="78"></div><div class="field"><label>Takım</label><select id="atlasEvTeam"><option value="${m.home}">${team(m.home).flag} ${team(m.home).name}</option><option value="${m.away}">${team(m.away).flag} ${team(m.away).name}</option></select></div><div class="field"><label>Golcü</label><input id="atlasEvScorer" placeholder="Oyuncu adı"></div><div class="field"><label>Asist</label><input id="atlasEvAssist" placeholder="Boş bırakılabilir"></div></div><div class="form-row two"><div class="field"><label>Gol tipi</label><select id="atlasEvType"><option value="normal">Normal</option><option value="penalty">Penaltı</option><option value="freekick">Frikik</option><option value="header">Kafa</option><option value="longshot">Uzaktan şut</option><option value="own_goal">Kendi kalesine</option></select></div><div class="field"><label>Not</label><input id="atlasEvNote" placeholder="Opsiyonel"></div></div><button class="good" onclick="atlasAdminAddEvent()">Olayı Ekle</button></div><div class="atlas-box"><div class="atlas-box-head"><div><h3>Girilen Olaylar</h3><p>${atlasMatchLabel(m)}</p></div><button class="ghost" onclick="atlasOpen('match','${m.id}')">Detay</button></div>${(m.events||[]).length?`<div class="events">${m.events.map((ev,i)=>`<div class="event-row"><div><b>${ev.minute||'-'}'</b></div><div>${teamHTML(ev.teamId,true)}</div><div><b>${atlasEsc(ev.scorer)||'-'}</b></div><div class="muted">Asist: ${atlasEsc(ev.assist)||'-'}</div><div><span class="pill">${typeName(ev.type)}</span></div><button class="bad small-btn" onclick="atlasAdminRemoveEvent('${m.id}',${i})">×</button></div>`).join('')}</div>`:'<div class="atlas-empty">Henüz olay girilmedi.</div>'}</div></div>`;}
function atlasAdminAddEvent(){const id=document.getElementById('atlasEventMatch')?.value||atlasFilter.adminEventMatch; const m=allMatches().find(x=>x.id===id); if(!m)return; const scorer=(document.getElementById('atlasEvScorer')?.value||'').trim(); if(!scorer){alert('Golcü adı gir.'); return;} m.events=m.events||[]; m.events.push({minute:document.getElementById('atlasEvMin')?.value||'',teamId:document.getElementById('atlasEvTeam')?.value||m.home,scorer,assist:(document.getElementById('atlasEvAssist')?.value||'').trim(),type:document.getElementById('atlasEvType')?.value||'normal',note:(document.getElementById('atlasEvNote')?.value||'').trim()}); atlasFilter.adminEventMatch=m.id; saveState(); toast('Maç olayı eklendi');}
function atlasAdminRemoveEvent(matchId,index){const m=allMatches().find(x=>x.id===matchId); if(!m)return; m.events.splice(index,1); atlasFilter.adminEventMatch=m.id; saveState(); toast('Olay silindi');}
function atlasAdminLegacyPage(){return `<div class="atlas-admin-tabs"><button class="secondary" onclick="atlasSetAdmin('groups')">Grup Ekranı</button><button class="secondary" onclick="atlasSetAdmin('oldstats')">Eski Krallıklar</button><button class="secondary" onclick="atlasSetAdmin('oldfixtures')">Eski Maç Girişi</button></div>${atlasFilter.admin==='groups'?viewGroups():atlasFilter.admin==='oldstats'?viewStats():atlasFilter.admin==='oldfixtures'?viewFixtures():'<div class="atlas-empty">Eski ekranlardan birini seç.</div>'}`;}

function atlasUserMiniList(){return `<div class="atlas-mini-list">${userScores().map((r,i)=>`<div class="atlas-click" onclick="atlasOpen('user','${r.id}')"><div class="atlas-icon">${i+1}</div><div><div class="atlas-click-title"><span class="owner-dot dot-${r.color}"></span>${r.name}</div><div class="mini">${r.teams} takım · ${r.gf} gol · ${r.advanced} üst tur</div></div><b>${r.total}</b></div>`).join('')}</div>`;}
function atlasThirdsMini(){const rows=bestThirds().slice(0,8); return `<div class="atlas-mini-list">${rows.map(r=>`<div class="atlas-click" onclick="atlasOpen('team','${r.id}')"><div class="atlas-icon">${r.thirdRank}</div><div><div class="atlas-click-title">${team(r.id).flag} ${team(r.id).name}</div><div class="mini">${r.group} Grubu · P:${r.p} AV:${r.av}</div></div>${atlasBadge('Çıkar')}</div>`).join('')}</div>`;}
function atlasDetailHeader(icon,title,sub,actions=''){return `<div class="atlas-breadcrumb"><button class="secondary" onclick="atlasBack()">← Geri</button><span>Kupa48 Atlas</span><span>›</span><b>${atlasEsc(title)}</b></div><section class="atlas-detail-head"><div class="atlas-detail-title"><div class="atlas-big-icon">${icon}</div><div><h2>${atlasEsc(title)}</h2><p>${sub}</p></div></div><div class="atlas-detail-actions">${actions}<button class="ghost" onclick="atlasBack()">Listeye Dön</button></div></section>`;}
function atlasTeamDetail(id){const t=team(id); const s=atlasTeamRows().find(x=>x.id===id); const p=atlasTeamPowerRows().find(x=>x.id===id)||{power:0,powerBreakdown:{}}; const matches=allMatches().filter(m=>m.home===id||m.away===id); const players=atlasPlayerRows().filter(p=>p.teamId===id); return `${atlasDetailHeader(t.flag,t.name,`${t.group} Grubu · Sahip: ${ownerName(t.owner)} · ${s.status}`,`<button onclick="atlasSetModule('admin'); atlasSetAdmin('score')">Skor Gir</button>`)}<section class="atlas-metrics"><div class="atlas-metric power"><b>${Number(p.power||0).toFixed(1)}</b><span>Güç puanı</span></div><div class="atlas-metric"><b>${s.p}</b><span>Puan</span></div><div class="atlas-metric"><b>${s.rank}</b><span>Grup sırası</span></div><div class="atlas-metric"><b>${s.av>0?'+'+s.av:s.av}</b><span>Averaj</span></div></section><section class="atlas-box"><div class="atlas-box-head"><h3>Güç Puanı Kırılımı</h3></div>${atlasPowerBreakdown(p)}</section><section class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><h3>Grup Puan Durumu</h3></div>${atlasGroupStandingTable(t.group)}</div><div class="atlas-box"><div class="atlas-box-head"><h3>Takım Oyuncuları</h3></div>${players.length?atlasPlayersTable(players):'<div class="atlas-empty">Oyuncu verisi yok.</div>'}</div></section><section class="atlas-box"><div class="atlas-box-head"><h3>Takım Maçları</h3></div>${atlasMatchesTable(matches)}</section>`;}

function atlasGroupDetail(g){const matches=state.matches.filter(m=>m.group===g); const played=matches.filter(m=>m.completed).length; const rows=standingsForGroup(g); return `${atlasDetailHeader(g,`${g} Grubu`,`${played}/6 maç · Lider: ${team(rows[0].id).name}`)}<section class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><h3>Puan Durumu</h3></div>${atlasGroupStandingTable(g)}</div><div class="atlas-box"><div class="atlas-box-head"><h3>Grup Senaryosu</h3></div>${atlasGroupScenario(g)}</div></section><section class="atlas-box"><div class="atlas-box-head"><h3>Grup Maçları</h3></div>${atlasMatchesTable(matches)}</section>`;}
function atlasGroupStandingTable(g){const rows=standingsForGroup(g); return `<div class="table-wrap atlas-table"><table><thead><tr><th>#</th><th>Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AG</th><th class="num">YG</th><th class="num">AV</th><th class="num">P</th></tr></thead><tbody>${rows.map((r,i)=>`<tr onclick="atlasOpen('team','${r.id}')"><td><span class="atlas-rank">${i+1}</span></td><td>${teamHTML(r.id)}</td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.ag}</td><td class="num">${r.yg}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td></tr>`).join('')}</tbody></table></div>`;}
function atlasGroupScenario(g){const rows=standingsForGroup(g); const played=state.matches.filter(m=>m.group===g&&m.completed).length; if(groupComplete(g)) return `<div class="atlas-note"><b>${team(rows[0].id).name}</b> ve <b>${team(rows[1].id).name}</b> direkt üst tura çıktı. <b>${team(rows[2].id).name}</b> en iyi üçüncüler tablosuna göre değerlendirilir.</div>`; return `<div class="atlas-note">Bu grupta <b>${played}/6</b> maç tamamlandı. Mevcut lider <b>${team(rows[0].id).name}</b>. Kalan skorlar girildikçe liderlik, ikincilik ve en iyi üçüncülük durumu otomatik güncellenir.</div>`;}
function atlasMatchStatsPanel(m){const s=m.stats||{}; const rows=[['shots','Şut'],['on','İsabetli şut'],['poss','Topla oynama %'],['corners','Korner'],['yellow','Sarı kart'],['red','Kırmızı kart']]; const any=rows.some(([k])=>s[k+'Home']!==null&&s[k+'Home']!==undefined||s[k+'Away']!==null&&s[k+'Away']!==undefined)||s.motm; if(!any)return '<div class="atlas-empty">Maç istatistiği henüz girilmedi.</div>'; return `<div class="atlas-statlines">${rows.map(([k,label])=>`<div class="atlas-statline"><span>${label}</span><b>${s[k+'Home']??'-'}</b><em>${s[k+'Away']??'-'}</em></div>`).join('')}${s.motm?`<div class="atlas-note"><b>Maçın adamı:</b> ${atlasEsc(s.motm)}</div>`:''}</div>`;}
function atlasMatchEventsPanel(m){const events=(m.events||[]); if(!events.length)return '<div class="atlas-empty">Gol/asist olayı girilmemiş.</div>'; return `<div class="atlas-mini-list">${events.map(e=>`<div class="atlas-mini-row"><span><b>${e.minute||'-'}'</b> · ${team(e.teamId).flag} ${team(e.teamId).name} · ${atlasEsc(e.scorer)||'-'}${e.assist?` / Asist: ${atlasEsc(e.assist)}`:''}</span><b>${typeName(e.type)}</b></div>`).join('')}</div>`;}
function atlasMatchPlayersPanel(m){const ratings=(m.ratings||[]).slice().sort((a,b)=>Number(b.rating||0)-Number(a.rating||0)); if(!ratings.length)return '<div class="atlas-empty">Oyuncu puanı henüz girilmedi.</div>'; return `<div class="table-wrap atlas-table"><table><thead><tr><th>Oyuncu</th><th>Takım</th><th>Pozisyon</th><th class="num">Puan</th><th>Not</th></tr></thead><tbody>${ratings.map(r=>`<tr><td><b>${atlasEsc(r.player)}</b></td><td>${teamHTML(r.teamId,true)}</td><td>${r.position||'-'}</td><td class="num"><b>${Number(r.rating||0).toFixed(1)}</b></td><td>${atlasEsc(r.note||'')}</td></tr>`).join('')}</tbody></table></div>`;}
function atlasMatchDetail(id){const m=allMatches().find(x=>x.id===id); if(!m)return '<div class="atlas-empty">Maç bulunamadı.</div>'; const goals=(m.events||[]).filter(e=>e.scorer); const winner=getWinner(m); return `${atlasDetailHeader('▤','Maç Detayı',`${atlasMatchLabel(m)} · ${m.stageName}${m.group?` · ${m.group} Grubu`:''}`,`<button onclick="atlasAdminEditMatch('${m.id}','score')">Admin Skor Gir</button><button class="secondary" onclick="openMatchModal('${m.id}')">Gelişmiş Düzenle</button>`)}<section class="atlas-scoreboard"><div class="atlas-score-team" onclick="atlasOpen('team','${m.home}')"><span>${team(m.home).flag}</span><b>${team(m.home).name}</b><small>${ownerName(team(m.home).owner)}</small></div><div class="atlas-score-core"><strong>${scoreText(m)}</strong><span>${m.completed?'Oynandı':'Bekliyor'}${winner?` · Kazanan: ${team(winner).flag} ${team(winner).name}`:''}</span></div><div class="atlas-score-team" onclick="atlasOpen('team','${m.away}')"><span>${team(m.away).flag}</span><b>${team(m.away).name}</b><small>${ownerName(team(m.away).owner)}</small></div></section><section class="atlas-metrics"><div class="atlas-metric"><b>${m.stageName}</b><span>Aşama</span></div><div class="atlas-metric"><b>${m.group||'-'}</b><span>Grup</span></div><div class="atlas-metric"><b>${goals.length}</b><span>Gol kaydı</span></div><div class="atlas-metric"><b>${(m.ratings||[]).length}</b><span>Oyuncu puanı</span></div></section><section class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><h3>Özet</h3></div><div class="atlas-note">${m.completed?`${team(m.home).flag} <b>${team(m.home).name}</b> ile ${team(m.away).flag} <b>${team(m.away).name}</b> maçı <b>${scoreText(m)}</b> sona erdi.`:`Bu maç henüz oynanmadı. Admin panelinden skor girildiğinde fikstür, grup puanı ve kullanıcı istatistikleri otomatik güncellenir.`}</div></div><div class="atlas-box"><div class="atlas-box-head"><h3>İstatistikler</h3></div>${atlasMatchStatsPanel(m)}</div></section><section class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><h3>Olaylar</h3><button class="secondary" onclick="atlasAdminEditMatch('${m.id}','events')">Olay Gir</button></div>${atlasMatchEventsPanel(m)}</div><div class="atlas-box"><div class="atlas-box-head"><h3>Oyuncular</h3></div>${atlasMatchPlayersPanel(m)}</div></section>`;}
function atlasUserDetail(id){const u=user(id); const scores=userScores().find(x=>x.id===id); const teams=state.teams.filter(t=>t.owner===id); return `${atlasDetailHeader('👤',u?.name||'Kullanıcı',`${teams.length} takım · Toplam puan: ${scores?.total||0}`,`<button onclick="atlasSetModule('admin'); atlasSetAdmin('setup')">Takımları Düzenle</button>`)}<section class="atlas-metrics"><div class="atlas-metric"><b>${teams.length}</b><span>Takım</span></div><div class="atlas-metric"><b>${scores?.played||0}</b><span>Maç</span></div><div class="atlas-metric"><b>${scores?.gf||0}</b><span>Gol</span></div><div class="atlas-metric"><b>${scores?.advanced||0}</b><span>Üst tur</span></div></section><section class="atlas-box"><div class="atlas-box-head"><h3>Sahip Olduğu Takımlar</h3></div>${atlasTeamsTable(atlasTeamRows().filter(t=>t.owner===id))}</section>`;}
function atlasPlayerDetail(key){const p=atlasPlayerRows('contribution').find(x=>x.key===key); if(!p)return '<div class="atlas-empty">Oyuncu bulunamadı.</div>'; const involved=allMatches().filter(m=>(m.events||[]).some(e=>e.teamId===p.teamId && [e.scorer,e.assist].filter(Boolean).map(x=>x.trim().toLocaleLowerCase('tr')).includes(p.name.toLocaleLowerCase('tr')))); return `${atlasDetailHeader('★',p.name,`${team(p.teamId).flag} ${team(p.teamId).name} · ${ownerName(p.owner)} · ${p.position||'-'}`)}<section class="atlas-metrics"><div class="atlas-metric"><b>${p.goals}</b><span>Gol</span></div><div class="atlas-metric"><b>${p.assists}</b><span>Asist</span></div><div class="atlas-metric"><b>${p.contribution}</b><span>Gol katkısı</span></div><div class="atlas-metric"><b>${p.avg?Number(p.avg).toFixed(1):'-'}</b><span>Ort. puan</span></div></section><section class="atlas-two"><div class="atlas-box"><div class="atlas-box-head"><h3>Takım</h3></div><div class="atlas-click" onclick="atlasOpen('team','${p.teamId}')"><div class="atlas-icon">${team(p.teamId).flag}</div><div><div class="atlas-click-title">${team(p.teamId).name}</div><div class="mini">${team(p.teamId).group} Grubu · ${ownerName(team(p.teamId).owner)}</div></div>${atlasBadge('Takım')}</div></div><div class="atlas-box"><div class="atlas-box-head"><h3>Katkı Verdiği Maçlar</h3></div>${involved.length?atlasMatchesTable(involved):'<div class="atlas-empty">Gol/asist kaydı bulunan maç yok.</div>'}</div></section>`;}


// === FINAL MOBILE/STICKY POLISH OVERRIDES ===
function atlasSyncFixedHeaderPadding(){
  const top=document.querySelector('.atlas-top');
  if(!top) return;
  const h=Math.ceil(top.getBoundingClientRect().height || top.offsetHeight || 0);
  if(h>0) document.documentElement.style.setProperty('--atlas-header-h', h+'px');
}
window.addEventListener('resize',()=>setTimeout(atlasSyncFixedHeaderPadding,40));
window.addEventListener('orientationchange',()=>setTimeout(atlasSyncFixedHeaderPadding,120));
function atlasGroupTeamCell(id){
  const t=team(id);
  return `<span class="atlas-group-team-cell">${teamLogoBadge(id,'group-only')}<span class="atlas-group-team-text"><b>${atlasEsc(t.name)}</b><small>${t.id} · ${ownerName(t.owner)}</small></span></span>`;
}
function atlasGroupMobileRows(rows){
  return `<div class="atlas-group-mobile-list">${rows.map((r,i)=>`<div class="atlas-group-mobile-row rank-${i+1}" onclick="atlasOpen('team','${r.id}')"><span class="atlas-group-mobile-rank">${i+1}</span><div class="atlas-group-mobile-main"><div class="atlas-group-mobile-team">${teamLogoBadge(r.id,'group-mobile')}<b>${atlasEsc(team(r.id).name)}</b></div><div class="atlas-group-mobile-meta">O:${r.o} · G:${r.g} · B:${r.b} · M:${r.m} · AG:${r.ag} · YG:${r.yg} · AV:${r.av>0?'+'+r.av:r.av}</div></div><div class="atlas-group-mobile-points"><b>${r.p}</b><small>Puan</small></div></div>`).join('')}</div>`;
}
function atlasGroupStandingTable(g,compact=false){
  const rows=standingsForGroup(g);
  return `<div class="table-wrap atlas-table atlas-group-table ${compact?'compact':''}"><table><thead><tr><th>#</th><th>Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AG</th><th class="num">YG</th><th class="num">AV</th><th class="num">P</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="group-rank-${i+1}" onclick="atlasOpen('team','${r.id}')"><td><span class="atlas-rank">${i+1}</span></td><td>${atlasGroupTeamCell(r.id)}</td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.ag}</td><td class="num">${r.yg}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td></tr>`).join('')}</tbody></table>${atlasGroupMobileRows(rows)}</div>`;
}
function atlasBestThirdsTable(){
  const rows=bestThirds();
  return `<div class="table-wrap atlas-table atlas-thirds-table"><table><thead><tr><th>#</th><th>Grup</th><th>Takım</th><th class="num">O</th><th class="num">G</th><th class="num">B</th><th class="num">M</th><th class="num">AV</th><th class="num">P</th><th>Durum</th></tr></thead><tbody>${rows.map((r,i)=>`<tr onclick="atlasOpen('team','${r.id}')" class="${r.qualified?'third-qualified':'third-wait'}"><td><span class="atlas-rank">${i+1}</span></td><td><b>${team(r.id).group}</b></td><td>${atlasGroupTeamCell(r.id)}</td><td class="num">${r.o}</td><td class="num">${r.g}</td><td class="num">${r.b}</td><td class="num">${r.m}</td><td class="num">${r.av>0?'+'+r.av:r.av}</td><td class="num"><b>${r.p}</b></td><td>${atlasBadge(r.qualified?'Üst tur':'Beklemede')}</td></tr>`).join('')}</tbody></table><div class="atlas-thirds-mobile-list">${rows.map((r,i)=>`<div class="atlas-third-mobile-row ${r.qualified?'is-qualified':''}" onclick="atlasOpen('team','${r.id}')"><span class="atlas-group-mobile-rank">${i+1}</span><div class="atlas-group-mobile-main"><div class="atlas-group-mobile-team">${teamLogoBadge(r.id,'group-mobile')}<b>${atlasEsc(team(r.id).name)}</b></div><div class="atlas-group-mobile-meta">${team(r.id).group} Grubu · O:${r.o} · AV:${r.av>0?'+'+r.av:r.av} · P:${r.p}</div></div><span class="atlas-third-mobile-status">${r.qualified?'Üst tur':'Beklemede'}</span></div>`).join('')}</div></div>`;
}
const __kupa48RenderAllFinal = renderAll;
renderAll = function(keepTitle=true){
  __kupa48RenderAllFinal(keepTitle);
  setTimeout(atlasSyncFixedHeaderPadding,0);
  setTimeout(atlasSyncFixedHeaderPadding,80);
};

renderAll();
loadRemoteTournamentData(false,true);
</script>
